body:
  text: 穀城山館集卷十明于慎行撰五言律詩暮春邢子願侍御過訪邀登虎窟山洞遇雨和韻春盡無登眺留山待客來殘花巖際落野席雨邊開霧合峰隂樹雲飛洞口臺醉忘歸路遠昏夜踏泥回子願過宿雲樓小酌用韻看山常獨醉無奈索居何那值春光暮能邀上客過鈎簾芳樹近揮塵白雲多欲似南樓月胡牀發嘯歌子願飲東流池上春入桃源路飛觴日未斜溪頭逢燕子池面落楊花聽樹蕭蕭雨看山片片霞與君忘世慮沈醉即為家子願飲天柱峰下贈吳人薛文學南旋縹眇高峰下相從躡屐來攀崖行覓草欹石坐傳杯半嶺開瓊觀中天倚玉臺吳門應繫馬有客岱宗回倚檻倚檻多佳氣高峰斂夕曛林梢斜上月麥隴細蒸雲宵柝連城動田歌隔舍聞空岩響麋鹿地僻亦驚羣憶鶴山莊舊畜一鶴飛去已久至常思之獨鶴曽為友翩飛已隔年幾時歸華表何處覓青田影斷空山月聲凄遠樹烟瑶臺應有伴寧憶舊林泉放鹿莊有二鹿鎖置小園憐而出之園鹿知無恙羈棲亦自愁本非籠檻物豈有稻粱謀縹眇雲中駕虛無海上遊只應常放汝相伴踏林丘樓月小樓凉不寐白月靜娟娟半嶺含秋氣千林滅晚烟海邊烽火動塞上羽書傳此夜關山曲寒光萬里懸蘿軒室成無四壁為藉緑蘿隂五月清風至空庭白日深野花猶戀樹徑竹未成林幸少藩籬隔長堪對遠岑田父欣承田父過相對亦陶然泥客攜村酒迎神醵社錢禾麻新受雨桑柘遠成烟解問蘭臺史還書大有年曉望早凉開野曙迥眺出岩扉日旭風吹面林香露濕衣流鶯深樹語掉雀野田飛來往逢村叟相將荷蓧歸偶成傳道東封事扶桑路渺漫不成威百粵何取度三韓零落王人節低垂大將壇可憐當日畫猶欲斬樓蘭漫題安東通漢節消息久茫茫事異降疏勒名殊受越裳先朝多典故屬國有彝章何太蒼黃甚為謀但可傷白莊對雨山樓三日雨御祫不勝寒積水深苔徑頽牆損藥欄牛羊鄰巷狹鳬鷺野塘寬想見清溪漲應難著釣竿憫雨七日復七夜雨聲簷際懸遙山開復隱野水斷仍連禾實真生耳苔文漫作錢為農資百畝不是敢憂天晚霽忽看雲霧斂返照逐歸鴉壅水籠漂麥分畦護種瓜樓隂新見月山氣漸成霞遠憶遼陽戍軍聲急暮笳雨中謝周師送酒積雨不出户空齊自檢書如何陶令酒亦到子雲廬閉閣青山少開簾遠樹疏沈冥應獨醉無計屈高車寄兒緯京師炎風吹去馬幾日到長安要識人間路休懷膝下歡夙宵常展卷凉燠自加餐世業餘叢桂還從上苑看閒居野築千林敞閒居萬事慵朝廷疏記憶里巷少過從雨急蕭蕭栁風疏落落松傳呼何太劇海上舉邊烽七夕溪舟初成同施還初文學王改豫武元遊泛為嗜城南隱臨溪理釣舟適逢河鼓㑹小試武陵遊斜日懸漁網凉風激棹謳馮君槎上漢吾道在滄洲王欲北上故云八月十三日諸親溪亭泛舟二首遠集亭邊騎新成檻外舟歲時開小㑹信宿是中秋倚杖迎嵐氣褰裳渡石流泠然塵外賞無謝竹林遊是日賓主七人晚凉人未醉移席泛烟波酒遠杯常待舟平岸易過鳥邊浮晚吹花底度輕歌早見東林月秋光逼絳河中秋同施還初文學攜門下諸友泛舟南溪别館依泉石方舟集俊英陳詩吳季子講業魯諸生雲樹空中影笙歌水上聲回橈應已夜山月好相迎中秋同諸友南溪望月此際秋無奈停舟望碧岑月華巖際滿夜色水邊深影滅銀河浪光團桂樹林南樓聞嘯詠誰識庾公心九日無菊山齊逢九日悵望晚天霞去歲曽飛雪今年未見花秋聲風落木寒色雨侵沙幸有杯中物猶同處士家送武舉王生北上俠少多竒節悲歌氣不平偶探黃石簡欲赴白登城錦瑟壚頭醉雕戈馬上橫功成報明主恥作魯諸生寄吳觀我太史聞道金閨侶名山住已深淹留依桂樹棲息傍祗林真偈閒常諷新詩靜自吟論思虛上列懸切故交心秋日寄鄒南臯吏部美人南國渺江上有楓林道為談天重名因避地深十年曽酒㑹千里片鴻音念爾關隆替能忘報國心對雪聞方子公行賦送寥寥逢歲宴飛雪逗年華霰薄初成雨風高漸作花寒光連兔苑朔氣度龍沙遊子今何適關山路正賖雪中獨酌北風一以凜雨雪晝霏霏酒畔疑花落春前學絮飛田家占歲事海國念戎機萬里三韓道征人幾隊歸馮用韞宗伯訂約西遊登岱過期未至懷望遣悶二首自得高丘約脂車已隔年如何期屢易直作信空傳海色雲門上秋光日觀前側身凝望眼端擬四愁篇海上碧雲斷佳期誰為留已看過九日原約近中秋歲晚常思㑹身輕未厭遊遲回應有為無處問書郵上坤山月巖寺陳鐵峰孟我疆諸君㑹講處也何代標金剎層崖半倚天松門低落日石竇㵼鳴泉野曠寒烟積山高細路懸因懷蓮社客惆悵講堂前過陽穀店山下問小洞庭遺迹是唐時東平太守蘇源明宴處蠶尾峰頭路當年小洞庭汙邪餘水國文物閉山靈野草微茫白川雲黤慘青猶疑歌舞地笳鼓震空溟送吳澄陽文學還越翩翩江左彥藻思薄雲天觀樂重遊魯談經舊客燕歸舟鴻鴈後别酒菊花前明歲長楊獵看君賦草傳哭元戎少泉侯兄八首故國逢今日元樞失舊臣人間銷電露天上化星辰磊落英雄氣悲凉骨肉親哀歌轉難就握管涕盈巾少年拋翰墨笑入五陵場一劔橫秋色千金去故鄉韜鈐分禁旅節鉞奠夷荒何意將軍樹風殘一夜霜男兒身手健壯歲握兵符試買千金駿輕關十石弧登壇名已遂裹革志猶孤回首黔中路年年泣鷓鴣羽書今正急誰勒玉關銘窮海纏兵氣中原落將星俠場思意槩蠻府懾威靈尚欲隨風雨鞭螭下紫庭少小追遊地今來白髮新半生羈仕路垂老戀交親間濶無經月歡娛得幾春可憐花底醉已作夢中人吾家門巷改池草盡成塵念我殲同氣依君豈異人徵歌花塢夜載酒竹溪春舊侶無多在相看涕泗頻朝來過舊館遺迹總堪嗟曉月沈弓影秋霜澀劔花護羌元入塞去病不為家素業青門外惟餘數畝瓜攝提星入次單閼鳥來旋正近懸弧旦翻成掛劔年祠方同畏壘冡得象祁連汗血俱龍種青箱事可傳公以生辰前數夕沒又貴陽有生福故云秋日答常心吾中丞寄問二首别後渺愁豫秋來得報書未過衡渚鴈早下武昌魚天地方多難江湖有索居間踪休更問頭白侶樵漁何地容高隱江樓萬竹青曉猿諳報客夜鶴解聽經天迥懸卿月山深閲歲星㑹傳宣室召莫勒草堂銘贈詩僧擁錫來吳嶽詮經住魯城王孫除館待郡牧掃門迎藻思烟霞潤風神水月清談詩吾已倦亦欲學無生送朱元長北試京兆西風吹桂樹欲發上林枝河畔停舟夜花前對酒時愁深談舊事别久見新詩幾日泥金到山中有夢思送方胥成山人南遊淮上君行復幾歲今夕問歸舟客久黃金盡天寒白露秋寸心酬俠氣斗酒結離愁莫叩淮南幕中丞抱國憂贈塢章甫道契翛然林壑秀家學似枚臯作客懷長鋏驚人試彩毫旅愁滄海月歸夢廣陵濤努力攻騷雅時名爾易高雪中杏花春寒無可奈愁思入韶華更落瑶臺雪還添上苑花凝粧聊傅粉待暈始成霞試泛山隂棹東風滿若邪雪後杏花花時驚雪落雪後見花開夜色梁園度春香漢苑來飄簾還似雨聞笛半疑梅凍澀枝頭燕依然社日回送徐南龍令君南旋君行良不住河上理蘭檣客夢齊山隔鄉心楚塞長春歸見芳草人去思甘棠日望雙鳬影翩飛近尚方贈余古仙山人别久鬢如絲金門老畫師相逢春雨夜正是落花時能事江湖得浮踪歲月私舊遊今欲盡君去可依誰三月草八日飲侯六山莊四首問訊東山館名花幾樹開不愁春色去自有故人來淑影明衣袖香風近酒杯未須尊俎具且共倚亭臺地僻宜佳㑹春歸待主人蝶驚紅雨驟鶯狎録條新但聽歌盈耳休辭酒入脣不堪回首地萬里一風塵少小歡遊地君家舊竹林每逢春酒夜常醉緑蘿隂樹密雲過慢樓高月上深婆娑看老態頗識故交心聞鐘人未散倚席興偏長曲按新聲度花從靜夜香青尊何地少白髮幾人狂更訂明朝約過豫舊草堂東園牡丹小㑹四首老去憐交態春歸念歲華還將今日酒同對故年花色染丹臺露香流玉洞霞惟應欄檻小不似五侯家園林剛半畝木藥滿亭臺向日朝猶斂迎風夜盡開酒從新歲待客是隔城來俗殺平章第朱門鎖繡堆多少東風恨天香正滿林影搖春酒艷色傍玉樓深樂曲臨時製花名按譜尋清平當日調回憶久沈吟傾國俱名品呈姿媚一堂倚闌渾欲醉入座轉聞香月下千金笑燈前百寶裝夜深春更暖忍負紫霞觴夏日飲表弟劉敬宇水亭四首水際芙蓉館芳辰每見招車停林外雨人過竹邊橋樹影侵杯動花香入眼飄坐來閒白羽秋氣已蕭蕭别業中丞舊新塘鑿更竒亭深鳬雁渚樹老鳳凰枝惜往寧多日徵歡又一時洗杯酬愛弟偏憶渭陽詩亦有池臺勝如君結搆稀橫槎能作榭蟠木可為磯漫取花行酒真愁露濕衣層軒銷暑氣赤日石林微晚凉猶未倦改席倚亭闌膾鯉銀絲細調氷玉碗寒笑開桃葉扇醉岸竹皮冠杯底中天月還應勒馬看寄題新蔡水亭二首聞道名王館深依上第開花間分島嶼雲裏出亭臺夏洞藏隂雪晴流激暗雷不因人境近只擬是天台主君賓客盛何處席長筵門簇看花騎池通送酒船星霞垂夜彩鳬雁下秋烟未覺淮山遠空吟桂樹篇泛溪一曲無多路洄沿自覺長近人堤栁細隔水岸花香放鶴遵莎徑觀魚坐石梁不教漁父問此地即滄浪寄題貞白王孫赤霞館藉甚天潢彥才名滿帝家書藏東觀草館號赤城霞夢裏常吞錦毫端自吐花不知銀漢水幾日見浮槎五月十三日南溪㑹集高㑹南溪始芳尊午日同登亭來暮雨敞閣受林風歲月飛花好河山醉眼中莫閒青玉盞俱是白頭翁七日南溪㑹集七夕始迎秋溪亭復此遊午凉慵舉扇夕雨罷登舟倚杖窺雲樹停杯待女牛只憐天上夜亦向此時愁七日夜雨佳期方待夜雨氣轉氤氲愁望明河影翻成楚岫雲鵲梁何地駕笙鶴㑹能聞未悟隂晴理休將巧拙分中貞王孫過訪少岱山房酬贈二首秋氣颯蕭森亭臯夕坐深美人滄洲興過我青楓林倚劔衝星氣停杯待月隂小山叢桂在端復為誰吟池閣三秋别山齊七月過車塵花際少雲氣酒邊多客路搴芳草征衣帶女蘿一歡吾欲醉且莫促鳴珂寺山秋望平楚淨寒烟高丘望渺然日斜虹帶雨野濶水浮天絶塞南來雁長河北去船荒臺題仲父蕪沒幾千年山亭雨晴多物態秋敞坐山亭舊竹泠泠翠新蘿裔裔青荷鉏分藥徑散帙閉柴扃掛樹雙言鳥繁辭盡日聽南溪秋泛野館無停轍秋塘有繫舟怯同俗客飲且喚老妻遊蝶欲疑紅樹鷗應笑白頭漁人休借問此是鹿門儔小坐小坐霜天夕空庭竹樹深城笳凝暮靄樓月斂秋隂漸老消塵慮長貧現道心摩婆舊如意懶擊唾壺吟東園即事蓬門長日閉俯仰自為歡酹酒邀花飲分魚喚鶴餐閒看秋水淡老覺世塗寬不是無蕭索人間事更難秋日南溪閒眺得李宗伯丈書溪閣非無事秋清日轉長掃花安鹿寨帖石補魚梁高樹留新雨平波淡夕陽遠書何意至三讀素心傷中秋東園小集漸上千峰月真銷萬里雲秋從今夜半人是舊時羣桂影寒應濕簫聲靜欲聞相看疑白髮總似兔毫分九日登小岱山九日罷徵歡孤尊眺嶽壇晚烟千室翠落日萬峰丹已有鴻堪聽還無菊可餐江湖回白首愁見是長安木芙蓉一本芙蓉樹三秋覓地栽尚逢南客問果向北亭開色落仙人掌香浮太乙杯可憐霜夜月華艷滿池臺九月草五日東園菊下小集四首朝來全罷酒秋盡復看花布席輕張幔題名細剪紗開時團玉露餐處帶明霞蕭瑟還憐汝含芳綰歲華今歲重陽菊翻迎十月看猶餘秋日映已近北風寒凍蕊開逾艷貞心抱自完搴芳思有贈惆悵倚亭闌花開原五色色色斷人腸浴出俱含雨粧成總奈霜凄凉傾國品酷烈歲寒香回笑春桃李隨風委艷陽歲逢鴻雁候日敞菊花筵祗恐虛秋色誰愁負酒錢移燈情繾綣卷袖醉蹁躚且采簪華髮相將步月旋東園延吳翁晉病不能陪郊園常不到客席欲凝塵正喜軒車過翻將藥裹親竹隂堪受暑花氣尚疑春座上南山色聊憑代主人病起從吳翁晉郭汝承遊南溪亭上甚小幽棲地能令二妙從文中吳季重名下郭林宗解髮臨高澗浮杯望逺峯本因行藥至燕笑及聞鐘寄雪浪上人一首别來人欲老尺素不曽逢每望長干月疑聞內院鐘雨花飄座塵雪浪起林峰此際能相憶江雲隔幾重送歸義望峰首座南遊覓水陸閣緣梵宇禁城邊依棲不記年山中逢白足夢裏憶青蓮已受真乘偈聊修福地緣爾時多寶聚龍象滿人天歸義雲松禪師敕封郎官寄贈如何塵外侶亦受世間名佛果修無漏官階號不更紫衣宮錦製丹誥法音迎為問酬恩地朝朝梵誦聲贈玉山徐仲升君遊渾未倦俠骨尚翩翩壯志禽填海輕姿鶴上天詞人今古賦策士短長篇可奈忘機叟銜杯但欲眠聞郭汝承京兆捷音志喜望望長安道秋高紫氣新燕臺真得駿漢苑欲歌麟笑折看花屐狂呼漉酒巾老懷無浪喜個是眼中人穀城山館集卷十
