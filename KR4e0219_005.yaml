body:
  text: 榖城山館集卷五明于慎行撰七言古詩商丘沈封君畫竹歌梁王修竹不可識千秋草合平臺迹平臺主人墨君友掃出檀欒一千尺醉瀋淋漓幅素看枝枝蒨翠若可餐筆端乍覺煙雲繞堂上時驚風雨寒寒聲槭瑟生綃起如在湘江秋色裏湖州以後稱太常此幅神真良足擬主人種竹舊成林千里提封自作隂蟠根出地成龍骨徑節凌霄引鳯吟髙堂日逺悲風木手澤淒涼餘半幅他日尚書閣上圖應寫平臺萬竿緑壽臨邑邢封君七十長歌邢翁濟北之名族世代門庭羅繡轂長公諌草青蒲伏羣從咸登天府録翁獨翛然在巖谷芝房蘿壁薜荔服牛角挂經眠抱犢學儒不干五斗祿種田往往皆成玉瑶環瑜珥多如簇一枝炯炯先出櫝名都十五不敢贖天風吹作華林木走馬春城十二街雕龍翠殿三千牘少年出宰稱民牧召入文昌錦被襆白簡綈囊臨仗讀雲夢汪洋舟萬斛長風直下千里速姓名已在金甌覆方底詔函貤半幅玉繩蘭檢何熠煜翁冠柱後衣錦縠行年七十方瞳緑出門柴車聲轣轆季方持杖元方僕齊眉仙姥膺多福閬苑春開阿母桃渭川日長封君竹山中八月酒新熟玉盤琥珀四座馥松枝自煮石溪蔌珠履滿堂綺障促千金稱壽起相屬參差玉管間琴築主人浮白自捧腹生事惟餘陶令杯年華不問君平卜我家鄉邑不朝宿郎君舊誼敦羔鶩蹇豫抱拙長碌碌彈鋏歸來頭不沐仙閭東望地可縮緘詞且效如川祝代作朱憲使雙壽長歌嶔崟大伾山西遮黎陽口白馬遙盤匏子隄黃河如帶東南走東南萬里入蓬瀛轂轉雷奔大壑驚長淮一瀉不知嵗至今惟見山崢嶸山上丹崖合翠谷别有日月非塵俗問言誰向此中隱西臺使君茅作屋使君早日客長安襆被香分畫省蘭兵符一領遼海震戎軒再駕朔漠寒間心舊愛春山蕨忽解緋衫辭帝闕黎陽一臥幾經年醉弄大伾山上月山月沈沈吐玉樓緑蘿飛花碧草秋有時更涉滄洲趣釣艇煙簑對白頭松間鼓琴俯流水猿鶴夜聲清心耳少年記作金閨遊一經又見金閨起珠袍錦帶開舊篋走馬曲江春色裏只今花樹滿河陽亦有槐隂如市里使君年嵗七十強紅顔玉骨何昻藏郎君自獻南山曲戲取宫袍作舞裳齊眉玉案雙尊酒皬然又覩西王母雕盤綺食羅秋堂鳯簫象管無不有仙家縹眇六鰲峯五城樓臺春氣濃大伾如塊河如一杯水使君笑挾兩茅龍寄送賈石葵大卿之任南都昨夜南山射獵歸松窗醉臥星露微五更烏啼窗月白酒醒夢見長安客平明廄吏來相聞為見春帆駐浦雲春帆信宿不知處建業澄江杳然去緘書送君江水長此時脈脈空斷腸岱西山人歌壽何吏部敬菴君不見岱宗之山海上起雲霞沃宕三千里七十二峯峯插天西支半落清河水山川回合勢連綿靈氣應鍾不世賢大名誰者齊北斗岱西山人行地仙山人舊隱雙龍闕左省含香陪上列共道詩名水部傳更聞啓事山公絶一時流品入陶甄簡要清通世所珍三十朱輪行寶陌衣香風動洛陽塵素心忽憶棲巖谷解組歸來雙鬢緑玉樹多從院宇生蘭房近傍煙雲築山人修翛六十餘頳顔綽約玉不如載酒時遊廣里月垂竿間釣錦川魚石閭有伴餐瑶草玉几金牀春色曉人問已自有蓬瀛何人更説蓬瀛好為翁亢節歌欲長瓊巵起壽春茫茫泰山若礪海水竭大年不凋齊日月大伾山亭圖歌為朱令君賦誰持一幅綃掃作千林碧竒峯華嵂浮煙空秀色橫分白馬迹山下草堂瞰古城百花潭水飛春英長楊翠柏蔽雲日靜聽似聞風雨聲亦有髙臺臨灌莽岧嶤百尺浮雲上何人月夜舒長嘯一聲遙和竹林響臺下悠悠河水來亂帆東去接天回青山一片明湖裏翠黛光搖寶鏡開春風滿巖杏花裂光中乍見輕煙滅赩如赤城霞皎若天山雪修竹檀欒碧萬竿清風瑟瑟動庭蘭了然瀟湘色對此心神寒西北一畝丘厥形如負局仙人對奕揮素手華山幾更春草緑我披此圖開心顔一時坐我煙霞間恍如身到輞川曲目中已自無塵寰又似桃花源裏去碧流紅雨不知處黎陽仙翁聖代英欲臥滄浪絶世名一朝解紱謝天子杳然自寫丹青裏有子重看上苑花河陽萬樹還相似仙翁可望不可親繪為此圖傳世人真遊莫訝人間少方丈蓬萊别有春桃花嶺圖歌壽太宰楊夢山先生長安三月煙如織上苑桃花看不極主人舊是武陵人别有春林千樹色千樹萬樹玉嶺賒爛漫風前十里花細纈半含仙掌露繁枝齊吐赤城霞主人數椽築洞口手植城堤幾十畝笛裏香分畫閣梅樓頭艷拂金隄柳花間漉酒醉朱顔石几松牀自閉關不遣紅塵來陌上惟容流水到人間只道林中聊可住芳菲又滿咸陽路掃盡玄都觀裏泥栽成濯錦江頭樹還將幅素寫花源半染山光半水痕拂拭自疑真境近不知春色在公門君不見度索山前花落晚千年一結條支卵東方先生太苦飢噉餘半核如金碗又不見仙人子晉遨五城白鶴朝驂海上行緱山瞥見花成雨沈醉吹殘月夜笙主人亦住三山島瑶池仙種分來早花開幾度笙幾曲日上扶桑春未老炙兔行為于子沖賦漁陽大使齊大俠行邉數奏甘泉捷千金飽士士欲死領向狐奴山下獵黃榆九月號北風雙鞬怒馬如盤空弓影向天毛羽落弦聲撇地霜草紅緑眼健兒馬前走血懸兩兔􅀈貫首傳火無煩玉鼎調擘肩未假鸞刀剖鴟夷吐酒復不住月氏漆器在左手酒酣握槊還大呌笑謂魯生爾能否沙頭月出燕雲黑枕藉相看頭不幘平生肝膽向誰傾説著世人雙眼白羽獵虛隨卜祝羣詞人亦自樹功勳試問隴西李都尉雄材肯數霍將軍武定侯墓歌長安城西銷客魂故侯墓前雙石門空梁無風蠨蛸挂髙臺不夜鼯鼠奔行歌牧豎上隴首守冢老兵眠樹根道傍徙倚長歎息千古此意誰與論當時貴寵真無匹勢倚青天回白日驂乘親陪别苑遊行香日侍齋宫直元公鐡劵大國封都護金章新樣刻玉鞭蹀躞內廄馬雕盤絡繹尚方食權相交歡亦掃門徹侯受酒咸避席此時意氣薄青雲睇笑看人寵辱分負郭園池田太尉重城甲第霍將軍求仙偏訪燒鉛客亡命多歸帶劒羣曲閣重樓春自駐繁絃急管日初曛自言富貴無銷歇爭見桑田海亦竭未央宫前請室開咸陽道上車塵絶間門行馬臥莓苔舊館罦罳藏雨雪只今尺土閉空原嵗嵗春啼杜宇血吁嗟嗟世皇二寵傾朝廷前有武定後咸寧福過俱為萬人指法行再見七廟靈人間榮悴咸可數古來金谷與郿塢前車已郤後車馳請君但看北邙土雙林寺歌道旁佛宫誰者築珠樓寶殿橫山麓僧徒指點為豫説此寺方成主人逐憶昨十載氣薰天吐納日月揮雲煙外廷稍引三公勢內禁親操六璽權出入鈎陳留管鑰笑談甲觀走金蟬建寺平侵貴主第施僧直請大官錢輸來多寶堆成塔輦盡黃金布作田法官梵宇何連曼勝地名區看不斷墓上林園學九陵祠前樓閣成雙觀落成牛酒國親供建醮香花天女獻吁嗟此寺􅍦渺小赤刀已欲盈千萬我皇神威符世祖距脫大姦俯地取郭家金穴入水衡鄧氏銅山歸少府廬兒解玉乞街衢宅婦懷簪隨卒虜惟餘此寺在郊原虹梁綺搆誰為主蛛網空懸梵鐸風青苔自鎖瑲琅雨盛衰轉盻那不有幾年翻覆看如許君不見江陵城頭土三尺若敖餒鬼不來食一代賢豪此謂何爾全首領恩亦極燕子磯歌呈李棠軒宫諭大江西來萬里白建業青山兩岸劃山根片石鑿不斷斗入江流數千尺我來掃石上髙空直躡忽恍開鴻濛回濤細齧鷟鸑嶺懸崖倒瞰黿鼉宫魂搖骨栗不得語銜杯邈望蒹葭渚蕭蕭木葉滿江流却是千帆萬帆雨雨餘返照江水紅赤城吐色江水中須臾海月東山出睡龍欲動金波溢水晶為盤玉鏡開秋光寒瀉玻璃臺客懷跌宕不可奈散髮呼酒天風來西望采石若可挈長江之水亦應裂君家供奉去幾時不見今時江上月獵兔歌南山獵兔如獵虎萬騎合圍晝伐鼓壯士齊關十石弧王孫自撥千鈞弩兔走入窟窟草平長林落日歡人聲銛戟利劒不得刺汗流踏足空屏營君不見北山老翁手握矢臂解一鶻狡兔死賣珠行長安有賣珠老嫗故侯侍兒也能道興衰憮然有感作賣珠行賣珠老婦髮半白提筐日走宫城陌遍謁朱門不得休斜倚道旁長歎息自言本是緑珠儔夫壻先朝萬户侯錦衣夜直銅龍闕畫棟朝開碧玉樓爾時秀色新承選二八嫂婷集內館小閣微風倚翠屏間房落月調金管羅衣寶靨不勝春十斛明珠掌上新只言華屋長如海不道滄溟亦作塵當時世事一朝變郿塢黃金實內殿劒履三千帳下空鴛鴦七十池邉散前年曽向舊門過新主承恩驟玉珂今年又望門前道行馬半殘生緑草繁華憔悴看如昨覆雨翻雲何閃爍橋上年年閲水流宫前嵗嵗看花落我聞此語涕沾裳世事悠悠不可量祗應漢代麒麟閣千古名垂日月光雙桂行壽宜興蔣郡丞堂前雙桂樹堂上雙樽酒太湖一曲住者誰淮南秋色落君手使君瀟灑豪且賢東方千騎何翩翩一日上書拋紫綬走種陽羡山間田山田種秫收不薄荆溪如畫堪行樂桂花已見湖上開桂子還聞月中落月中清影碧天秋花下斑衣對白頭陶令歸來渾是醉徐卿老去百無憂不見玄都觀裏桃不見灞陵橋畔柳桃花吹作素衣塵柳色歌殘行客口誰能向桂花樹下日陶然萬斛天香近酒邉燕山五枝君不羡蔣家三徑益可傳招山人歌城中山人常苦多山中山人常苦少我來杖䇿入山中山人門外迹如掃聞道長安方大索髠鉗赭盡荷衣色今朝司𨽻獄中書昨日平津座上客大國并容何事無防川防口無乃渝山人有山歸亦得慎莫出走越與胡亭山洞歌上周師七十生辰岱宗西來未了青結作秀山山似亭亭坳石洞何窈窕千峯萬峯羅作屏山翁少時隱山麓數椽桃花源上屋鶡冠憑几暮雲生牛角挂經春雨足偶然隨牒入燕城博士驚傳墨綬榮赤縣郎官原應宿蘭臺循吏早書名人間月旦吾何有那能折腰為五斗拋却河陽縣裏花歸來彭澤門前柳山中回首隔風塵緑髮方瞳白夾巾煙霞半結遊仙侶弧矢還逢獻壽辰此時涼飈入户牖華軒松桂參差茂有孫能采澤宫芹有兒能致宜城酒銀河耿耿月上鈎座客誰者飛觥籌同遊門巷多蒼蘚舊學生徒已白頭請翁拍浮莫辭滿人生七十古亦鮮試探洞裏玉函書海水何時復清淺甲午五月朱可大自江右來訪相見喜極對酒放歌别君春花落思君春鳥啼春風吹逺夢夜夜到湖西只言尺素迷江樹不道隔年即相遇元方執御季常隨德星應卜賢人聚攬衣出迎雨滿衣秉燭相看暑氣微炎天命駕三千里如此交情古亦稀笑殺山隂一夜舟笑殺平原十日酒把杯脫帽雙眼白放歌大呌無不有與君譬如雙吳鈎神精會合自有由興君譬如雙飛燕差池羽翼時相見莫將逐客當沈淪自是江湖合有人試觀青海營中月試望長安陌上塵羡君紅顔髮盈幘我已如霜鏡中白回頭三五少年時半百光隂如過客赤繩繫日那得還長鯨吸海幾時乾燈前起舞勸君酒何處含情可盡歡雪中登樓看山歌月中看山不辨色雪中看山不辨影闌前九疊錦屏張一時幻作虛無境蒼茫皓氣萬里通輕瓊冷絮飄鴻濛閻浮幾許還遭劫色界由來總是空憶昨築樓對城缺本為看山亦看雪那令有雪却無山倚樓滿目成漻泬山亦非真無雪亦非常有自顧夢覺身至竟誰為偶此時欲説已忘言拍闌且盡杯中酒雪後登樓看山歌昨朝飛雪滿大荒登樓四顧天茫茫今朝登樓禁不得吾與青山頭並白筠牀呼酒皛宇開瑶華積作中天臺對山遙勸一杯酒平生與君為素友君今頭白青有時奈何吾鬢真成絲雪中菊花小歌去年九月雪雨集菊花吐向雪中泣今年十月菊始開雪花又落黃金罍繁華何意同蕭瑟冷蕊疏枝一半白羅綺三千夢早春却將鉛粉妝佳色素影關山夜欲流寒香寂寞楚天秋不知陶令吟時醉正是袁安臥處愁籬邉吾亦憐吾友苦節貞心成素首試看東園桃李花霜前零落今何有冬日送方胥成北遊臨邑訪邢子願侍御一首黃石山頭雪未晴黃石山前送客行天寒嵗暮白日駛北風獵獵吹冠纓看君殊少風塵色擊劒長歌雙眼白少年曽慕五陵豪老去猶為萬里客只今躡屩逺行遊湖海茫茫路阻修舉世何人重詞賦布衣無策干王侯山中蕭條鮮所有解衣衣君勸君酒平生肝膽向誰盡但説邢公不離口邢公好士無與倫千金散盡家苦貧此時無忌還留趙何客馮歡可入秦君今又向犂丘去馬首殘陽明逺樹山頭望君酒欲醒相思併在君行處遊蜀山湖歌示任城王甥季輔昔聞巨澤湖漭沆三百里自從中作宋公渠兩岸長虹夾汶濟我家湖北纜扁舟住近滄浪不解遊王郎亦住湖南曲攜我來探水國秋叩舷湖口渺然入洲渚縈回望不極荷芰殘花棹底分鷗鳬亂影帆前失波心宛在一丘懸直上蒼茫盡水天萬頃泓淳沈碧落千林黯淡入寒煙蕭然似欲來風雨感慨愁心弔千古秦皇片石有孤峯魯國荒臺無舊土玉罌春酒欲盡無沈醉煙波興未孤西風不過山隂道枉向君王乞鏡湖九華山歌送施幼淳省元南還青陽省覲九峯名九子幻作九蓮花去天不知尺有幾晴空片片飛丹霞南宫才子江東客筆帶九華峯頂色學書欲作萬人敵一日聲名傾上國青春謁帝入神京黃石尋師駐榖城經術逺宗燕太傅門墻半列魯諸生忽登泰岱看鄉陌望見江頭雲氣白愁心一夜渡淮陽不為蓴鱸秋興迫千里寧親願不違西風蕭瑟送將歸尊前落木渾成雨馬上微霜欲點衣為君長歌勸君酒便是别離未應久去日聊隨朔鴈飛來時莫在春鴻後玉樹青熒上苑栽君王正憶子虛材好將九朵芙蓉露瀉向仙人掌上開嵗暮送汪山人敬仲南還寒風颯颯愁雲繁江南浮客來到門手出瑶華八百片雪花錯落飛瓊軒自言落魄無何有湖海豪遊成皓首竟陵學士座上賓新都司馬社中友燕南作客嵗將闌彈鋏長歌道路難知公當代論風雅曽向人家卷裏看蓬門舊日不迎客為君拂拭凝塵席談詩靜夜一炬紅呼酒髙齋雙眼白送君南去及新春殘雪初消路少塵行到石城應早渡隔江桃葉喚歸人平倭奏捷歌去年都護大徴兵平壤島冦皆掃平今年司馬通和議蓋海鯨鯢不可制魚服十萬簸狂瀾千里腥風塞月寒不見降書來日窟空令獵火照辰韓吾皇按劒赫威怒獨運神謨懲往誤早傳制府鑿凶門更詔中丞開武庫材官負弩盡從征慷慨辭家志不平殺氣千尋飛浿水軍聲一夜度龍城士馬驂驔誰復數青海原頭晝伐鼓轉斾橫捎樂浪雲洗兵半染夫餘土陸營三路勢已奔水營大隊赤雲屯弓刀蹙沸鮫犀裂戈甲搶攘日月昏小酋面縳大酋死屬國君臣歌燕喜羽書昨夜自東來直入甘泉報天子論功大發水衡財碣石關門日夜開符節星馳玄莵塞金繒山纍白龍堆十年餽師三百萬今日方聞博一戰明王守禦在四夷屬國君臣爾莫玩射覆謠戲作郭舍人東方朔來前射覆相為樂謂此金盂中有何一蠕蟲不是蜥蜴亦非守宫中者賜帛不中城旦舂舍人東方相顧􅌓咍此胡為來哉謂之為龍不能變化興雲雷謂之為蛇又不能委蛇蒲伏與世諧此何物也陛下幸發視必是一蝸牛身似有所負外又無所求不肯濡足惟願藏頭循牆而走面壁而修鐘鼓不能享鼎鑊不能謀左角大勝右角大敗未嘗知喜未嘗知憂蘧廬為天地混沌為春秋其覺如寐其生若休此有巢氏之裔無腸子之儔與聖人拊掌笑是物安足收放之汙瀆中使從蛭蚓遊日觀峯歌岱嶽峯頭一片石天光杳杳連空碧我來夜掃石上雲未明看見海中日日出海東幾千里茫茫不辨雲與水天雞啁喔海上啼東方霞氣半邉紫忽然瀲灔琉璃丹一泓捧出赤玉盤長繩斜挽不得上半時方到扶桑端扶桑枝葉成五色海水明滅一線白日旁雲氣如連山目中欲識鮫人國平明日髙海水乾滿天翕赩紅氣團三山金闕流安在六鰲背骨秋霜寒憶昔秦帝東封年欲浮白浪遊靈仙驅石作橋不可涉金支翠羽空西旋幾時得見海中出日三千丈脫屣妻子如浮煙眼前朱生信豪士側帽大呌石上眠我亦欲取巨石填東海揮戈且止羲和鞭六龍不停日如矢仰天嗚嗚酒熱耳泉林歌雷澤萬頃波澎渤如萬馬陪尾鎮之不得溢釃為靈瀆出其下洞門噴薄瀉飛泉沸珠迸玉聲潺湲天山雪花四月落片片吹上春衣寒清流可潄復可枕拍浮大白相對飲潭中石子成五色熒熒細濯巴江錦行盡回溪地轉偏疑是鏡湖春水旋深林蔽虧不見日但聞雜樹多鳴蟬樹裏泉聲百道重木根詰曲盤虬龍解衣羅坐泛流羽天光水色何溶溶逺峯隱見多明滅殘霞飛丹手可掇此時林壑瞑色來呼酒彈琴望雲月月上青山醉若何臨流垂手挹素波且歌白石吟渌水紅塵萬事空蹉跎旭日髙林送客子清風四面松聲起市橋一出到人世武陵桃花空流水嶧山歌岱宗海上來西塞中條路東南數峯青未了凌波欲涉長河去似斷不斷走勢回結作芙蓉掌上開青𡨕浩蕩何年裂平地湧出金銀臺名山固多竒此山竒欲絶纍纍萬古石谽谺成竇穴落星不到地纍丸不到天懸圃亦已碎羣玉亦已顛金華牧兒何婉孌一入紫煙不復返世人誰者叱羣羊坐看蹄角生苔蘚人行石中何盤珊十步九折穿嵌巖顧見雜花開綺繡又聞淙淙泉水聲鳴環千峯𡨕密萬壑逼日光時向天窗滴深林已盡鳥不鳴攀緣猶訪白雲迹白雲在天何時還洞門石扇開重關五花峯頭一騁目飄如乘虹駕鶴飛出天地間但聞長風颯颯萬里至使我四顧清心顔君不見滄海桑田年嵗改秦皇片石今安在萬騎千乘化作灰河聲依舊東流海沈吟此事思欲飛擊節髙歌淚滿衣空憐世上浮沈子白首紅顔何所歸前贈李本寧歌一别十五年再别十二春人生百嵗苦不滿可堪幾作别離人前年君入蜀為李醉歌為陳哭酒挹玉華山色青淚灑嘉陵江水緑去年君入越曽訊朱公訪禹穴邀歡又作湖上吟沈侯細腰可已折今年君向燕京遊千騎朱衣唱八騶道旁忽問魯狂叟半夜停車南陌頭我病伏牀君坐膝呼兒出酒陳曲室相看如夢燭影殘屈指良遊話夙昔我年多君兩嵗強君頭如漆我如霜浮沈聚散不盈眥回首萬事空茫茫北風吹雪角曉寒車帷欲裂嘶馬酸莫言嵗晏别離苦更有時危道路難知君詞賦滿人口六符鼎足多故友君王倘復問同時舊日嵗星人識否後贈李本寧歌李君李君汝今坎壈何甚哉七命藩臣二十載朝天又奉除書回憶昔蓬萊開內院翩翩二九凌霄漢大者為相小乃卿君乎鍛羽來何晏當代詞場論作者君及江東兩司馬誤殺人間白眼兒輕言侍從無風雅一去承明閲嵗年秦梁蜀越多邅延道髙不容豈有以異哉造物操微權我聞柱下之裔多才子白也飄零賀折死今日得君而三矣君今不夭復不賤又無留滯安有此李君李君為我楚舞我為君歌嵗云暮矣將如何天生豪俊必有用如君不信長蹉跎涇水一斗泥化為一斗榖清者受其名濁者食其福翹翹常不足碌碌常有餘人者歆其實天者寶其虛請君還我凌雲筆我還君家祿萬石五大夫松歌為劉博士元陽賦爵名五大夫其數不必五何知非二松屑屑為之補二松五松俱莫論秦人已沒沙丘魂金椎馳道迹如掃此中惟有松枝存我觀此松顔色古幹如虬龍質如土鸞樓鶴舞幾千秋猶憶當年巖畔雨自有此山即有松百木之長五嶽宗秋聲不斷天門路海氣長懸日觀峯亦不為封榮亦不因封辱興亡閲盡總無情何况區區小除目濟北劉生逹者流題詩舊向松間遊嵗寒豈欲聨三友道逺還因寄四愁君為博士挂冠早松號大夫今欲老浮名夢幻兩茫茫不須苦作秦松考瀛海仙人歌為任丘劉翁雙壽賦君不見碣石髙懸海上臺九河之水崑崙來一入淮陽五百載地靈猶向瀛州開瀛州雲氣何超忽北拱漁陽連漢闕赤畿總號帝王州瑤堂别有神仙窟仙人碧髮更方瞳天姥霓衣出閬風臺上時騎雙彩鳯壚邉共跨兩茅龍當年自種藍田璧瑤草琳華堂下植學士絲綸接上台中丞節鉞通南極寧親暫許帝師旋幾道封函降自天上食分將仙禁酒舞衣攜得御爐煙七十已稀况八九如此齊眉古未有蓬萊謾道棗如瓜度索虛傳桃似斗嗟乎仙人誰與儔瀛州平地是瀛洲從今嵗月真多少海水還成淺碧流壽封君邢翁九十長歌翁年七十八十時我曽兩度為祝辭今翁算十復過九我辭三祝翁許否濟南古有九十人轅生伏生席上珍轅生為郎官不進伏生授女口不真翁今有官復有子方瞳緑髮身著紫江南辭客久停毫惆悵山東邢柱史片紙真同片玉看雞林傳寶出長安書法妙入鍾王室騷命卑陵屈宋壇蒼梧碧竹復不少何言玉山與瓊島人生百嵗苦多愁如翁千齡顔更好泲園東望是蓬瀛清淺當年幾度經自是泰階多景瑞珠躔已現老人星漁陽老將行為郭總戎建安賦漁陽老將名家子少日趨庭弄文史操觚屢試不見收投筆悲歌辭故里桂玉蕭疏客帝城遊談無術致公卿煙塵正滿漁陽道挾策還為塞上行爾時戚侯鎮北土七校屯營開幕府江南劒客擁轅門若個驍雄健如虎將軍自臂六鈞弓玉帳分符細柳東新降部落連青海見築亭臺跨逺空薊門論守不論戰十年左角無傳箭一朝碣石見桑田臺上黃金顔色變歸與彈鋏罷登壇手挽虹霓上釣竿東征西討年來事笑踞松根白眼觀西亰有班今有郭文武聲華何磊落君家難弟定逺兄一片燕然銘再鑿聞君矍鑠壯不如八十欲近七十餘還看世業青雲逺盡出蘭臺舊著書夜雨呈候吳郎城南學作瀼西屋炎天試借吳郎宿不知有何光怪發一夜蛟龍怒相逐雨聲徹旦雷聲奔列缺不斷髙空痕崩濤萬壑吼萬馬此時已囓孤亭根為客睡眼不曽著遣涉滂沱問安樂莫將風物動鄉愁且覆青州銀鑿落吳郎歌送翁晉北遊京師舊知吳郎名不識吳郎面長帆忽卷大江雲炎風五月來相見披衣倒屣開我關舉杯熟視成潺湲身如海鶴目巖電恍然再對吾師顔謂我垂髫稱國士于今垂白棲空山生死凄涼知已報南望其如路阻艱吾師當日詩名起後駕方稱王與李庭前秀出瓊樹枝復向騷壇執牛耳源泉萬斛瀉胸中風雨千重飛筆底能以遺形貌古人還將學步嗤餘子白眼情知禮法疏神心不受風塵滓北遊一泊汶陽船小榖城東寄數椽幾回暝色來新漲幾夜秋聲聽早蟬仰天擊劒舍我去又向長安大道邉昭王臺畔金精拄鄒衍宫前海氣懸弔古應歌明月塞憂時欲賦帝京篇江南才人滿人口目中如君不數有有衣莫染洛陽塵有錢莫買新豐酒漢廷公卿多世交燕市屠沽非素友君王正起通天臺子虛上林出君手男兒七尺遇有時安得竒才長不偶歸來為我一掃岱峯雲夜看海中赤丸跳如斗榖城山館集卷五
