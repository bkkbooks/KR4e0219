body:
  text: 榖城山館集卷三明于慎行撰五言古詩飲鮑莊泉石淙在泗水縣東行歌涉沂泗暫偕魚鳥歡碧草夾修逵炎風吹我冠道旁有嘉樹四月秋聲寒俯見石淙水突出成潺湲清虛涵雲日滴瀝鏘瑶環主人有逸興為我陳盂盤解衣坐魚笱揮手截素湍瑩徹青玉鏡照我顔色丹泠泠漱瓊液飛沫盡可餐祓洛未為盛臨濠愜所觀遲暉速短炬走海無停瀾能將雙蓬鬢逐彼兩跳丸長謡望前路於此且盤桓石竇泉異哉石竇泉此竅何年鑿湓流鳴地底砅岩成大壑駭浪懸且騰驚湍飛復薄歘如玉壺倒靃似春雷躍片片廣陵濤灑作霜天鶴增澆旋石瀨猗靡龍鱗絡淈汩入回淵欲去復疑卻孟公酷好竒取瓢承濆瀑我亦一俯首慡然心魄愕四月衣袂寒共謂秋霜落嗟哉造化工於此固槖籥從泗上歸宿杜太學莊舍暮從川上來兩袂涵清輝回首睇泉皋蒼茫紫煙飛相挈入村舍解鞍控板扉牛羊深巷入雞犬空墻依中庭有花樹鬱鬱何葳㽔山月在簾牖星河亦已稀宛然林壑姿顧視朝市非主人有旨酒行吟聊共揮避世豈在逺此中可忘歸登嶧山絶頂有懷賈大卿石葵兹山一何髙岱宗青未極峻削玉芙蓉去天不盈尺我來嘯良偶杖䇿探竒迹窈窕尋幽壑嶇嶔捫絶壁俯首瞰虹霓四望寥天一重隂萬里生遊目忽不懌睇彼東南陬山川含奧邑滄浪如衣帶半挂青巖色中有素心人寤歌方宴息欲往一相覿其如修路隔據彼孤桐枝臨此萬仞石願因天風吹達我心相憶曲終絃欲絶撫琴長嘆息曝經石泰山下址朝下天門關夕憩曝經石此石自何年斜倚萬仞壁疊嶂灑飛泉匹練百餘尺水底玉篆分了然成鳥迹其文乃上古讀之茫不識誰參雪竇禪永示金仙迹渌池低寶樹宛見祥河出兀坐聽潮音洗耳心方寂送范涵虛太史入閩臥病謝人徒塊焉處寥廓客從何方來緘書投我槖開緘見故人我心忽不樂問子今何適行行入甌駱甌駱日南陬思客春梅落冉冉江中雲迢迢海上郭太息念我曹十載依銅爵云胡乖羽翮南北成離索驚颷拂林樹洪流奔大壑鳯棲無靜柯龍遊安所托聞君有良劒舊在豐城鑿佩之入山海不能逢不若寶此千金質百鍊焉能鑠今我方無為草玄惟寂寞寄張洪陽殿讀豫章四首月出何皎皎照我堂南端愁人苦難夜躑躅起長嘆長嘆將何思念我平生歡江湖萬餘里道路阻且難孤鴈過我庭悲鳴風正寒願傳尺素書報爾青琅玕書成在懷袖涕下不能看昔我從良友翩然遊帝傍有如雙黃鵠厲翮起髙翔風波一相失天路何阻長三秋為一日噭噭遙相望周周嘯儔匹銜羽正倣徨麋鹿索其羣孤號在莽蒼咄咄久沉吟為君心內傷海上有浮雲鬱鬱雙龍闕何意回颷吹翳此瑶臺月風雨忽𡨕𡨕九關不可謁直木忌為材甘井常先竭人生百年內鼎鼎何超忽日月跳兩丸誰鍊黃金骨富貴亦何為芳華有時歇寄聲問所欽好食山中蕨王陽方結綬貢禹亦彈冠虞卿為其友解印去邯鄲千金重然諾百折不辭艱窮逹相與俱飛沈豈異端末世逐榮寵斯道亦已難裊彼女蘿枝纒綿誠可嘆君為千尺松我為一握蘭蘭松不相結惟以共嵗寒寄習豫南太史閩中二首颯颯雙鳴鶴集彼玉樹林凌風振逸響各有九霄心如何乖羽翼形影互飛沈君滯炎海上我棲梁父隂佇立望川梁江路迥且深豈無一札書飛鳥不懷音眷彼越鄉嘆感此年嵗侵一為同心謠涕下霑衣襟日夕登髙臺悠悠望南海南海不可從萬里隂雲靄念我同心人留滯方何在一出咸陽門嵗事數已改眇眇睇空江曄曄生蘭􅉅日晏江水寒美人殊不采如何桃李顔含笑揚光彩保爾嵗寒心芳華自暗靄送田鍾台宫諭視篆南都二首東風入上闌衆草靡靡緑有客逺行遊倚舟河水曲河水深且長帆檣千里矚金陵佳麗都洵美多舊俗石渠對圖史吏隱諧所欲奈何卑棲子風塵獨躑躅緣木諒難工積薪空自束極眺逺行雲願作雙黃鵠别日一何久會日一何難浮雲滿天地遊子路間關為君置斗酒四座慘無歡仰視明星輝俯觀溝水瀾聚散諒無凖浮沈寧足嘆少年多意氣碌碌非所安願敦久要誼相期以嵗寒夏日邀朱令君飲楮村石淙山公在襄陽日醉習池月歌聲起銅鞮至今名未歇我侯有仙標邈與世人絶抱琴出邑郭來采石淙蕨石淙何潺湲流水噴玉屑蕭颯洞壑鳴五月寒人骨方塘一片石混沌本無缺自從庖羲來畫作赤文裂逺望峽水流猶似天山雪此中有真賞欲語不可説掃苔臥石坪山月歸可挈七月十五夜同朱令君吳文學泛舟北溪抱病臥江海屢經故國秋閉門覽羣動自得靜者謀仙宰有逸興強我北渚遊時值七月望寒蟬呌新秋槐柳夾修岸山鳥鳴啁啾搴帷望孤嶼回橈背古丘歌聲上雲漢玉管吹汀洲須臾緑煙滅好月尊前浮皎如瑶臺鏡瀉作金波流仙人垂素足桂樹枝相樛掃石布瑶斚弄水驚素鷗風飄寒梧響露下莎雞愁清景不可奈中夜仍淹留歸路悵明發此歡焉可求登華不注絶頂齊都多名山兹山獨邈絶中峰帶湖水華頂留寒雪一枝玉芙蓉翠黛若可掇我來凌青冥倚嘯紫雲裂嵐氣互氤氳波光半明滅平野碧煙浮長隄春樹沒流覽望扶桑欲見蓬萊闕雲間逢真人舉手問寶訣泠然紫芝想了與紅塵别佳遊難再得夢想何可輟泉上偶坐泉上石暫與人境隔天光涵清虛水木有佳色心對遊魚間目送孤雲白涼颷山際生微雨天欲夕送楊廬山戶部左遷淮陽華月出髙牖新猋激廣軒斗酒酌良夜君懷胡不歡昔藝名城樹今握畫省蘭作吏既強項為郎亦苦顔如何流雲景奄忽無定端言從淮海至又客淮海田耎摻袂即往路永嘯涕汍瀾騄驥志千里松柏厲嵗寒壯心苟不渝坎壈亦何嘆去矣崇令圖久要慎莫諼壽四明沈封君九十林類不知隱行吟聊帶索伏生老嗜經於道為糟粕何如海上閭三老同賜爵上老氷雪肌下老顔如渥中老正敷愈九十骨矍鑠釋智絶町畦縱心遊恬漠有子漢列卿名在石渠閣洗沐一來歸六傳歡城郭玉笈緑綈封寶駟黃金絡華旍既綏綏綟綬何若若上堂問起居跪進丹丘藥羣從歘相從翩如鸞與鶴仙氣結雲霞君恩散林壑翁其愛玉體延年千嵗樂題王母圖壽新建張太夫人西山一何髙上有列仙館阿母幾何年皬然霜髮短丹室搆瓊英霞衣出火浣上元受寶訣雙成吸玉管俯視瑶水波幾度清且淺青鳥雲中遨飛鳴正睍睆玉函墮真圖仙氣人間滿侍中嵗星魂燕喜何衎衎取彼玗琪實跪進車渠碗若木曉暉長桃花春氣緩一奏玄雲謡永歡閬風苑哭弟三首嚴霜下前除朔風凄以烈今夕復何夕同生成永别疾疢能幾時音容忽已滅稚子號中閨阿母啼成血有兄滯天隅之死不及訣仰視雲間鴻呼羣中斷絶俯觀庭中樹瓊枝已再折永嘯涕如雨沈憂鬢成雪豈不懷大觀至情疇能掇天地有大運物化莽茫茫蟪蛄一何促彭𥅆一何長摧心嘆吾弟茂齡成夭傷明珠沉碧海神劒蝕精光念子平生日沈痛結中腸俎几設虛奠旨酒盈素觴魂兮無不適當復來我旁屏營望南阜攬涕下沾裳昔我過里門訣爾衢路側撡袂對賔友悲風聲正迫猶言生離苦知作窮泉隔含意恨未伸生死各脈脈眷懷握手地心折秋山陌人生一世間忽如逆旅客誰能以蘧廬噭噭號真宅三復桑戶吟一哀聊自釋擬門有萬里客行送胡孝廉孟韜孟韜為其先君求志逺走長安云門有萬里客攝衣造我堂風塵著眉目車馬倚道傍問子今何為執手涕沾裳自隱匡山隅承歡樂且康三復南陔詠旋廢蓼莪章飲棬悲鳴木陟岵悽嚴霜日月既不處遺德亦未忘幽蘭委澗沚無風誰為揚願子片石書永我寸草腸以兹冒炎暑屣履涉江湘我聞再三嘆俯仰以倣徨亦有明發懷感此中情傷念君苦行役且復盡一觴修詞諒非任其敢沫餘芳君懷雙虹劒耿耿明星光一當萬乘主為寶誠難量如何慕臯魚空為孺子愴歸其保玉體天路以翶翔題張中丞傅野萬玉山房卷吾慕竹溪逸愛此竹樹林悠然展幅素緑玉何蕭森萬竿挺寒翠千畝橫素隂亦有髙節士結廬江水潯夾池亂橘柚拂檻鏘球琳詎開蔣詡徑但撫山公琴朅來仙省遊雙管耀華簪截彼虬龍簳寫兹鷟鸑音無為眷荆渚寤宿增遐心此君在几席可以淡塵襟念本孤生植冉冉泰山岑願為琅玕贈徙倚一長吟送王宫庶師竹請告南旋凛凛嵗云晏雨雪彌中林念子即往路河梁阻且深草年事明主謂比雙南金國恩豈不懷胡然有逺心東臯解懸耜中谷發鳴琴松蘿夾戶牖山水流玉音何如長安遊輿馬日駸駸素衣一以染華髮又欲侵蹇豫魯狂生于今亦越吟送爾結長想極目青山岑貞婦吟為長安潘氏母賦中庭何所有藝彼竹與蘭竹蘭被戶牖玉樹羅堂端天風西北吹衆香越以繁借問此何居言之辛且酸本家東海上羈旅在長安良人早見背遺嬰亦已單秉心在氷蘗誰能惜盛顔楊枝耀春華柏枝凌嵗寒豈無青陽輝良非我所觀補衣為兒襦輟食為兒餐兒從長者遊斷髮佐兒歡以此持門户幸不墮衣冠我聞慕且悲此義世所難共薑名不沫文母節未殫試為貞婦吟一倡再三嘆上外舅秦翁生辰近親同里門逺親異鄉邑何况舅甥歡津梁千里隔宿昔忝乘龍門闌在咫尺阿翁豪且賢雅稱閭右室遲暮無它男所托惟女息草年隨宦遊庭階亦寥寂中嵗鞠兩雛恩勤瘁心力女兒在襁褓男兒操紙筆翁媪嵗時來撫摩均自出伊豫久懷歸蹉跎年嵗逼惻愴骨肉情含辛念非一兩雛忽相牽長跪繞我膝屆兹中元秋阿翁弧矢日賔從列中堂杯觴行絡繹兒母在天隅間闊增煩悒請耶纂片詞寄我離孫臆我聞兩雛言吟嘆心戚戚孩抱亦何知母慈良可識翁今七十三媪亦過七十丹顔未全改縝髮但稍白矯矯矍鑠姿少壯或不及海桑千仞枝池桃千嵗實鬱鬱岱山松纍纍丈人石持此壽翁媪永列丹臺籍時和復年豐娛樂加餐食早晚歸山樊聚首多夷懌揮翰為長歌歌闋情未極冬夜方胥成過訪玄雲結重隂北風凄且寒端居寡言宴惜此芳嵗闌客從逺方來入門正其冠解裝出所有贈我青琅玕其物有光耀握之感且嘆華鐙列堂隅酌醴羞盤餐片言意氣合昵若平生歡風雅久淪替學海多狂瀾衆目徒熒熒誰為曠古觀問君四方志前路何漫漫時俗賤文史世事多艱難勉哉樹芳軌榮名不可殫春日寄陳從訓上日臨髙臺平隄草已緑感物動我思騁望春江曲春江不可涉幽人在空谷葺彼桂蘭宇好此蘿薜服舒嘯穆鸞凰結佩鏘瓊玉居依戴顒宅遊踵焦君躅豈無席上珍風塵匪所欲一為傾蓋言相期違世俗十年曠良覿念子心煩促寤寐豈不諧綿道如川陸悠悠河上魚渺渺雲中鵠緬懷一札書徒勤萬里目眷言崇令名加餐以為祝題崔仲素郡丞撫松亭藐彼海上山雲氣何寥廓中有孤丘亭蒼茫臨大壑約壁荃與蘭塗材匪丹雘亭端亦何有長松雙落落下根盤虬龍上幹棲鸞鶴泠風無時休秋霜被已薄主人北州牧解組耽恬漠亭中諧寤言松下恣盤礴月出鼓鳴琴永夜聲蕭索載詠彭澤吟古今偕至樂顧見泰山隅五株良有托萬古稱秦官貞心無乃怍請移植此亭為假山中爵食彼偓佺倫共錬延年藥間居述懷白日御颷輪西下何其速河流東到海日夜波聲蹴人生正百年榮華不滿目君今亦胡為沈吟長蹢躅北里有良友南鄰多舊族相羊山水間聲若絲與竹斗酒可相娛極宴適所欲何必宛洛遊裘馬相徴逐制命固在我無為自局促新春獨坐有念青陽布嵗和鼓籥回嘉律如何后皇心條風猶慘栗七日不出門塊焉坐斗室咄嗟顧庭除感念端非一豈無閭巷歡亦多朝市匹白首盡如新誰為膠與漆避世良所欣延齡豈有術人生陶大塊飄如駒過隙苟欲役風塵何物關名實旨哉盈觴酒優遊以永日元夕家宴示諸子姪端居逢節序中情鮮所歡常華既云瘁谷風良不完佳夕謝賔徒且復陳盤餐丱辨既列侍孩抱亦團圞尊酒日云晏華鐙爛以繁九枝蘭桂燼四照玻璃丹笑語不知疲迢迢清夜闌永懷家門念俯仰固多端依棲幸不逺蕃碩已可觀慎旃各努力保作誠為難泰山對酒贈馮琢吾少宰晨登泰山坂四顧何茫茫浮雲蔽若木旭日開扶桑隂晴倐忽變登頓多蒼黃長風四面至烈烈吹我裳客子駕言邁行行陟帝鄉前有一尊酒臨此萬仞岡綢繆亦何念展轉不盡觴結交眷金石悵别懷參商髙舉步萬里遊目涉四荒其雨怨杲日若濟思舟航努力事明主庶令泰道昌靈巖送别琢吾山館夜不寐起視明星微北斗挂楹牖天河垂欲晞客行一何遽申旦從此辭十年聊一晤此後長相思斗酒不得醉涕下沾裳衣君如山上雲作雨彌天施我如澗中石抱此不化姿浮沈各有以本自相因依寸心苟不渝安在合與離願言保黃髮待子成功歸寄題朱金庭宗伯逍遙樓一首我有同聲偶宛彼天南隅十年曠色笑萬里違音書坐逢越方人跪問今何如方修南華義閉迹重樓居重樓何縹眇回架名山隅星月宿雕檻虹霞帶綺疏雲門列遙障剡水周前渠冥韜寡談宴遐眺多謳歈違哉曠士懷自執環中樞鷦鷃棲非隘鵾鯨潤豈餘至遊苟有托焉適非吾廬君今息溟海吾亦耽枋榆室遐人尚邇年往意未疏恨無雙飛翼徑度三山閭永言鬯玄旨婆娑以自虞蜀山湖遊太宰吳介肅公精舍感述渺渺泛平湖亭亭望孤嶼秋風莽蕭瑟川光淡容與昔有素心人此焉耽宴處下帷探道帙閉關謝塵侣狎從鷗鳥嬉遐慕鴻鵠舉國卿豈不崇視若鳶與鼠遺構今尚存髙芬疇克旅白雲去不還寒山靜無語景行不可得回橈徒延佇壽周燕川封君為司理周君作逖彼瀟湘水北流雲夢隂鍾靈孕華閲寶樹何蕭森長公楚山玉仲甫荆南金叔君何所韞葆此席上琛力田笑株守談經軼陸沈甫志藍田璧旋鳴單父琴政聲彌漢沔士譽播江灊自振雙鳬羽還成五桂林名郎負竒采天闕彯華簪執法奎婁野揚芬岱嶽岑奏牘荷殊寵陟岵勞逺心秦雲睇菴薆蜀道歌嶇嶔願言蘄壽祉酌斗思愔愔長跪再有獻所獻非球琳玄霜十洲采瑶草三山尋服此顔如渥無使華髮侵漢水誰謂廣湘水誰謂深聊挹滄溟潤流君世澤吟冬日得馮少宰用韞書問寄謝一首北風一以厲雨雪何漫漫江湖莽浩渺周道阻且艱故人在千里寄我雙羅紈織成不惜逺為念衣裳單感兹平生意提挈再三嘆别離未覺久年光忽欲闌幸有裘與褐可以禦嵗寒七章匪不麗所適燠且安卷衣置篋笥怊悵不能諼題睢陽魯夫人貞壽卷伯姬魯國女作嬪儀宋宮委身殉烈焰名與天壤終伊誰嗣良軌請歌貞媛風淑靈稟鴻造典訓開儒宗生年汶陽里逺嫁梁園東君子秉明誼德心協所崇瑟琴諧雅調環琯多莊容嬿婉未及竟隕棄號蒼穹秋霜激素質朝日明丹衷和丸佐兒誦停杼代兒舂日永非在夏宵長非在冬奄忽嵗年邁拮據堂構隆永懷背堂念不受清臺封貞如幽澗柏含翠凌髙空皎如旋淵玉吐耀干長虹母師饗嘉號女史圖芳蹤一為鳬鵠嘆感慕何時窮慰宗侯玄同契丈居廬端居嵗云晏雨雪塗周行寒夜不得寐起坐思天方天方有良友皎若圭與璋間者闊聞問匪謂殊津梁方修倚廬禮自廢蓼莪章天風號林樹烏鳥鳴聲長曽閔既人紀臯連亦國良吾邦賢聖里風軌敦侯王願言一往慰我馬摧以黃居諸諒已迅霜露多悽愴光前固有道孺慕徒為傷君其勉餐食錫類方未央謝少傅蛟門沈公書問徙倚步中庭仰見飛黃鵠黃鵠自何方遺我一尺牘開牘見所欽慰借溫如玉為寄雙織成無非錦與縠卷書置懷袖感嘆不能讀匪無逺道思畏此川塗曲間别十餘年故情猶爾篤欲以報綢繆山雲不可掬天道有盈虛人情多蹢躅狐白豈不珍褐衣亦已燠苟存嵗寒心不在違所欲題吳母貞裕卷二首衛薑植特操鄒孟秉義方貞哉延陵母曠古嗣遺芳素衷矢皎日烈質凝秋霜笄總奉君子瑟琴靜且良一為終天訣掩鏡銷鉛妝晨炊井牀凍夜績釭輝涼中庭長瓊樹復泛崇蘭光璇室有彤管名與星嶽長永言歌黃鵠三嘆沾人裳女貞既有樹女清亦有臺不如母師號雲漢天昭回丹泥北堂耀璇榜深閎開表閭與錫命流耀江海隈子為簪筆史倚柱稱瓌材孫為含香吏抗章胡壯哉家聲一以振母節益以恢正氣凛千古榮名肅九垓歌言樹令軌以拯流風頺瑞榖謡為郡伯劉公賦我服汶陽隴穫彼麻與菽道逢拾穗人軒眉行鼓腹問言何所欽吾邦有仁牧濊澤若雨暘庶徴協寒燠芃芃萬寶登穰穰三秋熟舊聞嘉禾名今見嘉禾蔟一莖二三岐多者至五六異畝荐周塍合頴標唐籙惠露灑瓊臯條風披廣麓上充德政符下錫氓庶福不謂憔悴餘歡聲洽比屋我聞三嘆言地寶一何渥有淵不産珠有田不産玉固知聖后心所貴惟民榖願以魯史書仰佐豳風祝昊貺感皇仁流膏豐海隩題鄭雙峰先生鄉賢卷册谷口有逸民秉耒在巖穴儒宗遁北海牧伯欽髙節二公世所師豈伊青紫列誰者嗣流光華胄棲東越握槧謝公車服隴耽郵畷獨行州里孚篤誼神明徹生不采芹遊沒從舍菜醊典禮曠無前清芬耿不滅神報一何延永錫鍾遺厥亦有公衮褒金書貤象闕種木百年隂種德百年烈末俗徒皇皇芳規胡不晰題邵武丞鄭公名宦傳册古者侯與卿侐寢無遺迹桐鄉一嗇夫至今有社稷民志諒難諧德聲允無斁邈哉邵武丞乃與千秋匹蚤耽竹素編暮隨升斗檄十載和鳴琴鸞鳯棲枳棘折獄照覆盆賦政懸尺籍老挂武夷冠雲臥仙巖碧猶餘棠樹隂清風滿舊邑長吏備時蒸澤宫參侑食赤紱豈無人伊誰分半席柳勒武功銘韓記藍田璧婁江筆如椽亦永循良績公真不負丞是為黃綬式紀夢二首昔夢遊閶闔謁帝明光宫天衣馮玉几顧笑回春風眷言苦行役賜酒盈金鍾飶芬滿襟袖色瑩玻璃空吸之不能半已覺衰顔紅洗爵再拜謝幸免傾側容小臣升斗器既醉心怦忡沈湎豈不愈無乃災微躬大福諒不再君恩既有終夢從化人遊虞我以竒巧平地疏清渠中有萍與藻遊魚三五頭淫裔何鮮姣良無波濤驚似有雲氣繞臨流羡且觀不知牀月皎記念在恍忽躊蹰至天曉夢中幻已滅寤言復何道榖城山館集卷三
