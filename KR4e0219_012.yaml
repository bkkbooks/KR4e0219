body:
  text: 穀城山館集卷十二明于慎行撰七言律詩送張洪陽年兄上南少司成二首西清法從沐恩偏日日論思捧御筵豈謂廷中摧五鹿復教門下紀三鱣離聲薊苑河橋雨别夢秦淮月夜烟十載同遊詞賦客只今結綬是君先離合相看一愴神百年寵辱夢中身無將建業秋江水不及長安綺陌塵天畔文星珠斗近座中時雨絳帷春應知暖席無多暇乂奉徵書入紫宸送孫柏潭太史冊封唐藩便道省覲射策名高賈洛陽青春擁傳有輝光花迎玉節槎凌漢葉剪桐圭土胙唐客路千門江上月主恩三殿署中香非關晝錦偏生色自是庭幃寵渥長送盛鳳岡太史冊封蜀藩寶玉親頒示展親還因諭蜀論過秦雲凝閣道青天險家近關門紫氣真玉節遙分三署色金羈行耀五陵春懸知萬里橋邊路共指軒車問使臣題韓敬堂殿講牡丹石榴畫卷時值雙壽稱觴並呈此瑞仙種何年福地栽巧分春色艷亭臺丹房並倚珠林結繡萼雙依翠幄開味勝緋桃金母醉花先紅藥侍臣回合歡正值稱觴日滿目天香拂酒杯送沈少陵太史請告鶯燕晴嬌禁苑春冥鴻何意出風塵到來天地傷多事歸去江湖尚有人射策彤庭干氣象上書黃閣想風神敬亭秋色堪高枕不負蕭條報主身同可大城西寺樓眺望石林香岫鎖氤氲百尺危闌倚落曛雙闕湖光涵鏡彩九陵雲氣吐龍文烟銷野色愁中見風起邊聲醉裏聞諧俗不妨聊對酒從他塵世自紛紛觀慈壽寺新造浮圖鳳剎新從佛土標芙蓉千尺翠岧嶤璇題玉甃中天起法雨曇雲下界飄勢挾珠林雄禁苑影分銀漢掛烟霄羣生福果緣慈祐輦盡黃金此地銷夏日登毗盧閣寶界高懸百尺樓丹梯半上不能休窗臨星斗諸天近壁繞烟霞五月秋迢遞羣山橫大漠蒼茫一氣辨皇州憑闌欲起悲歌色人代何緣此勝遊夏日崔明經正思五弟同遊韋園韋曲城南曉霧開炎天深樹鎖亭臺漁舟隱見花間出鷗鳥浮沈杖底來香散芰荷殘過雨烟飛蘿薜冷銜杯帝城風物家鄉侶醉倚青林首重回送朱鞶峰鴻臚之金陵二十年來憶舊歡相逢斗酒醉長安尊前華髮流光易陌上驪歌别路難江月遙分鳷鵲觀宮雲不散鵔鸃冠到來綿蕞開王㑹劒佩聲中擁漢官秋懷四首露下天空木葉流滿懷蕭瑟一登樓江湖鴈影催鄉夢城闕砧聲起暮愁萬里風塵燕塞逺千門雲月漢宮秋紅顔華髮悲生事金爵銅駝感壯遊極目高空一鴈翔十年萍跡滯天方芙蓉曉露愁邊白薜荔秋山夢裏蒼病似相如聊著賦鬢如潘嶽尚為郎憑闌此際渾無賴日晚寒生畫角霜風入疏林月半橫秋聲一夜壯心驚柴桑故自饒歸興中散由來少宦情名利百年身易老文章千古事難成恩深未報慙明主苦憶深山桂樹生舊隱林皋幾放歌蓬𤣥西洞長烟蘿清溪日落魚梁出翠嶂天長鳥道過醉裏白雲揮袖滿秋來明月倚闌多不辭便作風塵客鶴怨猿驚可奈何秋日答李本寧太史秦中四首西風蕭索五城秋望斷秦關感舊遊一自宮磚虛日影至今仙署想風流鴻歸上苑書重到月落楓林夢亦愁聞道龍門連太華何人得並李膺舟斗畔何年少歲星搴帷聊復試傳經關門氣自車邊紫太乙藜從閣上青忽見雙魚傳札素疑聞三鱣落階庭不知玉女峰頭座可許生徒隔帳聽憭栗霜天萬木聲愁看落葉太縱橫青山已自盈秋色白眼從來冷世情經術但傳秦博士疏狂莫笑魯儒生加餐鄭重勞相念祗有庭蘭夢未成千里離愁鬱不開故人佳句傍誰裁秦臺鳳女簫三弄漢苑仙人露一杯歲月吾甘梅尉隱乾坤爾自賈生才春來若有書相問尺素應知海上回秋日書懷奉寄二兄避世年來華髮侵秋情旅思兩蕭森虛談仗馬當時事實負冥鴻萬里心客裏常思陶令酒愁邊幾作越人吟天涯兄弟長相憶明日青山是舊林答塢汝翼見寄積雨挑燈思不禁開緘忽見楚人吟芙蓉自抱三秋色鴻鵠誰知萬里心别憶青尊江樹杳夢回明月海雲深無勞漢署懷方朔金馬于今總陸沈奉㫖代撰恭祝聖母萬壽二首寶祚恭膺幸有年為承慈訓化機旋東朝共祝增仙算大內親趨捧壽筵律轉一陽熙舜旦石將五色補堯天母儀仰見超前古圖史應令萬祀傳璇霄南極現祥光入仗親稱萬歲觴寶座三重開內殿法音九部舉東廂華嵩效祝春難老衮繡承歡日始長願酌滄溟添壽紀年年流慶衍天潢秋日有懷伯仲兩兄一鴈橫空玉塞寒疏星淡月倚樓看鄉山有夢秋先到京洛無心興已闌多病長卿聊罷酒長貧仲子未彈冠鴒原别恨年年劇無那浮踪去住難冬至南郊扈從紀述和陳玉壘太史韻八首聖后乘乾奉帝禋日躔南陸協靈辰九關肅啓天門鑰萬姓歡隨御輦塵樓雪初融丹禁曉葭灰微動玉衡春虛慚珥筆親文物實有甘泉賦未陳平明閶闔五門開法駕驂驔匝地來雷動千乘天廄選颷馳七校羽林材金支翠蓋雲中轉紫斾紅幢樹杪回清蹕尚喧雙鳳闕前驅已戾九成臺陽靈仙館翠雲端竹殿清齊禮泰壇閣道霓旌陳虎豹宮門羽仗簇鴛鸞親軍競帶千金劒御馬齊籠七寶鞍總為天光依較近溫泉午夜不知寒玉蘭東畔畫簾前到處常隨豹尾旋聖代儀文今日盛儒臣雨露向來偏琅函賜錦馳中騎寶鼎分餐出御筵齊室受釐應有問朝回猶恐夜深宣絳闕隂沈啓祕扃鑾輿肅穆欵真庭霜凝碧落天衣濕月上仙壇玉樹青帝座三重開萬象雲門六變走羣靈祠臣秉笏香烟裏時向珠纏望景星絳節氤氲上太清紫烟縹眇冠層城鵷行不動瑶池影鳳幄微聞玉藻聲律應一陽璇象轉福凝五位泰階平禮成回蹕傳行漏百尺華燈闕下明燈火薰天夾路旁屬車旋處翠華張非烟擁蓋璇霄麗若月乘輪御陌長十里香花連泰畤千門鼓吹徹昭陽皇誠已自通天貺萬祀應知寶祚昌紫氣葱葱繞禁廬南郊迎日履長初皇王禮樂光前殿侍從聲華滿後車漢畤龍麟金匱紀周臺雲物彩毫書雄文亦是鄉人似齊客談天恐不如題李棠軒太史風木卷水部才名世所傳平生舊事付新鐫青箱纍葉承先慶玉署重輝啓嗣賢天上樓成曽有夢人間鶴去不知年只今隴草悲仙吏歲歲春風泣杜鵑葛端肅公挽章四首朱輪幾日下明光一夜台星遽掩芒名德纍朝耆舊盡風流前輩典刑長百年海嶽收靈氣三省官僚紀奏章莫訝臺烏來去少荒原終日咽長楊五十年來社稷身世皇時已畫麒麟車行陜潞千家雨㦸擁幽并萬里春北極星辰三聽履東山烟月幾垂綸九重此日宮懸徹鼓吹黃腸寵使臣華年聲價省郎遊一節氷霜到白頭降嶽神生星應昴濟川功就壑藏舟朱門舊第公槐影落葉新阡宰樹秋惟有故時雙鶴在月寒華表不勝愁里閈衣冠舊侍公每從便坐接春風臺端劒履容猶在海上桑田事已空畫閣勳名應自逺蘧廬夢覺總難窮不堪片語牛山望千古英雄涕淚中雪中臥病楊廬山至京枉過春城雨雪臥袁安仙令朝天駐錦鞍萬里風塵隨聚散百年湖海見交歡翻疑夢杳羅浮月好在香分畫省蘭伏枕燒燈渾未厭坐來鳷鵲夜光寒送楊廬山之官鹽城宮草含青雪未消送君斗酒夜迢迢愁邊曉月雙鳬逺醉裏晴雲五鳳嬌澤國魚鹽多負海春城烟雨半通潮只今滿目看萑葦豈藉催科答聖朝病中朱廷平可大攜談易王生見過書懷宣室情知久荷恩旅愁無奈泥芳蓀十年玉署塵心冷一片青山素業存病裏風雲天北闕春來花樹魯東門欲知朝市浮沈理季主長安好共論病中乞歸懷寄中立王孫銀榜仙宮桂滿巖何時雪夜掛孤帆枕中鴻寶新來注海上魚書舊日緘千里歸心看短劒百年病骨付長鑱王孫苑路今應近芳草春風㸃碧衫都門留别諸丈不緣多病壯心消敢向清時逺市朝三殿恩華淹日月十年歸夢落漁樵宮雲欲散飄衫袖别酒初醒見栁條最是河梁分手地桃花潭水碧迢迢潞河寄都下舊遊承恩霄漢苦思歸祗憶深山長蕨薇去漢梁鴻藏姓字還邛司馬借恩輝身輕已覺愁顔改戰勝應看病骨肥回首金閨多舊好别時情思各依依嘉靖壬戌從三兄無擇下第同歸有過桃花口詩至萬厯已卯請告南還復過此地詠兄舊句悵然有感用韻追和草載津亭唱櫂過依然烟栁夾長河花源尚記來時路鴻影空憐舊日歌人代三朝看過隙生涯萬事付流波雙棠舊館應無恙獨撫遺編思若何除夕呈二兄鄉閭風土弟兄居冉冉年光歲又除勝裏金花聊共賞尊中柏葉肯教虛居鄰碧海三山路交絶長安七貴書猶有謝家辭翰在春山遊眺許誰如庚辰元旦試筆簫鼓初闌旭日開小庭春色欲重來靈符舊篋金閨賜寶勝新粧玉剪裁歡洽兒童隨笑語恩深禁闕憶趨陪誰將柏葉調仙酒為薦君王萬壽杯寄懷朱廷平可大兼訊于澤州子冲入覲歸來無日不思君畫省風流久未聞上苑鴻聲愁處聽長亭春草醉時分雙龍自合天邊氣五馬遙停塞上雲莫問同時舊年少已從樵牧隔人羣寄賈石葵廷尉百年踪跡總飄萍懶向風塵問醉醒臥病梅花江上白懷人芳草夢中青天懸臺館占卿月地入江湖隱客星聞道乞歸歸未得主恩不負草堂靈春日山中有懷趙瀫陽年丈時官南越不關寂寞重相思心折長安握手時萬里銅標人落魄十年金馬事參差眼青楊栁東風日頭白梅花北向枝惟有魯狂容聖世五湖烟水足恩私山中書懷答朱可大廷平二首海水天風莫重論吾曹交誼向來敦馮歡長鋏應猶在范叔綈袍故自溫千里人歸孟諸野十年客散信陵門閒心已絶諸緣纍獨有平生未報恩天末懷人思不降夢回明月滿軒窗平生諾重黃金百國士名齊白璧雙君自風塵淹畫省吾甘漁獵光滄江書來正值山間醉赤腳吹笙臥石淙上外祖母麻王二太夫人七十偕壽二首元公宰木閲居諸二母仙闈鶴髮餘盝裏尚藏金殿草座中時展玉函書幾看萊服連鳩杖時過潘園並板輿勝節稱觴應具醉春江昨夜罩雙魚堂上春深並錦袍中丞甲第五雲高麻姑自閲桑成海王母親栽樹作桃舊德共看麟閣畫餘光殊有鳳池毛恩深自出無由寫頌壽應慙乏彩毫香山寺閣同朱令君賦寺在邑城北河上海嶽秋光幾處看珠林高閣此憑闌河流曲抱孤城逺山色低邀落日寒野思蕭條聊對酒愁心跌宕罷彈冠仙遊幸躡王喬履夜月雙鳬去不難曲阜謁顔廟素王宮闕魯侯臺兖國崇祠此並開位冠元公師友㑹道同皇佐古今才虛亭玉甃疏眢井舊巷璇題銷繡苔門外依稀餘輦路前朝曽覩翠華來鄒縣謁孟廟邾城舊里記三遷廟貌𢎞開大道邊行地江河疏聖𣲖談天奭衍閉言筌洙流近映金鋪日嶧嶂高含畫棟烟北望孔門元咫尺明禋終古侍雕筵趙莊泉流觴處處名泉盡客歡一泓復向道旁觀林衣倒拂仙杯動石髮晴分寶鏡寒要眇琴聲流水和疏狂酒態野人看他時漫擬蘭亭勝不似滄洲有釣竿杜曲泉贈杜長君太學十日臨流幾醉醒又從杜曲俯清泠參天翠樹全成幄夾路芳泉半似星水色平侵春草緑山光遙映暮雲青狂遊無奈逢豪客倒盡君家碧玉瓶遊嶧山還過魯城西郭有懷中立王孫二十年來感舊遊緑雲遙見隔城樓逢人恐識關門氣訪客真成雪夜舟魯國山川空自賦梁園松桂為誰秋何時却有論文地尊酒同銷萬斛愁田鍾台殿讀初春詣闕是秋即請告南旋寄此戲問春深裁報謁彤扉為底逢秋又拂衣舊隱青山何處問同遊詞客幾人歸囊中大藥還多少天上浮雲可是非萬里摶風應有待且隨陽鴈往來飛周亭山先生舉明經入對名家魯國舊登壇初捧賢書解鶡冠貢篚璆琳天府受閭門羔鴈里人看燈分夜色青藜迥筆擁春雲紫殿寒儒術年來多所遇明經半補漢郎官同朱可大廷平登岱八首終古名山奠大東遙瞻雲漢倚穹崇千峰明滅天高下萬壑晴隂氣鬱葱星土盤回元化轉仙閭繚繞百神通真遊五嶽何當遍首躡烟蘿上碧空玉闕朱樓萬仞端六龍輦道倚㠝岏懸崖翠磴雲中轉壘嶂紅泉樹杪看海色曨曈三觀曉秋聲蕭瑟五松寒天門咫尺君應見比似人間路更難忽出塵寰賦壯遊試從九㸃辨神州浮雲直上千峰色落日長懸萬里秋紫塞東臨滄海斷黃河北繞大荒流秦封漢禪成丘土留與人間不盡愁倚杖高臨萬玉峰氤氲陸海散芙蓉寒聲半落天中雨暝色低催澗底鐘金檢誰探秦帝策白雲猶起漢時封君看十二侯王地能出神宮第幾重絶頂秋高上帝宮茫茫一氣俯寰中地盤河濟三州盡天入秦吳萬里空玉闕光連星斗上丹峰影落海門東亦知真宰多相藉許倚烟霄兩劒雄萬仞瑶壇冷夕曛斗邊三十六天分仙人洞府懸雙闕玉女神房切五雲遊客自成梁父嘆詞臣不草茂陵文東皇舊握羣生紀海國河山翊聖君高丘東望氣雄哉海色遙看萬里開三島春波涵日月五城仙氣吐樓臺酒邊影吸金銀動杖底雲飛紫翠來烟水茫茫徐福去至今不見報書回上宮夜色冷漫漫月轉層霄十二欄大地河山銀作海中天樓閣玉為壇虛無靈境簫聲斷縹眇秋光練影寒仙掌芙蓉看欲近轉從北斗識長安遊靈巖絶頂却望泰山玉皇觀珠林丹嶂倚秋曛絶頂開尊俯鴈羣萬木寒飛金地雨五峰晴幻紫霄雲上方臺殿尊前湧大國河山鳥外分回首天門歸指顧玉皇曽授赤靈文玉函山眺望即千佛山岱宗直北玉函開海客乘春躡屩來絶壁松杉含寶相中峰雲氣出香臺湖邊萬井烟光動城上雙河練影回青鳥不歸丹鷲逺仙踪佛地兩徘徊望雲翠山絶頂乾坤靈跡自何年縹眇孤標斗際騫矗立千尋疑掛日削成一柱欲承天蓀房近傍瑶壇路鳥道晴飛玉洞烟岱嶽西來如萬馬千峰雲氣總相連望􅱘山美盡東南第一峰神工削出玉芙蓉天門閣道金銀晃王母瑤臺紫翠封雷雨千巖聲自起龍蛇萬壑勢相從探竒忽動憑虛想安得仙人九節筇山北有王母臺答客書勸還闕三年孤枕臥人間秋色嵯峨滿碧山梅福不緣逃世隱揚雲聊得著書閒情知相府常開閣可奈書生自閉關珍重故人相問訊已甘蘿薜老紅顔贈侯甥允吉秀才吾家宅相貴鍾君名列諸生氣不羣彩鷟摩空千仞羽神駒鑠電五花文中丞舊護漁陽甲上將新營細栁軍兩世箕裘須爾繼好將雙管躡青雲山中述懷寄石葵賈丈秋山明月鴈來聲魯國相看自兩生聖世安危應有寄詞臣去就豈關名跡隨猿鶴心能化夢入鵷鸞骨尚驚辜負桓談知已在𤣥經寂寞幾時成壽高三塘徵君六十徵君邑丞兄也揚子人江上名家舊業傳蘭塘一艇狎風烟楚山桂樹留真隱秦洞桃花閲大年賦就秋濤淮海月夢餘春草汶陽天更逢寶策重開日綺席霞觴接羽仙代壽高三塘徵君璇極星華燭絳霄人間仙算紀松喬丹臺日映黃金蕊海屋春凝碧玉簫樓闕三山瓊島月池塘一𣲖廣陵潮藍田吏隱多鄉夢桂樹淮南未可招濟上對玉函山送子冲北上萬事悲歡可具陳十年五醉濟城春居然華髮生明鏡無恙青山對故人老去交情堪自見狂來酒態轉相親路傍莫訝雙龍劒雌伏雄飛各有神山中秋日報朱金庭宮庶空山寥廓鴈聲寒忽啓緘書出上蘭臥病秋風閒自賦懷人明月逺相看生涯湖海雙蓬鬢身事乾坤一釣竿聞道橫經承內渥還從折角笑彈冠山中秋日代書寄王對南宮庶丹楓蕭瑟倚重樓回首金閨憶舊遊片月常懸蓬島夢尺書幾隔鴈門秋新傳謔笑還多少舊和歌聲可記不亦有行踪君莫問三年漁獵海西頭寄羅康洲宮諭臥病山中華髮侵秋江松桂稍成林主恩幸自容蕭散客難誰應學陸沈千里星河天上夜百年萍梗别來心儒臣畫閣今應近三殿卿雲歲月深寄韓敬堂殿講秋山别思眇愁豫天杪同心久索居雙闕星辰分劒佩萬峰烟雨狎樵漁舊遊數對平原酒逺地難逢上苑書欲問談詩韓太傅門牆多士盛何如寄沈蛟門宮諭銅龍闕角舊時分屈指風雲已到君天隔鵷鸞應有夢人隨猿鶴自為羣斗間劒氣寒相映江上書函杳未聞别後才情渾欲減惟添瘦影似休文寄黃儀庭宮允班荆闕里笑相看寶馬金羈識漢官别去梅花江上老秋來明月夢中寒詞臣寂寞猶鴛列隱客疏狂自鶡冠傳道橋門懸絳帳五更經術首登壇冬日徐檢菴殿讀北上過訪契濶人間未易論勞君越陌枉相存尺書久絶南天鴈斗酒猶銷别日魂欲笑子牟懷魏闕曽隨方朔隱吳門鸞扉舊侶應垂問竊吹青山是主恩扈從春際上陵四首諸陵王氣接神京法駕春禋出禁城萬户鶯歌迎鳳管九衢花雨拂霓旌連山地入長楊苑夾道兵陳細栁營負橐趨陪知最寵屬車徐動扈天行隔夜鑾車駐翠微平明魚鑰啓彤扉宮前七校傳刁斗馬上千官著賜衣地轉鈎陳成象緯山開雲物寫恩輝春遊逺薄橫汾曲祖德宗功信不違雲間神闕九關開樹杪仙輿萬乘來霧雨蕭蕭隂輦路松楸鬱鬱鎖城臺摐金大樂空山應裸玉崇儀列辟陪聞道龍衣親負土漢家原廟不勝哀六龍回馭苑西天湖上春隂敞御筵山繞離宮金作嶂水依行漏玉為泉驂騑滿路花香裏燈火薰霄樹影邊百里昆明連太液鐃歌九部引龍船送秦舜峰中丞出鎮南贑詞林早日侍甘泉幕府勳名起少年大國提封連瘴海中丞使節護樓船秋聲夜渡三江雨兵氣晴銷百越烟此别不須頻佇想油幢幾日欲朝天報李本寧太史書兼訊東遊沅芷澧蘭别思虛江湘何地擁離居秋風不下孤黃鵠明月空傳雙鯉魚華髮交遊應更少清時才俊好誰如懸知太史東遊後玉簡重編禹穴書贈長安四李生李生中貴從子皆及豫門三為博士弟子其一武生文武翩翩總俊髦長安閥閲信多豪春城起第新行馬內殿承恩舊賜袍已見三雍收異等還聞七校試雄韜金門貴近應無數不似名家有鳯毛九日有懷可大秋水茫茫入望賖美人何處賦蒹葭霜前又度三秋鴈客裏重看九日花南國音書淹嵗月東籬節序付烟霞登高那復多愁思白露朝來染鬢華題蓮花菴水亭西湖流入北城隂小築祗園切禁林閣上旃檀風細細水邊雲樹影沈沈天花曉落千門雨仙梵寒飄萬井砧咫尺青蓮成淨土將因不染印禪心穀城山館集卷十二
