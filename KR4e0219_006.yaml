body:
  text: 穀城山館集卷六明于慎行撰五言律詩唐體樂府附出塞萬里關山道蒼茫玉塞秋沙飛晴作雨霧結旦成樓羌管霜前怨胡笳月下愁酬恩懷一劎端不為封侯入塞度漠滅天驕歸來意氣豪霓旌回瀚海羽蓋指臨洮少婦迎珠勒親兵賜錦袍勳多明主記不解假錢刀君馬黃寶馬來西極龍間服上箱浮雲金勒影飛雪玉珂光骨凍長城水蹄翻大漠霜美人天路逺祇覺壯心傷戰城南塞北朝傳警城南夜合圍旗翻明月暗劎落曉星微朔氣聲刁斗邊霜卷鐵衣橫行期萬里酣戰不知歸巫山髙巫山峰十二縹眇倚層空細雨猿聲外輕雲鳥道中江流巴子國月出楚王宫舊館今何處茫茫夢不通隴頭吟隴頭流水别淒響自堪驚月散東西影風傳逺近聲傍侵疏勒道斜入隗囂營嗚咽歸腸斷何時到渭城上之回離宫陳上郡御輦出回中七校長楊北千官細柳東旄頭懸塞月漏箭雜邊風却望單于幕蕭條萬里空長安道晨光開紫陌春氣耀丹霞月落新豐樹烟籠上苑花金羈京兆馬繡轂富平車俠少逢何闊相過趙李家洛陽陌東都佳麗地共指鬪雞坊挾彈妖童騎當壚小婦粧柳花金谷暗槐影玉溝長愁望飛塵起驕騧赭汗香折楊柳朱樓臨大道垂柳正依依葉淺低愁黛花輕上舞衣三河春欲盡五嶺戍初歸何地應腸斷關前雪正飛關山月三五關山月天空萬里秋影含青海動光度玉門流曉角傳軍壘寒烽隱戍樓隂山方接戰且莫視刀頭梅花落腸斷金閨婦愁生畫閣梅瑶華風裏落玉樹雪前開拂影侵羅袂飄香上鏡臺關河春色暮鶴勒幾時回雨雪隂山征戰地雨雪夜霏霏凍縮胡兒馬寒凝漢將衣范恭疏勒返蘇武漠南歸頗怪關門柳春前作絮飛長干曲妾住在長干離居嵗欲䦨洞庭歸客少浦口去人難雨落吳天暮雲橫楚岫寒含情何所待憔悴碧江湍江南曲采采白蘋洲蘭橈憶逺遊日懸雲夢濶天隔洞庭秋風物三湘道烟波萬里愁離居逢嵗宴掩涕倚重樓紫騮馬寶馬蹀臯蘭紅塵撲繡鞍追風珠汗落踏雪玉蹄寒北地春方澀長城凍未乾一鳴思報主不取按圖看送陳春宇太史冊封楚藩二首遙遙江浦去望望洞庭西擁傳過三楚乘槎入五溪潮平津樹杳天闊浦雲低想見花源裏漁家路不迷持節金閨客星華並列侯遙分鸞掖色一作兔園遊日暮湘潭雨天寒夢澤秋豈應歌故里白雪少人酬送張洪陽太史請急南還寧親承豫告秋盡理行裝槖載蘭臺筆衣殘粉署香酒邊燕月近帆外楚天長舊識張華劎寒鋒起豫章寄送朱可大南還自别春湖去音書已隔年所嗟千里夢常在五雲天雨色維揚樹江聲北固船經過多逸興佳句向誰傳同李前峰兵部趙竹里文學集侯氏東墅信宿二首十載談經地重來徑已荒野花含宿雨秋草上空墻客送新醅酒樓懸舊臥牀曉涼憑檻立山色四蒼蒼故人復此地不醉欲如何世事杯中盡年華鏡裏過孤雲留閣樹殘日掛烟蘿惆悵王孫去門前芳草多時侯兄少泉從軍塞上少虛趙丈見過二首上客回髙駕過豫松桂林題詩白雲暮對酒飛花深逺樹浮殘雨高城下夕隂草𤣥藝閣吏寂寞此時心經春猶臥病長日掩衡門豈謂山隂棹能尋谷口村世情雙白眼生事一青尊不淺忘年契千秋事可論雨中舟行天闊雨冥冥孤帆過驛亭雲吞江樹白霧失曉峰青岸鳥迎船濕河魚出網腥生涯多少恨無處異飄萍夜泊有懷月白夜將䦨潮平兩岸寬倚舟人語靜過雨樹聲寒戍鼓城隅覔船燈水際看所期江路迥何處采芳蘭天津觀潮六月天山雪寒濤亦壯哉聲疑吹地轉浪莫蹴天開估舶迎風住漁舠弄水回方聞通海運萬櫓日邊來泊潞河驛行盡燕齊道來從上國遊飽經湖上雨寒泊驛邊舟朔氣雄三輔關門控九州五陵十萬户夾岸起朱樓哭沈虹臺太史二首故人忽云沒聞報涕汍瀾今日吳江冷當時易水寒青編門下受丹旐路旁看夜雨𤣥猿嘯浮生夢已闌思君不忍問河上返孤舟豈是懷沙怨應非蹈海遊花殘吳苑暮鶴唳月亭秋腸斷論交地宫城十二樓雨城夕凉風起空堂颯似秋片雲生逺岫驟雨過重樓暝色階前樹寒聲峽外舟鷗鳬何自喜泛泛滿青流告天臺為趙瀫陽太史賦邈矣高賢操清風華胄傳畏知嚴暮夜考履質青天國史千秋在家聲異代懸只今臺上月猶照舊爐烟題畫黯淡秋湖色涵虛望渺然斷橋橫落日逺水出寒烟雁向平沙落鷗依折葦眠吾家住湖上閒殺采菱船夏日偕張洪陽殿讀憩龍華寺寺在苑北湖上同過湖上寺伏日坐清涼雲水浮仙闕松杉䕃講堂雨歸蓮葉淨風起稻花香小借支公榻人天午夢長夏日進講和張洪陽年丈韻秉燭趨丹禁橫經侍法筵曉涼生殿閣旭日動雲烟珮委天香散花深玉漏傳非材慙獻納鵠立細旃前喜雨春來全未雨一夜雨成霖觸石何時聚崇朝已自隂錦林花氣重金闕漏聲深潤澤占天造殷憂慰聖心七夕客中逢七夕片月倚重樓靜對星河夜涼生枕簟秋人間渾是夢天上亦多愁覽鏡驚雙鬢空悲嵗序流秋夜虗閣夜沉沉秋聲在樹林山中猿鶴夢客裏嵗年心露下蓮塘冷螢流薜幌深坐來銷萬籟隱几自成吟送懷上人還金陵空門無所住亦復憶江鄉半偈禪心定孤舟别路長錫飛吳葉冷筆拂楚花香又向秋山裏鐘聲閉夕陽送張靜峰年兄赴河南别駕二首十年南省客半刺領東周馬向雪中去人稱洛下遊關河三輔道雲物二陵秋别思還蕭索寒塘水自流承寵無遲暮褰帷意氣生諸侯均揖讓長吏有逢迎郡閣山當户河橋栁向城三川風日好偏適宦遊情送李敏齊符卿奉使省覲只今三省佩又下五城樓薊北霜初落淮南桂已秋宫雲隨子舍卿月引行舟可奈河橋柳年年綰别愁送鄒進士南臯謫戍貴陽二首自憐焚草日却送看花人迢遞三危路飄零萬死身長沙悲賈傅湘水弔靈均總是經過地將誰采白蘋綱常千古事憐爾志如霜首欲階前碎珠憑頷下藏有生心盡折縱死骨猶香不似青蓮客無端謫夜郎送習豫南太史謫居閩中二首渺渺寒江路君今嵗晏遊十年池上珮萬里雪中舟仕節人誰識浮踪水自流含情無可道不獨為離憂對酒不能飲心悲握手論如何同舍客忽作逺遊人世態青雲冷交情白首新還知明主意宣室待詞臣應制題畫四首有序萬厯戊寅正月上出內府畫册二十六幅命日講六臣分題奏上各賜銀豆一包時同事者宫詹吳門申公宫諭信陽何公宫洗新都許公宫贊武陵陳公翰撰南充陳公也豫分得四題如左雪景輕綃寒色動不是月華開鳥道千巖迥江光一徑回虛無分玉樹倣佛想瑶臺未擬歌黃竹陽春遍九垓烟雨瀟瀟一幅上秋氣滿楓林半似隨風引全疑夾霧隂逺峰看處暝踈樹望來深筆底烟雲色爭知用作霖宣廟御筆汀鳥筆端成大造海鳥若相忘暮雨汀莎濕春風岸芷香柳邊迷落絮雲裏帶飛霜總為經天藻長留羽翰光鵪鶉渺彼榆枋翼丹青畫作真靜眠宫草日閒傍苑花春顧影驕金距逢場上錦茵非同珠樹鳥獨用羽毛珍寄馮志方博士二首一别褒衣客今來幾嵗星吳鈎知射斗魯壁記傳經對酒春雲碧題詩暮雨青向時遊賞地南北各飄萍幽人渺何許江上舊儒冠客舍蒹葭雨堂餐苜蓿盤楚天秋水濶燕闕曉鐘殘懷䄂雙紈扇因風欲寄難張洪陽殿讀待舟潞渚寄送二首昨日橫門道魂消鬢欲秋寸心應未逺尺素已堪愁對酒青燈醉看花紫禁遊離情如潞水連夜只東流歸夢春來劇那堪送逺遊身懸蝸左角家在海西頭天地才難盡風塵道不謀河隄楊柳緑亦欲買歸舟暮春同朱可大廷尉遊摩訶菴聽無絃上人彈琴因飲南園二首福地開真境蕭辰欵梵筵百花春夜雨一飯講堂烟妙法旃檀喻空音緑綺傳雲牀容臥起隨意檢詩篇别有祗園勝春光象外幽人從蓮社飲地勝竹林遊雨色隂蘿幌鐘聲度石樓不愁歸路晚乘月可淹留告中同可大再遊摩訶菴因贈靜堂禪師寺憶同遊地聯鑣許再過人行松院少雲閉竹房多嵗月容高枕乾坤足放歌逃禪吾不厭病骨本維摩寄庠師周介軒先生二首傳經西楚客垂老意何如湖上十年夢燈前八月書秋心隨過雁舊事紀銜魚門下垂髫士翛翛兩鬢疏望望徐方道懷人白露秋湖光晴載酒山色暮登樓倦迹看林鳥閒情寄海鷗紅顔殊未老欲接羡門遊秋日寄侯少泉參戎黔中二首萬里天南極將軍尚枕戈一醒燕市酒五見洞庭波霧急鳶常墮江深雁不過東山棲隱地何日共烟蘿自爾烏蠻去寒花幾度開萍踪兒女大華髮嵗時催别夢隨關月離愁落隴梅年年秋色裏一見尺書來贈談易王生翛然江上客讀易舊儒生道自青囊祕名因緑簡成漢京談季主蜀肆隱君平為叩盈虛理因探百物情春半臥病忽已久閒房鳴素琴徘徊紫芝意惆悵青春深芳草亂迷徑殘花空滿林憑軒送高鳥馳思渺難任望鶴縹眇珠庭鶴翻飛别禁林初盤仙闕逺漸入海雲深忍負乘軒寵應非避弋心瑶臺多舊侣愁絶玉笙音河西務雨夜歸舟今信宿猶倚潞河干樹色春汀暗雞聲夜雨寒孤帆燈際落短劎酒中彈明發乘流進滄波正渺漫漷縣道中江草正萋萋蘭橈傍古堤淡烟高樹杪斜日亂帆西隴麥蒸雲動春鳩夾岸啼連朝隔城市疑入武陵溪天津夜月放舟乘晚浪伐鼓注歸流明月千帆夜長風萬里秋篙師探渡口津吏指潮頭浩蕩煙波裏應憐估客遊楊柳青道中鳴榔凌海月捩舵破江烟楊柳青垂驛蘼蕪緑刺船笛聲邀落日席影掛長天望望滄洲路從茲遂渺然德州舟中遇李户部兩山北上别後却寄二首廣川西渡口倚棹此逢君别久情難喻歡多酒易醺江聲過暮雨帆影夾殘雲蹢躅南枝鵲能堪羽翮分君登蘭省去豫泛鏡湖歸兩漿還相背雙星竟不違心期鷗作侣生事薜為衣只有空山夢愁時少雁飛武城懷古東郡武城乃平原君舊邑世謂言游所宰誤也停橈齊趙路河上見孤城故國佳公子高臺亦已傾川光孤嶼斂暝色片雲生嗚咽清漳水千秋恨未平臥病天地長貧日風塵臥病年閉門春雨後欹枕落花前石火應難駐蘭膏莫自煎無生如可悟吾意欲逃禪菊花幾年京洛客不對故園花今日重陽酒還過處士家娟娟霜蕊靜裊裊露枝斜自愛貞心苦含香閲嵗華挽趙少虛先生四首去矣雲林客傷哉藝苑豪百年雙白鬢萬事一青袍道自平生拙名堪此日高所悲逢聖世汩沒掩蓬蒿文雅從兹盡榮華亦有休吾徒還一涕爾輩自千秋舊館青山暮重泉白日幽惟餘清汶水長繞墓田流十里春風苑年年出漢關調空高渌水俗自薄朱顔星彩歸天上𤣥經播世間乞銘遺札在一讀淚潺湲浮沉千古事無力念鴻鈞陵替存吾道窮愁竟爾身馮唐空自老原憲不知貧他日山陽路誰為笛裏人寄賈廣文年伯兼謝惠氊極目漳南道相思正杳漫愁時明月近别後素書難雪暗芙蓉閣春生苜蓿盤一氊猶寄逺應惜玉堂寒送林丈內艱南還二首慘淡歸人意春前問去舟參商初兩地膠漆已三秋雨色低津樹江光隱驛樓庭花多所恨不是錦衣遊把袂憐同舍離愁可奈何定知秋雁少惟有月明多江上思瓊樹風前廢蓼莪無令清夜夢不入舊鸞坡穀城山館集卷六
