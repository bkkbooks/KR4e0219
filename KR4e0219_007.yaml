body:
  text: 穀城山館集巻七明于慎行撰五言律詩春日同于子冲上靈巖寺四首寺自高齊闢山從岱嶽盤雲霞千嶂曉風雨萬松寒路繞泉聲入花分鳥道看忽聞鐘磬發作禮叩旃檀為訪名山勝來參梵帝筵烟霞圍寳地龍象擁諸天喻法曇花落翻經貝葉傳朗公今化石不轉謁金仙山有朗公石春隂連嶽麓法界滿祗林巨壑浮雲細懸崖白日深野僧閒入定山鳥靜多音幸共齊年侣同皈出世心雙峰最高頂倚杖白雲扉樹杪看人出山坳送鳥飛鐘聲衆壑滿香靄下方㣲三觀憑闌得因風欲振衣寄張玉陽年兄汴上我行殊未久君亦解朝衣世路無工拙時名有是非莫談温室樹聊采北山薇夢斷夷門道秋深鴈不飛閣夜何處夜色好月明獨倚樓一聲長笛起吹裂萬山秋風露凄以冷星河靜欲流懐人不可見天末𦕈含愁雲翠山天觀和朱可大韻碧山吾欲隱雙屐且隨君星斗巖前接藤蘿杖底分泉聲渾作雨嵐氣稍成雲愁對仙壇月鸞簫午夜聞洪範池和韻何地探靈境仙泉舊有名天光金鏡冷潭影玉壺清溪鳥依人立林蟬盡日鳴魚龍今寂寞不畏夜珠驚秋日同朱令君泛舟西汀二首舊向滄洲隱今陪茂宰遊笛聲催畫鷁帆影掛浮鷗酒對青山暮歌翻白苧秋花源多少路隨處有漁舟蕩漾千峰色輕舠入翠微鳧迎仙令舄鷗拂野人衣岸柳晴猶濕江雲冷不飛天風乗醉起吹送月中歸送崔亞沂博士遊齊共作名山隱三秋采蕨薇寧辭今日别袛恐故人稀斗酒不得醉白雲相與歸秋來𤣥鴈度可向海門飛樓居樓居非有好髙枕自人間夜色尊前月春隂檻外山目隨歸鳥盡心與片雲閒未遣浮名累虗稱善閉闗夏日閒居空林銷永日不暑亦無喧種藥時窺圃攤書毎閉門雨痕侵柱礎苔色上松根此意應誰識惟偕靜者論東郭草堂即事結廬非異境負郭少將迎竹嶼含雲影松牕落雨聲片峰當戸出衆鳥隔林鳴宴坐幾無念誰知絶世情過雨五月不知暑虗堂颯似秋殘虹掛溪水片雨過城樓逺樹斜陽駐深山夕翠流晩凉思枕簟絶愛北牕幽小樓小樓常有伴端不歎離羣牖納青溪月簷飛翠岫雲自藏東觀草誰勒北山文最悵霜空鴈寒聲靜夜聞雨中東流泉上同可大賦風雨鳴丹谷林亭倚翠岑一尊今日酒千里故人心樹動三秋色泉飛萬壑音夜凉横吹起直欲想龍吟中秋小岱山對月此夜寒無奈瑶臺近斗牛山名真小岱月色正中秋影入河蟾濕光翻樹鵲愁只疑參嶽頂笙鶴上宫遊山莊即事逃名天地闊斗室寄山椒地僻常無客林深亦有樵飯牛春待雨放鶴夜聞簫不是淮南隱淹留未可招有懐蘇八長史三蘇稱大雅季子復能文老作諸侯客名髙國士羣别心燕塞雨旅舍鵲湖雲家學枚臯在詞壇已策勲入都再遊摩訶禪林為憶青蓮社重尋舊法堂壁題存姓字階樹閲行藏覺路人天迥春輝佛日長爾時京落客曽識雨花香再至長安見無絃上人移住法藏菴因聽彈琴賦贈别來何所住卓錫自成林幡影香臺靜鐘聲竹院深一花開佛土半偈定禪心揮手松風裏依然未鼓琴春日同朱可大起部馮用韞太史同遊恩隆觀暨侍中園紀事二首常侍先朝貴仙宫上苑西野分青嶂迥路入白雲迷深樹花初發閒堦草自萋當年供奉地猶揭舊璇題小有蘭亭勝臨流一放歌酒邊横落照花底拂回波何地踈狂少吾徒聚散多春衣渾欲緑知是藉烟蘿同館諸丈城西看花二首别苑惜春殘開尊聚舊歡花間張綺幕柳外簇雕鞍飛雪歌中度回風掌上看倚䦨渾欲醉猶索酒盃寛十載歎西東歡娱此日同容華青鏡裏身世緑尊中花氣看無賴鶯歌聽不窮何妨歸騎緩蹀躞受東風朱可大邀同馮太史飲摩訶菴南園步至釣魚臺夜眺還宿法藏精舍次日觀慈壽浮圖紀遊四首南園勝㑹開芳苑春愁入逺峰壺觴連竹樹歌咏起魚龍花落空林雨風傳别院鐘淹留公子愛移席轉從容釣臺行歌隨步逺已到水雲天夜色千峰月湖光萬頃烟銜盃心跌宕脫㡌態蹁躚醉眼迷歸徑相看枕腹眠法藏菴何必躭丘壑居然鹿苑棲片雲雙樹頂孤月上方西罷酒聞清梵探詩見舊題歸依空品相不省在招提慈壽寺閣隔夜忘醒醉窮遊别起端紺林重駐馬寳閣幾憑闌飛刹金銀湧廻峰紫翠盤皇都多鉅麗是處有竒觀三月廿八日葛龍池朱訥齋二工部馮琢吾葛鳳池二太史同遊城西黄侍中園林看花四首不奈連朝病因看上苑春如何五侯第又見百花新日映丹霞暈烟凝絳幄塵狂來無藉在幘岸白綸巾真賞誰應共風流是舊歡藏書周太史襥被漢郎官花氣尊中滿松聲座上寒相逢休惜醉春色欲凋殘改席臨虗榭為歡事毎竒控弦天苑騎跳劎内園兒小榻時欹枕疎簾久對碁稍聞深樹裏風送桔橰遲誰謂長安陌風塵此地稀山光相映帶野色自芳菲旭日薰歌扇輕花着舞衣馬蹄歸欲懶為送惜春歸同可大用韞登毘盧閣人天標勝境暇日一銜盃烟樹重城合香花萬井開懐鄉遊子念作賦客卿才愁見門前道車塵日夜催毘盧閣送可大南旋梵閣俯珠林龍宫嵗月深幾人同嘯詠此日復登臨畵棟含朝雨青峰起暮隂不堪歡㑹地又悵别離心朱大司空挽歌八首有偉生民傑鴻名日月光三朝熙揆路八座麗文昌尚想𤣥圭錫俄驚白璧藏平生門下士歌薤不成章此日飈輪逺何年畫閣開勲猷金匱史文賦栢梁才故事傳西省遺恩照夜臺凄清華表月不見鶴歸來再領河隄節三行海國春吏人䖍俎豆父老愴車塵百折風雲地諸艱社稷身祇今渠畔柳遊客亦沾巾緬想三朝事聲華似夢中職分虞百揆爵視漢三公忼慨回天力酸辛葢世功惟餘秋隴上蕭瑟白楊風十載江臯臥蒼生望更頻如何三島夢忽斷五湖春南嶽收真氣中朝失舊臣尚方雙賜履猶覺上星辰真宅歸丹府蓬壺第幾城化龍應是劍跨鶴不聞笙舊㦸朱門列新阡紫氣縈元公車服在餘慶屬𤣥成傳道松臺路𤣥冬蜃衛張期門分羽騎温室出黄腸日月懸天藻螭龍䕶帝章從今鶉火次夜夜有光芒凄凉知已報舊事總堪愁問字春風館傳經夜月樓十年違撰屨一夕嘆藏舟惟有延陵劎堪懸宰樹秋浪迹浪迹長安陌修途日以難河流誰謂廣海水自知寒懶嫚存愚性婆娑恥貴官春深湖上雨何處少漁竿春日寄題東郭草堂長憶青門郭芳菲此日殷花開三月雨春隔萬山雲夜鶴應誰怨汀鷗且自羣主人有歸夢莫勒北山文月夜舟行烟江三五夜獨月引行舟野色推蓬合波光進艇留銀蟾天上濕烏鵲渚邊愁那聽樓頭笛懐郷鬢欲秋邵伯湖夜泊日暮倚蘭橈秋江正寂寥驛門斜對雨郡郭逺通潮急櫓看商舶寒燈見市橋隋堤前路近欲聽月中簫儀真野泊潮平揚子渡宿昔繫扁舟日落波光斂天長島色浮雨侵依㟁樹晴見隔江樓咫尺分吴楚茫茫萬古愁金陵江口夜泊孤舟江上宿秋夢耿難成片月中流影千帆夜半聲地鄰桃葉渡山近石頭城倚舵聞吴詠偏令旅思生舟中家報澤國三千里題書轉自愁鄉心河畔草客夢雨邊舟月落維揚夜江深建業秋歸程應未逺時撫大刀頭魏國東園宴集華館開名㑹高城倚落曛林芳秋過雨竹翠午侵雲洞夾平臺入橋通曲水分太平多宴樂勝地屬元勲天界寺禪房呈訒菴棠軒二丈蕭晨遊法苑迥眺出雲峰秋色霜前鴈寒聲雨後鐘酒隨陶令醉談許惠休從何意風塵地居然白社蹤黄儀庭司城邀集馮虗閣振衣山畔寺載酒寺邊樓笛散千峰雨砧傳萬井秋地因邀月勝人擬御風遊不盡蕭森氣寒江正北流九月八日羅康洲宗伯黄儀庭司成田鍾台宫諭習豫南司成㑹集朝天宫道院仙臺鄰上苑路出冶城邊暝落珠宫雨寒飛玉樹烟鴈來秋水外人醉菊花前明日還重九茰觴可更傳西園諸同年夜宴歡劇西園㑹衘盃夜色前池塘餘暮雨竹栢淨秋天月出三山樹鐘銷九市烟良遊俱舊侣把臂惜華年南曹諸友邀遊祖師堂融公棲隱處遥在翠㣲巔徑折全無地峰回半有天鳥啼雲洞雨花散石堂烟幸假登髙㑹同參最上禪牛首東峰同諸君覽眺兩峰原自對萬壑逺相縈地盡芙蓉閣巖開薜荔屏江光天際白山色雨中青不淺憑闌興吴歌倚醉聽長干白門通市里傳是古長干陌栁藏鴉曙秋潮帶雨寒横塘歸客斷子夜舊歌闌别是繁華地休將六代看秦淮秋月秦淮岸江聲轉畵橋市樓臨綺陌商女駐蘭橈雲裏青絲騎花間碧玉簫不知桃葉水流恨幾時消青溪鳴珂傳舊里彌望總汙萊片雨湖邊落重橋苑外開草荒江令宅花覆陸機臺尚想風流地空悲異代才房侍御邀登觀音臺傑觀俯重臺烟波四望開霞邊千樹沒盃底片帆來霜月寒相射雲鴻暮轉哀滔滔大江水到海幾時廻攝山夜宿予懐上人十年渾似夢相見各依然僧臘青山老詩名白社偏松間對㣲月竹裏聽流泉預悵明朝别西風送客船攝山觀無盡禪師入定師今方入定勝果幾時成法向無空滅心因不住生濕灰猶示相稿木可為形恍忽蓮臺上人天湧化城京口贈鄔山人汝翼握手秋江上依然舊布袍十年燕市酒八月廣陵濤俠骨貧逾健狂歌醉正豪不縁湖海遇何地見風騷京口贈陳從訓文學陳生何磊落一劎向飄零雅好詞人賦休傳博士經蘼蕪春渚緑薜荔舊山青莫謂江天逺㣲垣現客星滁陽道中遲李棠軒年兄未至題書驛壁江樓三日别相逐不相逢回首秋山路寒雲隔幾峰鄉心朝見鴈行色夜聞鐘何地還盃酒應尋放鶴蹤閏月朔日道中憶東園菊今年九月菊應自斂芳菲秋色未云暮遊子將欲歸繫心霜露滿凝恨鴈鴻稀想到尊前見寒香正㸃衣輓中立宗侯四首彼美銀潢彦名髙魯國儒藏書淹四部作賦侈三都日瑩瑶臺雪天沉碧海珠十年懐舊賞腸斷緑雲孤誰言天路逺儵爾賦遊仙貌憶登龍日神疑化鶴年墨堂苔蘚閉畵閣網絲懸忍望邾城墓蕭蕭宰樹烟斯人不可見一代失風流未就黄金藥先成白玉樓才名留海内賔客散池頭此夜朱門月空悲兔苑遊芳草春來緑王孫去可傷憑誰傳舊業先自棄髙堂笙鶴渾疑幻人琴盡欲亡平生知已淚一濕薜蘿裳穀城山館集巻七
