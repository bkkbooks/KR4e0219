body:
  text: 穀城山館集卷一明于慎行撰古樂府本調叙曰唐人不為古樂府是知古樂府也辭聲相雜既無從辨音節未㑹又難於歌故不為爾然不效其體而時假其名以達所欲出斯慕古而托焉者乎近世一二名家至乃逐句形模以追遺響則唐人所吐棄矣余嘗為郊廟鐃歌可數十首已而視之頗涉兒戲亦復不自了然遂焚棄之取其音節稍近者倣其一二謂之本調至近體歌行如唐人所假者各從其類附焉而不曰樂府則詩之而已矣夫唐人能為而不為今之君子能為而遂為之豫奈何不能為而為也管城遊衍聊以自娛豈稱述作哉遊仙詩姑射一何高高高凌絳闕上有兩仙人肌膚如玉雪不笑亦不言藐與世人絶一解上謁逢真人授我大藥訣服藥一玉箱遼然五情熱輕舉步九霄烟雲忽若滅二解大鳥止城門安知是令威徐市入東海胡不采藥歸三山空波濤孰别是與非三解大化自有運夀命各有期追念古賢聖往往為土灰汗漫不足道六籍我所歸四解長歌行宴坐北堂上秋宇何清凉客心殊不樂起視夜未央新月鑒空軒列宿爛成行熠耀飛中庭莎雞號東廂仰見孤鳴鴈噭噭天南翔屣履步階除嘯咤以慨慷少壯弄文史思登君子堂青陽忽不待𤣥髮亦已蒼百川正東流大海何泱泱寒暑相遷次日月互匿藏年命非金石榮耀安得長自非不朽圖何以播餘芳抱兹千嵗憂俯仰中情傷短歌行對酒當歌朱顔未酡日月其除不樂奈何一解周道茫茫辟如羊腸葆身藏名唯有醉鄉二解隂木貞心烈士苦顔微子之故胡為永嘆三解海水知寒山石知雨憂來攻中誰當告語四解河之悠悠欲濟無梁率彼曠野霜露沾裳五解斫桂為橑葺蘭為宇美人不來吾誰與處六解蝦䱉篇醯雞慕鼎俎不知天地寬蜉蝣望朝夕安能念嵗寒小人固多逸志士良不閒逺涉四海岸高舉五嶽巔俯視紅顔子磬折一何艱春華誠可悅秋實無乃闌嘯咤擁長劍氣薄曽雲端品庶徒營營安知達者觀飲馬長城窟行青青陵上柏翹翹思逺客逺客在何方長城道路長路長時復久門外春楊柳楊柳正依依君行胡不歸食薤自知辛食蘗自知苦苦辛在人心當復誰為語有鳥雲中來嗷嗷過我庭願附一札書達我沈憂情鳥辭天路逺哀鳴去不返去去莫復陳親疏自有因善哉行秋風蕭蕭白露為霜今日相歡胡不盡觴一解遊彼三山絳闕煌煌道逢安朝授我要方二解采苓采苓于彼高岡日暮天寒風吹我裳三解羣鳥夜鳴虎豹縱橫躊蹰四顧鬱何芒芒四解白鵠晨號在彼中阿嘯匹不得傷如之何五解東方漸高明星沒河毋復相思沉吟嘯歌六解相逢行相彼雙闕間車馬夜行遊相逢問君家君家南陌頭黃金為門樞碧玉疏高樓中庭垂珠樹靈鳥翔庭陬長子侍中郎中子大長秋小子勝揖拜賜爵關內侯五日一洗沐賓客滿道周通名不敢進雨汗交橫流置酒高堂上歌舞無時休越姬調鳴瑟趙女彈箜篌一酌山嶽夀再酌江海酬行樂未及終年嵗忽已遒日匿西崦嵫月出咸池隅日月有虧盈榮華能久留所以古賢聖視若烟雲浮燕歌行七解西風烈烈霜滿庭天寒波深列宿明孤堂四壁絡緯鳴念君逺客憂思盈日月相逐逝不停百川東下如建瓴誰能懷憂心不驚撫時感事中怦怦就枕假寐不能成攬衣起步露沾纓月出皎皎照前楹羣鳥棲樹寒無聲孤鴻何為中夜征躑躅四顧傷人情爾胡不歸獨屏營燕歌行六解來日苦短去日長四時代謝心茫茫為客置酒臨中堂吳歈齊謳出東廂引宫刻徵為樂方悲音冽冽激中腸勞心惆忉不可忘西風吹衣天雨霜列宿燦爛羅成行雙星明明在河梁咫尺不語空相望何為含憂令心傷陌上桑日出東南隅照我邯鄲宫邯鄲有好女顔色靡春風采蘩出城南采桑出城東黃金為長鉤桂枝為大籠上襦繡鴛鴦下裙繡芙蓉肌膚宛如玉善態不可窮飛鳥見女來厲翮凌高空游魚見女來潛遊深淵中車人去其蓋舟人去其篷少年滿路傍嘆息忘所從西門行出西門歌且行今我不極樂當欲何營一解江河水東下如建瓴安能邑邑迫蹙坐使華嵗零二解䇿駿馬駕高軒召呼平生遊馳逐雙闕間三解薰以香自燒膏以明自煎鼎鼎百年內胡為長不歡四解誰見仙人安期生驂駕白鹿遊三山誰見仙人安期生驂駕白鹿遊三山五解四時相遞代日月如轉丸乘時修令名毋為世所嘆六解艷歌何嘗行何為侘傺長吁但當飲㫖酒吹笙竽一解二十為侍中郎三十執金吾二解四十雖不大貴車馬駸駸往來公卿長者居三解但當在五陵陌上快獨呼雞走狗被服襜褕四解男兒墮地橫絶四海皇皇日夜心一何愚五解疇昔相追隨斗酒從遊盤一日不相及中道與君成間關束髮奉明主忠誠夙所殫上有公家三尺下為衆庶所觀彼美人子何為營營日夜誠足嘆疇昔以下為趨門有車馬客行門有車馬客駕言出漢關顧念平生遊枉迹問考槃倒屣出門迎攝袂不及餐坐客置斗酒握手論辛酸借問朝市中榮枯多變遷金張自赫奕丁傅相扳援新貴日更進舊老日以殘淺水有迅波浮雲無定端天時相代謝世事誠艱難送客閉我門偃仰竊自歡白頭吟朝為山上雲暮為川上雨變化在君心然疑不得語一解今日為牛女明日為參商參商不相待安知秋夜長二解素心一何愚自謂與衆殊所賤菅與蒯所貴玉與珠三解白石何纍纍流水何潺潺水流石不轉人情中道還四解滿歌行適意能幾何日月不居逝如江河裴回路岐自使蹉跎遙望舊鄉鬱何嵯峨心之煩憂其端孔多一解炯炯多所念鼎鼎欲何為舉世如馳拙者守道智者趨時上觀下獲以博銖錙豈不洵美匪伊所思二解秋風既寒昔蹈東海一何盤桓流水出門白雲在山風塵撓豫去不遑安夙夜在公凋此華顔三解天道難知人胡可謀遺榮避世師彼莊周鑿壞踰垣亦復何求楚楚貴人不知春秋四解斗酒相呼以遊以遨豈伊異人夙昔同袍莫小泰山莫大秋毫直木先伐薰香自燒爾不自夷嵗月其慆葆真繕性含光自韜存神觀化睎彼松喬斗酒以下為趨箜篌引今日斗酒㑹為歡誠未央高堂羅尊俎四座何清凉庖人出珍膳嘉㫖充圓方吳歈中酒發趙瑟激清商絲竹洞心耳悲至不盡觴為客起行遊遊彼大道旁車馬若流水佩劍寒秋霜被服心所喜聊且為樂康朱門多媚少磬折有容光春華耀朝日夕暮從風揚四時舍我逝日月遞相藏人生天壤內譬鳥集枯桑何不適情志恣君技所長含情欲何待但為達者傷獨漉篇獨漉獨漉山深水曲水曲回橈山深折軸黃鵠高飛橫絶四極欲往從之恨無羽翼轉蓬離根隨風飛翻遊子不歸慆此華年騏驥不駕誰別逸足璞石不分誰知良玉利劍在掌可以割犀全身忘國安用臣為龍欲上天勢須浮雲豈無蹇修不可以羣淮南王淮南王慕靈仙服食丹藥求大年重樓十二羅五城玉童吹簫作鳯鳴左石室右丹臺枕中鴻寶不可開咸陽帝子非仙才八公一去神鼎空化為雙白鶴飛雲中飛雲中遊天際雞犬無聲空城閉茂陵神宫樹成列淮南丹竈狐兔穴驅車上東門行驅車上東門回望咸陽路鬱鬱五陵間纍纍多墟墓長夜號鼪鼬秋風走狐兔牧豎遊且歌行人四面顧借問此何誰昔時董與傅車馬如流水第宅通雲霧富貴一旦空忽如草間露閲水日成川閲世人非故賢愚共一丘千載為旦暮嗤彼道傍子營營胡不寤公無渡河公無渡河河水湯湯連山嵯峨電雨晦𡨕龍伯來過吞舟鋸齒其族孔多公無鳬躍之技出沒濤波又無寶璧與馬歆神之和往則沉溺當奈公何善遊固有數請公無渡河君子有所思行登彼西山道還顧重城闕皇居麗以佳侯王多閥閲國典盛衣冠軍容陳斧鉞雞鳴內殿朝日宴賓徒謁楚舞奏方闌齊謳聲未歌允兹七貴里執手忱可熱四郊既多壘九土災孔烈肉食何委蛇憂時在巖穴㫖哉周任規陳力乃就列董逃行西風木落天秋江寒露下霜流三星素月當樓芳筵嘉客娛遊促觴接䣛淹留肴核充溢壺觴吳趨越艷登堂皎如星文電光丹脣素齒流芳歌聲上薄楣梁瑶笙象管中微七盤竒舞何遲腕弱不任銖衣仙仙舉手欲飛四座太息忘疲三清㫖酒既醺都梁沉水氤氲騰觚獻夀欣欣賓心既醉如焚意氣激薄青雲日月不居嵗闌世道嶮巇萬端春華坐失渥丹何不被服羅紈逍遙永夕為歡仙人篇我聞列仙人高舉雲中行遊目狹四海矯首跂太清翔鸞翊芝蓋白鹿驂華軨朝發𤣥都府夕憩蓬萊城高風吹玉車犬倏忽遂上征九關敞朱户雙闕鬱峥嶸雲漢流前除白榆夾道生羡門與赤松含笑窺軒楹飲我𤣥霜液餐我琪樹英回觀八紘內萬有如蠛蠓跳丸一何迅過駒逝不停大年等天地末路安足營結客少年場行少年慕豪俠意氣凌高空生長五都市結交六郡雄千金買紫燕萬户買吳鴻探丸渭城北挾彈霸陵東杯酒笑相許慷慨氣填胸恥為小夫態長慕國士風連營過細栁逐冦出回中左擊呼韓遁右戰谷蠡窮塵起塞雲黑日落秋原紅韜戈報明主長揖不論功白紵舞歌晉體蘭膏明燭秋夜長齊謳秦吹響洞房二八徐舞為仙倡紈袖拂面飛朝霜遊龍宛轉雙鴈行如卻復進低且昻朱脣妙響含宫商凝嬌流態不可詳絃悲管急欲斷腸人生百年如電光春華未落秋風凉盤中美酒琥珀香鳯臘麟脯充圓方君今胡為不盡觴生逢聖世樂且康白紵辭鮑照體雕軒洞户組帳懸垂璫結佩舞少年凝眸欲笑卻復前鳴絃激管流芳烟驚鴻乍散白鵠旋如矜若怨姿變遷低鬟拂袖私嫣然月橫星高四壁寒秦箏激響趙瑟彈滿堂霜雪飛羅紈含宫咀徵曲未闌杳然流目意楚酸春華委謝秋露漙君今不采誰為歡張曲筵陳芳醑月下妖童白紵舞絃悲管促雙袖舉桃花水邉三月雨吳宫烏啼明星微西風拂幌木葉飛堂上燭滅君寧歸枯魚過河泣福集豈無端禍臻亮有由枯魚過河泣悔從鯨鰐遊揚鬐出𬈑海振翼徙炎洲翻濤作風雨噴浪成山丘旁顧無陵鯉鱣鮪安足儔一朝宕海澨潮落委遐陬紅肌試砧斧白骨聚蚍蜉橫海既成觀盈尺亦滿舟回首羡魴鱮游戲清波流慎旃逺遊子濡足何所求門有萬里客翩翩紫騮馬宛宛黃金璫客從何方來悲吟坐我堂一解客從江上來言向長安路海水白波長茫茫不可渡二解我有緑綺琴為君鼓三行誰為膠與漆誰為參與商三解索索復索索送子長安陌借問雲間人何如山中客四解山中無所贈手把青蘭枝一握何足道但感同心辭五解別君日以深送君日以逺安危在盛名努力加餐飯六解江上曲天津橋下楊花白春風吹落東城陌城烏啼罷燕燕飛飄霜流雪何霏微畫堂窈窕連香閣金屋春寒珠網薄芙蓉羽帳粉色香萬年枝上初日長可憐風吹過江去相思望斷江南樹陽春曲綺疏旭日春風寒風吹落花飄井欄飛來飛去玉柱端美人掩鏡鳴雙環雕琴纎指當忩彈含宫咀商曲欲殫遼然流想心不歡天山積雪久未乾尺書欲寄隴道難安能隨風到玉關閨隂早霜嵗欲䦨紅顔寂寞空長嘆子夜歌十二首儂年三五時雙鬟垂兩肩日在歡左右不解取歡憐秋月照四壁絡緯當忩織徒聞機杼聲終夜不成匹不能識郎心何用識郎面黃蘗在深林苦心誰得見始欲識歡時願作同心結絲線不相逢裏許暗自別歡游橫塘岸儂望長安道昔為同心花今成斷腸草年少不為樂夷猶欲誰與不見東門花落地如紅雨明旦溝水頭折栁牽郎衣郎心如流水東去何時歸誰令氷不寒誰令火不熱雨霜塗前除儂思底得絶枕上看月來夢中與歡訣月自不相離歡心不如月相逢不須臾相看長脉脉木末采芙蓉蓮子何由得儂如水中石波至亦纍纍歡如陌上塵左右從風吹玉腕㺯柔絃清商吐未轉何意凉風吹使我肝腸斷子夜春歌朱景帶碧樓新風吹羅幌誰能懷春情不發柔絃響春花渾欲笑春鳥自成歌惆悵春臯上含愁可奈何金屋燕初飛長堤草已緑春蠶不作繭思子何由續正及春花時采芳步華薄春風復無情又欲吹花落子夜夏歌開軒待逺風風來不吹面何如覓剪刀裁作合歡扇何處復無暑月出湖水邉泛舟芙蓉裏分明自取蓮含桃初作花畏恐旁人見今日食含桃空條誰復盼别時楊花落別後藕花芳惜往覺日短望來覺日長子夜秋歌嚴霜下空階促織聲何烈夜中無人語懷情望秋月凉風夜中來白露凝如玉不敢拭清砧搗衣亂心曲露井凍銀牀秋風生桐樹任吹桐花飛莫吹梧子去別歡三春月思歡九秋霜霜華上𤣥鬢儂心底不傷子夜冬歌朔風吹北林𤣥氷結逺岸君心非松柏嵗寒那不變萬里覆寒雲千林飛素雪此時為歡愁心如三伏熱華茵倚重爐璇房捲羅幕驚見雪花飛謂是楊花落憶歡不能寐中夜涕縱橫河流不應凍是儂淚結成上聲木葉自欲黃不待西風作聞郎歌上聲曲終淚已落上聲一何悲柱促絃欲絶三嘆未終極已看鬢如雪前溪郎從前溪去不向前溪返水流無淺深人心有近逺前溪何潺潺花流逐水去儂欲使花還不能使水住七日夜女歌長空起薄寒明河流素月誰云一夕歡可當經年別經年一水間相望不相及莫卷七襄衣是儂愁思織碧玉歌碧玉好顔色故是小家女笑倚金繡屏不解挑郎語碧玉十五餘絲髮不及肩理妝背面立宛轉得郎憐續曲歌別時不知愁別後空相憶日晚潮水來渡頭問消息儂作博山爐雙烟吐不住郎如飄風吹但將香引去本作雙鴛鴦忽為別鵠怨不是儂淚流江水有時斷脈脈閨閣中常似千里別兩心自分明有如水上月東飛伯勞歌鴛鴦比翼翡翠吟巫山湘水高且深可憐新妝映白日芳脂艷粉當軒出銀牀試展金縷衣綺疏月綴琉璃扉凝嬌聚態語復咽卷衣謝君心欲絶春風裊裊花氣寒長留可憐誰為歡烏棲曲四首桃花如泥栁如雪飄泊乘風無斷絶青楓江上波色寒郎今不渡春夢闌白門棲烏夜未曉參橫月沒霜皎皎金徒受水能幾何合歡日少別日多芙蓉羽帳翡翠鉤月華當户河漢流微吟細酌歡未厭城上烏啼明星爛銀牀小簟雲母屏博山吐焰雙烟青相看脈脈兩無語曼聲一曲淚如雨江南曲金堤栁枝拂水黃桃花如焚衆草香江南稚女歌春陽歌春陽氣若蘭采江蘺遺所歡春江漠漠朝氣深丹霞紫露流滿林踟蹰解佩傷春心傷春心騁逺目望平臯草空緑四時折楊栁歌春風入上蘭鳥啼緑烟中日耀桃李顔折楊栁春去復來歸人去當歸否芙蓉散朱華吐艷為誰芳不采當奈何折楊栁不畏秋浦空願得在歡手問君何時歸明月凝前除微霜下沾衣折楊栁搗衣寄逺人夜凉不覺久北風正烈烈雨雪逐風飛山深步道絶折楊栁但保嵗寒心不道歡相負榖城山館集卷一
