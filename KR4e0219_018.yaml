body:
  text: 穀城山館集卷十八明于慎行撰七言絶句四時宫詞繡閣春深自卷衣侵階芳草閉宫扉東風亦惜花零落吹向昭陽殿裏飛萬戶簾櫳下水晶沈沈宫閣夜無聲惟憐一片長門月照見啼妝幾處明金屋愔愔夜欲長螢流鴛瓦月如霜階前玉樹無情思早送西風入洞房午夜香銷斗帳寒雪花光滿玉樓端虬池漏水知多少别殿笙歌久未闌豔歌行四首夜色迢迢五鳯城斜窗宿霧月微明含啼小婦調春管吹入梅花調不成繡箔珠簾旭日長東風吹動鬱金香雙棲乳燕渾無語脈脈春情繞杏梁寶帳流蘇四角低燈花凝翠冷淒淒愁心未歇歡情少惱殺城烏夜半啼寶珥朝分淺靨妝雙鬟初試越羅裳花前祇恐春無力不道春愁可斷腸送周啓明水部上淮陽憲使四首十年玄武署中居建節初乘六傳車此日宣房沈璧馬河渠已有著成書薊門别思草萋萋五月樓船泊大堤欲問風流何水部梅花東閣幾時題詞賦名歸楚客豪和歌燕市曲彌髙不禁白雪淒清色灑作揚州八月濤揚子橋邊月滿城鄉心渺渺大隄橫長干估客今多少共聽襄陽曲裏聲送王洪陽光祿册封靖江四首親函玉節到炎洲萬里名山不厭遊一自輿圖開百粵蠻中今列內諸侯餘寒馬上試春衣四月楊花撲地飛行過故園應悵望荒郊無樹蕨苗稀衡陽秋色暮雲深湘水南來是桂林七十二峯青未了刺桐花裏鷓鴣吟南海西分驛路長紅塵飛惹漢宫香奚囊自有明珠在不帶千金陸賈裝送余太史雲衢册封周藩四首名都茅土建親賢春草平臺萬戶煙此日鄒枚應罷賦詞臣已和柏梁篇五月隋隄栁色醺炎風吹浪滚黃雲河壖滿目無青草瓠子歌聲更忍聞夷門邸第列儲胥十里朱樓夾道居少府金錢渾欲盡王孫強半食無魚碣石宫前負弩過閭門秋色入鳴珂可知瀛海多仙氣九𣲖中分太史河題忠順夫人畫像四首燕支山色點平蕪染出春愁上畫圖一曲胡笳明月夜邊聲又度小單于邊城新舞柘枝辭降得渾邪罷漢師不道長安春色少甘泉宫裏畫閼氏天山獵罷雪漫漫繡襪斜偎七寶鞍半醉屠蘇雙頰冷桃花一片殢春寒蓮花寶鋏緑雲鬟不脫襜褕欵漢關枉殺白登城下畫此中原自有紅顔送田鍾台殿讀省覲南還四首十載金門隱歲星故園歸去為趨庭武夷山色休相訝不染風塵兩鬢青憐君萬里入滄洲天際孤帆水上浮别後相思無處寄鴻聲不到海南頭零落心期世路難河梁斗酒為誰歡不知十二街頭月今夜君從何處看别恨歸心總不支薊門煙雨送行時離人莫折官橋栁為我留將一兩枝送人作府幕二首少年來作五陵遊一掾風塵已白頭今日送君秋色裏疏鐘小雨上離舟幕下風流何處尋芙蓉秋水白雲深府中不識參軍筆試問甘泉舊羽林其人金吾掾故云望仙吟二首送王鍊師入關雲中白鹿上仙家緱氏城頭落綵霞吹斷玉笙人不見春風一樹碧桃花玉女芙蓉接漢京金人髙掌露華清茂陵松柏今零落雲裏空聞衛叔卿壽京山李太封君八十四首駐世誰稱陸地仙竟陵秋雨芰荷船歲華欲問今多少曽記興皇入楚年一卧滄江少世情西窗鶴夢不曽驚日髙欲進雕胡飯堂下風吹佩玉聲鳯詔雙函錦字芳紫煙白石釣蘭塘間來却向宫雲望香案前頭緑鬢郎八十年來卧楚山緋袍春酒醉紅顔從今歲月應難紀名在丹臺玉室間塞下曲八首為薊門大夫賦漁陽九月海風秋漢使行邊雪滿裘一拍胡笳雙鬢改應憐飛將不封侯落日黃雲古戍平鐃歌千騎逺橫行江南劍客多年少笛裏初聞塞上聲材官角射技爭施十石輕開未是奇虛發自矜能下雁隂山愁殺射雕兒鐵騎翩翩塞草平詔書十道大徴兵弓懸明月秋常滿劍倚青天夜自鳴薊門迢遞雁門東百二河山紫氣中一自單于稱保塞邊城絃管識春風西山重疊護燕臺鳯舞龍飛勢自回鳥道千尋天上落孤城一片日邊開萬里呼韓欵塞年君王大發水衡錢從教白璧揮如土只看龍堆一縷煙城下驂驔鐵騎飛名王盡著漢臣衣少年笑解茱茰帶換得胡姬善馬歸夢笑不知蝴蝶是莊周開口蘧蘧笑未休若使人生渾似夢誰能更解許多愁春日懷寄可大灞上魂銷已隔年御溝煙栁送潺湲春深欲問南來雁知到瀟湘若箇邊送范涵虛太史請假南歸四首握手離亭一黯然北風吹送渡江船斗邊自上豐城氣明月誰知是各天與君連棹謁楓宸五見長安碧草春今日送君江上去自憐猶作未歸人年年陌上起驪歌别恨秋聲可奈何欲折一枝橋畔栁長條零落已無多莫擬扁舟泛五湖六橋煙月舊遊孤停橈試隔秦淮聽子夜歌聲尚有無聽琴曲二首戲贈子充一夜秋聲入洞房朱絃調罷理清商琴心自合相如識可道旁人枉斷腸纎手雙鬟一拍成西風吹冷鳯凰城忽驚塞雁天南起彈到瀟湘第幾聲遊仙詞二首送聶鍊師玉洞沈沈曉霧寒鼎中絳露轉金丹黃庭閲罷心無事間數飛花落石壇野鶴間雲自有家萬山深處住煙霞無端出到人間世落盡仙臺白玉花送靜上人還雞鳴山二首縹眇靈山枕帝畿安禪一榻舊荆扉鐘聲杳靄秋雲裏萬戶江煙鎖翠微杖錫新辭闕下歸從今出世有傳衣經臺到日春應暮多少天花作雨飛答二兄書鴻聲不到夜郎天故國音書又隔年兩地愁心何處夢長安秋月不成眠贈相工李生遊金陵謁洪陽張丈二首落魄人間六尺身懶充唐舉目中塵鳶肩燕頷渾間事只此形骸總未真看盡長安馬上衣秦淮秋色去如飛到來試拭風塵眼細認壺丘善者機題棠軒便面羣山橫黛樹橫煙隱隱迢迢似輞川獨坐虛亭秋萬里箇中真意若為傳查虞臯文學自越中遣書相訊寄謝四首春風曽泊孝亷船握手相看各黯然别後秋鴻江上去一封來到海雲邊曉月山城夢斷時六橋煙樹不勝思梅花忽送江南色滿目仙郎白玉枝奕世才名珥漢貂凌雲綵筆起垂髫即今過夏看行卷猶帶錢塘六月潮絶代紅顔衆所降休將春色怨秋江若耶溪裏分明見一入吳宫自少雙四月一日曹常侍園看花同馮用韞葛仲明二館丈賦西城仙館侍中家别苑春深玉洞霞一曲歌聲聽不散隨風吹落小桃花春紅盡向野亭開萬緑輕隂鎖碧苔獨有梨花能似雪尊前半拂舞衣回垂栁池邊見海棠一枝寂寞倚殘粧娉婷可奈移燈看何處春愁不斷腸宫霞半吐玉闌干春色遲遲上牡丹不是東風催未得天香綽約不勝寒題江村秋晚小畫四首小亭獨坐思依依十里煙波冷釣磯鷗鳥不知塵夢逺驚回猶自背人飛萬壑蕭蕭近晚秋暮天寒雁水悠悠月明應是多愁思玉笛霜前自倚樓一曲長隄沒斷橋寒煙斜日逺迢迢間心無事看秋水不是錢塘半夜潮茅屋疏籬映短莎窗前髙樹夕陽多白雲不斷橋邊路猶許幽人䇿杖過伾麓山房十詠為朱槐石令君賦雲樹渾如緑野蹤宫槐常帶紫泥封不知漢日華隂里得似青壇第幾峯一槐莊一樂堂懸百丈峰郎君仙桂大夫松春蘿翠滴宫袍色若箇瑤臺十二重一樂堂百年長嘯寄乾坤煙水平臺逺樹村莫在黎陽秋色裏何人不道是蘇門舒嘯堂萬樹赬霞數畝壇東風點染石闌干主人舊有蓬萊種歲歲明光殿裏看杏花巖暮雨翛翛鶴夢驚西風吹送萬竿清渭川不比封君畝自是仙曹舊佩聲修竹廬回首長安似奕年枰丘坐隱白鷗邊仙人六博何須看只住人間亦是仙局丘歌裏春遊盡落梅野亭煙雨百花開天香不屬東皇領自是河陽客子栽于野亭寶座蓮花萬仞成中天飛現白毫輕秋來一片瑤臺月常似摩尼掌上擎大佛巖玉洞山坳帶夕曛神功片石吐氤氲不緣洞口春雷起誰識蛟龍萬里雲夕陽洞亭榭髙鄰梵帝筵千章古柏黛參天尊前瓠子秋風起吹送漳河萬里船虛曠亭送沈晴峯太史北上二絶山中昨夜解春衣天杪征鴻正北飛欲問舊遊零落裏蓬萊闕下幾人歸時來公等共彈冠直北浮雲萬里看莫笑故人生事少五湖隨處有漁竿韓敬堂年丈連舉二子戲賀不分君家樂事頻畫堂簫鼓日如春蘂宫乞得雙龍女各捧明珠獻主人送朱可大工部奉使歸省四首寶馬鳴珂御苑東路人爭識小司空看君晝錦應難似兩袖天香出漢宫才入鵷鸞舊日羣寧親早已望江雲稱觴剩有芙蓉色可是仙人掌上分形影相依自兩生重逰春苑不勝情如何芳草橫門月又度陽關曲裏聲南極天髙動使槎五雲縹眇上公家趨庭儻問垂髫侣避世如今鬢已華送張洪陽學士請告南旋四首歸舟端不異登仙豫告恩深侍從年臨發黃門傳尺詔尚方馳賜買山錢長河南下水曽波吳楚青山枕上過行到潯陽江口望應憐秋色故園多秋風湖上鱖魚肥明月扁舟興欲飛蕙帶從來渾未改江猿應識主人歸笑遣麒麟閣上名間居聊得賦西征只愁拈出金甌字夜鶴山中夢又驚題張學士間雲館四首芙蓉江館閉霏微江面間雲擁釣磯春色不勝芳草緑萋萋長似待人歸滕王閣下碧波寒徐孺祠前木葉丹一曲池臺千竹裏可知無夢到長安齋心自捧玉函經永日焚香坐小亭隱几蕭然秋似水不知江上幾峯青山中叢桂碧氤氲十畝煙臯領白雲㩦得青萍雙劍在斗間遙夜動星文王忠銘宗伯山房四詠文筆孤峯入紫霞管城湯沐屬誰家炎風吹散江淹夢灑作仙人掌上花文筆晴煙彩霞為羽日為冠啼破桃都五夜寒似向蓬萊宫裏見春聲曉殿簇鵷鸞金雞春曉石隴雙峰控錦鞍五花蹀躞駐雲端不禁更向吳門望海色遙分練影寒石隴馬鞭石橋流水拍長隄半似苕溪半剡溪一自主人題柱别年年春色灞陵西橋頭碧水壽封御史中丞姚江邵翁六首西臺斧繡下觚稜八座新階帝股肱更道髙堂承內渥一時真拜兩中丞世代衣冠直漢宫家聲萬石舊稱雄丹書映日傳江上白簡飛霜出殿中清秋鶴髮自樵漁年已非熊入夢餘雙闕舊分蒼水玉五雲重展緑綈書曽是先朝畫省郎江湖白首荷恩光即看寶帶渾如舊不綰南陽召父章九十行歌閲大年紅顔春酒萬花邊人間自有桃源隱不到蓬萊已是仙綵服親擎白玉缸朱轓聊駐碧油幢八龍自是荀家盛就裏慈明更少雙少年行四首五雲深處見仙家十二樓頭醉彩霞莫倚闌干橫玉笛春風愁殺白楊花鵔鸃著出未央宫粉色爭看漢侍中昨夜春寒沾賜酒天香不散舞衣紅錦帶珠袍緑臂鞲相逢盡説富平侯南山夜獵春城晚繫馬新豐舊酒樓從獵期門拜射聲玉鞭騎馬出重城尋常借客長陵市小吏無勞問姓名告中題齋閣紅梅四首花時伏枕殢歸情紙帳羅浮夢未成不是宫霞分片色空教笛裏落春聲瑤臺舊日侣羣真雪骨氷肌别有神化作彩雲銷不得多因染郤漢宫春疏枝向月倚雕闌粉色盈盈鏡裏丹為憶故園春色早愁時只作杏花看姑射山中綽約姿嫣然額上點胭脂粧成却得東君笑不信紅兒是雪兒為潘海濵處士題竹萱圖二首素節凌霜耐歲寒翛翛池影夾琅玕不知鳯去瑤臺後長得孫枝更幾竿柏舟髙詠事淒涼漫樹忘憂向北堂此日春風轉蘭蕙靈根猶自發天香山中奉寄太宰夢山楊公四首為慕仙家九節筇白雲秋色逺相從那知黃石山頭月猶隔丹丘海畔峯曽記都門祖帳開驅將雙鶴與歸來只今養得修翎在海上傳書日幾回夢中山色可曽驚陌上煙塵塞上兵千樹桃花月明夜半間樓側聽吹笙滄海西頭繫釣船蕭蕭春雨緑楊煙垂綸莫近磻溪岸恐是非熊入夢年歸山寄賈石葵年丈四首一别心知幾度秋歸來相望轉悠悠長安舊侣多年少馬上如今半白頭陌上論交意總殷眼中誰是嶧陽君如何同作東山隱却隔山前一片雲瑕丘南去路漫漫月滿山窗夢易殘君在滄浪秋色裏同心誰伴采芳蘭聞道君王憶月卿徴書蚤晚到山城可知昨夜東風起碧玉峯頭鶴夢驚聞子沖被徴寄問兼趣早出四首穀城山色五峯亭十日相過酒未醒底事西河橋畔栁殘枝又傍馬頭青西山烽火照邊城殉國何人更請纓知是濟南年少在匣中長劍作龍鳴潘園無限北堂歡捧得除書掩涕看一夕烽煙勞聖主雄心那不指樓蘭四十男兒報主身時艱安得避風塵功成自有抽簪日且借青山與故人山中承蘇岱髯國相寄自製銅雀瓦硯戲謝磨不多時染未乾鄴都宫殿幾回殘題名自是西園客不必重鐫漢建安題路鳯岡庭中巨石雕闌四面鎖崔嵬碣石殘山此地開若在錢塘江上見何人不道小飛來天台小畫春雨桃花夾岸香天台流水路茫茫塵緣自與仙源隔誤殺人間學阮郎巫山小畫霞作綃衣霧作裙恍疑神女降氤氲明朝試向陽臺望只是尋常一段雲山中贈王生改豫二首當年供奉禁中遊親捧綈囊侍殿頭何事白雲峰下見蕭然秋色滿吳鈎盈盈青鬢嘆飄零千里江湖應客星錯憶韓康曽賣藥不知劉向自傳經戲賀侯六新納少姬四首宛轉銀屏怯向人蘭釭斜背拭羅巾妾身不恨生來晚只小檀郎四十春梅花斗帳月沈沈夢到陽臺路正深何處愁聲聽不得隔房人誦白頭吟鳯女新調玉管簫碧桃花底夜迢迢陽臺一段間雲雨總向襄王夢裏消雙鬟嬌小未當壚嫁得虬髯美丈夫一曲琴心何處應新聲挑出鳯將雛相工劉鵬北上過謁書示二首戰勝年來久杜機忽逢遊客叩荆扉龍鐘此日無他問只比歸時可較肥箬笠漁竿一魯狂不煩姑布再平章君眸縱似青銅鏡那摘星星兩鬢霜路鳯岡民部第中牡丹冬開寄題四首春風亭館上公家小至重開木藥花不是秋分仙掌露那因寒殢赤城霞沈香亭北醉多時霜後依然絶代姿道是經秋渾不解先春早發向陽枝一朵宫雲百寶欄不妨人作艷陽看同時桃李皆零落贏得天香耐歲寒任是東風别有情秋容寂寞轉傾城夜來飛落瓊臺雪一片紅粧傅粉成為侯六悼妾六首玉貌當年入畫堂盈盈團扇試新粧無端曉鏡銷鸞影一夜潘郎鬢有霜秦樓少女舊多情解伴吹簫學鳯鳴今日樓空人不見簫中吹出斷腸聲緑珠枉向瓊樓墜碧玉空因綵筆傷何似芳魂能戀主化為隻燕宿雕梁雨僽風僝暗結愁落花銜怨赴東流紅顔不待盧郎老付與文君共白頭頗怪春來勝賞稀花時無緒掩重扉知君半醉詩成後淚落牀頭舊舞衣惆悵東風恨萬重難將春夢覓仙蹤香魂一逐行雲去知在巫山第幾峯觀孫山人虎丘西湖畫卷有引常聞虎丘武林之勝志欲一往歸且老矣兹遊不遂翹首茫然因煩孫山人夢陽為作二卷朝夕披閲以當逺遊圖成書此為贈生平不識江南路越水吳山寄夢遊為掃秋光盈片紙却疑身在五湖舟姑蘇臺畔武林西指點橫綃咫尺迷便使春遊能萬里也應只作畫中題路鳯岡民部第中芭焦作花一叢百瓣諸公稱為奇瑞有書見示燈下聊賦二章以寄嘉賞陸地蓮開世所稀瑤臺秋色轉芳菲湘紋已自舒歌扇金縷還應繡舞衣莫向秋聲問是非緑雲紅雨正霏微總疑覆鹿全非夢蝴蝶枝頭底又飛方山别後得馮少宰寄詩賦答口號不堪别思倚髙秋人自魂銷水自流莫問留侯何事業只今已伴赤松遊夏日過二兄石淙别業同遊洪範東流用韻六首十里行歌路欲迷石橋曲徑過龍溪村翁底事爭相笑驢背風吹白接㒿桃花落盡武陵溪碧草芊芊岸栁齊洞口主人今不在青山如畫鳥空啼兩代豪華盡可哀中丞樓榭故侯臺多情惟有東流水依舊聲從樹杪來谷口花深日欲低水邊村落聽雞啼晚山更自多佳氣一帶寒煙暮雨西古廟空壇枕石城殘碑埋沒落花平池邊何代長楊樹嗚咽寒濤作雨聲霸主荒墳俯碧溪夕陽草樹冷淒淒山泉帶雨聲何急流到臺前不向西老君巖萬仞峯頭碧玉壇丹霞為佩月為冠應知一化金仙後象教唯從過去看朗公石朗公已逐諸緣滅此石何緣號朗公莫向精魂論片石都無生滅是真空送可大行方山道中二絶馬上朝朝望翠微山中處處有泉飛人間岐路能如此半點紅塵不上衣煙林六月早涼生夾道青山畫不成流水亦知人送客潺湲學作斷腸聲牛山贈百歲僧二絶百歲真僧住翠微白毫光散六銖衣逢迎猶自過山半指點巖泉步似飛匡牀一鉢飽胡麻不記山中歲月賖惟有少時松桂在眼看落盡六朝花題文學鄭生墨海壺天卷二首長安可識魯諸生筆底龍鸞到處驚好去漢宫題署榜今年太極殿新成戲取刀圭鍊紫霞壺天深駐上仙家等間種就千林杏開作宜春內苑花郭汝承詩有鄉思書此解之十年幾作五陵遊一劍髙橫萬里秋此夜龍光方射斗鄉心且莫視刀頭穀城山館集卷十八
