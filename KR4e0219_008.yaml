  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0219_WYG_008-1a, image: WYG1291/WYG1291-0075c.png}
body:
  text: 穀城山館集卷八明于慎行撰五言律詩懷寄張玉陽年丈二首怊悵前年别綿綿嵗月征積薪從古歎投杼至今驚春雪梁園道秋江建業城行蹤何處問愁絶鴈來聲聚散年來事茫然思不禁薄遊交道淺久宦世情深别日楓林夢愁時桂樹吟悠悠大河水詎盡尺書心薊門行四首為于大夫子沖賦漁陽開幕府授鉞魯諸生廟略魚麗陳軍符驃騎營懸金親教射畫地細論兵半醉歌聲起風高右北平少年多意氣仗節赴燕雲曉月懸弓影春星吐劎文防秋歌出塞逐敵賦從軍未許平陽騎橫邀萬里勳九月平原獵材官大合圍雪凝驕馬汗鐡澀侍兒衣塞鴈連天起征蓬卷地飛此時都膽落前隊射雕歸邊烽傳大漠一劎夜臨關鳥道千重戍龍城萬仞山降兵旗下出侯騎雪中還苦樂行間事魂銷壯士顔奉寄李北山先生四首當代論騷雅公存大國風源流千古見才俊一時空嵗月鴛行外江湖鶴髮中倚天長劎在猶覺氣成虹先朝老法從白首臥巖阿避世交遊簡藏山論著多醒酬漁父問醉倚雪兒歌大有餐霞祕紅顔盛若何雅道何寥廓時名易陸沉不因今日論寧見異時心翦拂千金價宫商萬籟音故交蕪沒久亦許附詞林先君為公舊友承采遺詩故云龍門何日御流想碧山隅文雅從先進聲名避大巫白雲康樂墅春酒步兵厨早晚抽簪去能容絳帳趨同馮殿講琢吾夜過東鄰魏光祿見泉二首一曲宫城陌君今幾卜居小開蔣詡徑别作子雲廬花落藏書後風生漉酒初相逢殊恨晚傾蓋意何如舊好應無厭新知亦已歡銜杯遲月上揮塵惜燈殘世態間堪見浮蹤拙自安所欣東壁影時近夜光寒夏日過雙寺贈寶藏法師偶過城北寺一憩寶公堂午飯青精滑新茶玉乳香疏鐘沉片雨髙樹出斜陽為叩經行地浮杯海路長代書答陶比部蘭亭落魄佳公子天涯可定居適來江上使傳得篋中書湖海名方盛雲霄事轉疏沉冥吾所慕數飲態何如贈人為金吾郎二首俠少羽林郎承恩直建章臂鷹馳道側調馬御樓旁夜月燒燈苑春風蹴鞠場錦鞲渾未脫十日從長楊陌上錦雲連期門校獵旋射聲銀作鏑躡影玉為鞭撇草連雙兔凌空接兩鳶應憐漢飛將白首滯窮邊可大邀遊張常侍園二首夙慕名園勝因君載酒看山容虛榭滿竹色小樓寒地主更新貴遊人續舊歡愁中春色過才此一憑闌五侯開别館平野碧湖東乳燕翻槐日鳴鳩試麥風水窮千樹裏亭隱百花中却憶山園路芳菲正滿叢壽寶藏上人二首舊檢高僧傳林公勝範稀安禪多寶座印法六銖衣雨落時聞梵花開自掩扉空門忘嵗月想見劫塵微壽者原無相何因證大齡階前雙樹老閣上片山青地傍蒼龍闕函開白馬經應憐朝市客幾日鬢毛星送侯六參軍燕城秋欲暮匹馬送君還投筆書生志鳴鞘壯士顔邊風吹錦帶海月落刀環慷慨匡時略何年出玉關送妹倩李子授侯門教讀天涯思弟妹見爾帝京遊捧檄趨軍府彈冠傳子侯黃花征路晚玄鴈塞城秋那值池塘恨臨風涕泗流時方有亡兄之戚故云出塞四首為遼左李大將軍賦塞上發鳴笳軍聲動地譁三秋徵彀騎七校選良家曉月分弓影秋霜吐劎花主恩何以報急為掃邉沙銅符天上至漢將出龍城雲鳥圖成陳河山幕作營日凝金玦色磧冷鐡衣聲早報胸奴滅西京甲第成元戎新授鉞俠少逺從軍莵塞秋山合龍城舊路分角聲吹凍雨旗影亂浮雲百戰城南道方成上將勳玉節君王詔軍中夜築壇金人歸少府鐡騎散材官逺戍三秋斷嚴霜萬里寒功成多意氣歌舞入長安懷周公瑕苦憶吳門隱翛然一釣竿煙霞雙鬢老天地五湖寬閲世憑烏几逃名著鶡冠何時燕市裏重逐酒人歡詠史十八侍中郎春深侍建章呼盧金戺側踏鞠玉樓旁夜賜離宫酒朝薰異國香可憐秦殿女向月卷羅裳周公瑕有書見問寄答故人何所似契闊已多年舊事間應記新詩老更傳花開三徑雨門閉萬峰煙猶采相思樹封題到逺天春日有懷東郭草堂吾廬吾所愛雖小却宜春草色常經雨花香不受塵歸期何日定旅夢此時真怨殺煙臯鶴臨風待主人閣夜隱几虛堂夜幽懷誰與論星河臨九陌鐘漏徹千門黯淡傷春事踟蹰念主恩蘼蕪今已緑歸路滯王孫報塢山人汝翼念子不能寐三年闕報書自緣歸興久非是故情疏南北無寧嵗江湖有索居爾時吳市隱寥落復何如報雲翠山道士許公契闊茅山侣書來見素心養砂還守竈種樹已成林月出巖泉冷花飛石洞隂知君相憶久日聽曉猿吟春暮歸心無可奈先作送春歸細草河隄合殘花苑路飛夢回雙闕雨思繞舊山薇想到征輪動薰風已上衣臥病臥病已三月歸圖猶未成慰留明主意推挽故交情御路蘼蕪發春山杜若生湖邊小行徑處處有魚羮閉門閉門多所適懶與病相宜岸幘全忘沐匡床久未移酒醒微雨夜衣減落花時只憶河橋柳應餘未折枝告中馮用韞宫諭朱可大丞卿見過臥閣荒三徑惟容二仲過借書酬寂寞説劎慰蹉跎未路交情少他年别思多東門楊柳色執袂可如何小閣小閣經時臥琴書靜不譁丹衷猶戀主清夢已還家幾對春城月虛開杜曲花一牀餘丈室還似住毗邪可大遊摩訶菴有詩見示賦答少壯歡娛地憐君只自遊一春全臥病舊事幾經秋聽雨花間坐飛觴石上流歸心將别恨憶此更悠悠孤鴈池上孤鳴鴈因風憶斷行凋蕭形影共蹢躅羽毛傷有恨驚霜露無心慕稻粱如何籠伴鳥噭噭主人傍上書上書書未報旅思且盤桓天意高誰問人情巧自看味兼甘苦盡色併笑啼難耿耿孤臣志惟餘一寸丹雨中遣使買舟時節忽復易間居事更幽微風吹木杪片雨到牀頭未解虞卿印先尋范蠡舟行裝書數卷沾濕不無愁乞休華髮登朝列承恩嵗月深病酬吳客問思作越人吟世事容蕭散時名任陸沉本無匡濟略報國在抽簪聽薑生彈琴客來山水際為我鼓鳴琴月泛三湘色松流萬壑音焚香消晝永啜茗到更深莫漫彈招隱方懷桂樹吟寄題楊夢山先生半間樓舊有滄洲興今成緑野遊桃花千樹雨月色半間樓隱几山光入開簾海氣收却令麟閣上圖畫想風流新城館中夜坐獨坐燕南館桃燈坐自深還家遊子路去國邇臣心落月征車動寒霜客袂侵陸沉非避世吾道在雲林白溝河西風吹易水曉飯白溝河獵騎平原淺漁舟别渚多地分燕趙敵國蹙宋遼和今日逢全盛盧龍尚枕戈途中書懷二首聖代無高隱行藏亦有因寡交思避世多病學全身止足存微尚安危付巨臣所慙恩禮重雪涕念君親太息宗祊計回天事信難三年頭欲白八疏口將丹璇海波能潤瑶臺月正安漢庭多強項誰敢測宸歡單家橋十載橋邊路巾車此重過秋聲連渤海寒色下滹沱避地紅塵逺還家華髮多來時道旁柳生意稍婆娑暮抵德州城下瞥見漳河水燕齊兩界分郡樓融晚雪津柳挂殘雲病骨寒應倦鄉音近稍聞明朝看海氣遙禮泰山君茌平道中感懷父老迎相問君今華髮歸雲霄身自貴家國事多違具邇差皆盡同遊既已稀畏看舊門巷先有涕沾衣銅城望見雲翠諸山歸途今日愜憑軾見吾山以爾千巖翠慙人兩鬢斑向來多逺夢從此閉重關不似終南路依棲慕世間立春日楊户部廬山謫官河南枉道過訪軒車來逺道執手意何長喜對春盤酒愁分畫省香士龍名入洛司馬賦遊梁莫漫悲岐路雄心在四方除夕前四日送楊户部之官河南送子嵗云晏踟蹰可奈何酒邊生白髮雪裏渡黃河落魄才難盡飛揚意故多春風洛陽道早晚聽鳴珂抵舍承邢知吾侍御賜問裁答二首海畔投簪始伊誰問索居長安千里使濟水數行書世事焚魚外時名夢鹿餘平生周柱史避俗意何如海嶽終堪隱風塵幾倦遊采芝隨綺季種竹待羊求月迥春天樹江寒雪夜舟何時芳駕至尊酒一淹留歸日王興甫文學于子沖大參來視山齋春欲盡上客到羊求對月休愁思看山且醉遊蟻封知是夢駒隙信如流不見芄蘭侣辭官已白頭挽趙秀才竹里二首别來能幾日溘已隔重泉不作鵬摶海翻成鶴上天談經溪閣月對酒竹樓煙回首東山社傷心涕泫然連年家難劇雙淚日沾纓已嘆無兄弟誰堪喪友生延陵荒草合管子舊臺傾更甚山陽路空聞笛裏聲穀城山館集卷八
