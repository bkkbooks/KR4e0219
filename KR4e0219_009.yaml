body:
  text: 穀城山館集卷九明于慎行撰五言律詩泰山道中地僻塵踪少山深石路斜雨中過佛院雲裏見人家雊雉飛春麥啼鶯繞落花流亡今欲盡幾處有桑麻上隔馬嶺舊寺荒涼經古寺迢遞出層空路抱千峰轉天開一竇通殘松疏雨後頽瓦夕陽中猶有餘僧在逢迎問轉蓬泰山天門禪堂逢傅柱史金沙贈别含桃花欲落山下遇君時雨過空王殿天晴嶽帝祠相看芳杜色各有白雲期不似風塵路偬偬嘆别離泰山絶頂對酒茫茫今古事欲問岱君靈漢柏虛稱觀秦松枉勒銘此生遊已倦何地酒能醒杖底千峰色依然未了青下泰山遊三陽觀半嶺通仙界縈回嶽麓西已看三觀迥猶覺萬峰低暮雨瑶華落春雲玉洞迷遊情渾未減縹眇望丹梯飲三陽觀絶頂對月孤亭堪倚嘯一醉斗牛邊褎拍千峰月觴飛萬樹烟花前鸞吹度海上鶴書傳借問三宫路今當幾洞天遊仙詞四首贈三陽觀咱雲山道士寰區不足步聊作小遊仙牒祕丹繒字山藏緑玉篇石梁雲外掛瑶島月中懸欲問餐桃客蓬萊更幾千五遊凌碧落倣佛見乘鸞瑶水銀為闕蓬丘玉作壇飛塵成大藥毁竈出神丹舊遇華山博曽將六箸看咱公曽棲華山故云由來稱福地自合有仙才蕭史吹笙下欒巴噀酒回雲軒通紫闕月宇逼丹臺謝手塵中客年光漫自頽辭家慕冲舉名嶽且依棲遼左遲歸鶴淮南見去雞𤣥霜堪入藥白石總如泥試訪清都宴雲門路欲迷子冲擕尊方山相候因謀卜築百里行厨至追歡有報書春城開臘蟻别墅罩河魚白社能留客青山可卜居未須煩地主十笏是吾廬靈巖竹房對雨舊日題名處山窗竹未殘重遊春欲暮復向雨中看暝色來千嶂寒聲到萬竿應添禪悅味新筍入盤餐靈巖主僧邀遊五峰亭遇雨即事已成三日醉更上五峰亭嶺外雲猶碧尊前雨半青唯然南嶽偈莞爾北山銘向夕傳清梵泠泠自可聽靈巖禪室子冲興甫夜飲大醉對酒不能醉明星已在天放歌知愛客縱飲是逃禪世事驚心後時才屈指邊乾坤吾黨在把臂意茫然買洪範泉旁隙地規作園池誰言泉上築不作輞川看山色宜書幌溪隂可釣竿分流防短岸樊圃避危湍稍待西疇畢移家事未難夏日黃石山莊即事山居涉長日散髮不容簪酒熟牀頭漉詩成枕上吟移花常待雨種樹稍成隂欲叩金閨侣何須此陸沉夏日山居周礪齊太史奉使周藩過邑見訪賦贈二首送君逺行役六月過山城細雨鐘前落微風樹裏生茶瓜涼夜色車馬故交情却憶橫門道分途嵗已更夏日門常掩何因駐使車時同河朔飲地似武陵漁天地容高枕烟霞有定居莫將竒字問獨少著成書因周太史使還海上寄楊鍊菴丈及澄上人一首苦憶東林侣逢人附報書花殘陶令宅月出逺公廬世念歸應盡幽懷病未疏三山知有路正擬戒遊車午日獨酌邑里逢佳節無歡坐草亭年華雙鬢白心事一杯青柳畔驚鶗鴂花前嘆鶺鴒少人與同醉不是獨為醒山莊獨居豈無山水慕只是舊逰孤隴上遭田父壚邊問酒徒頽年資藥餌野性適江湖回首鵷行地春風滿鷓鴣聞胡竺西山人被縶有懷二首慷慨關東俠詞場舊所歡如何燕市筑忽作楚臣冠翻覆人情險傾危世路難夜來豐獄劎虹色為君看長鋏今何適從軍赴桂林談天時網密逐客廟謨深寥落詞人賦凄凉國士心沅湘何處望愁絶鴈書沉十月四日張就山初至同飲東園菊花下作上客來何暮山齊菊欲殘猶餘秋徑色聊待酒人歡艷蕊迎霜立寒香浥露餐晚酣休便去新月出林端安我素吏部倚舟過訪酬贈沙邊能繫纜相顧到林廬斗室虛髙枕衡門有駐車桃燈秋雨後漉酒菊花初好在山公啓休忘北闕書冬夜宿香山寺一宿招提境匡牀坐夜分山深遲見月石冷細生雲仙梵林中發名香座上焚老僧應出定時覺語相聞暮抵吳家渡楊令君擕酒宿王户部别業十月荒山道迷茫起暮隂凄風吹古渡寒霧結平林地主尊壘逺山家巷路深因過故人宅懷舊一悲吟往弔于子冲黃家渡口大雪寒冬涉濟水雨雪滿征裘欲解留徐劎猶疑訪戴舟馬蹄臨渡澀人跡過山稠漸近齊州路傷心觸舊遊雪中濟南道上擕張就山同行忽失所在詩以覔之雨雪擕同好行行失所如細尋東郭履久駐信陵車誤恐迷花徑寒應殢酒廬居然成間闊暝色野躊蹰張山人告行燈下言别幽居無與晤殊喜故人來秉燭頻開卷逢花數舉杯寒雲江上樹凍雪隴頭梅明發黃山路離愁不可裁送張就山西遊趙國及赴蕭大司馬之召關河氷雪滿遊子去何之長揖雲中幕高談鄴下詩西園飛蓋夜北塞勒銘時回首秋山賞能忘桂樹枝查虞臯儀部道出濟上遣書賜問賦答二首别緒三秋迥書來慰夢思林中醒酒後河畔倚舟時雪靜關山影雲生澗壑姿嵗寒無可贈惟有折松枝有懷江左彥夙昔共蘭襟報國青萍器承家玉樹林郎曹雙管舊禁漏五雲深無恙西山色猶堪柱笏吟壬辰冬月連營兄弟二葬撫今追昔􅏰然有感聊賦四首無限傷心地連朝薤露吟仁兄歸永夜愛弟托荒岑華蕚俱凋落松楸漸鬱森寸腸摧斷久猶自涕沾襟纍嵗遭家難心悲不可論魯門疑逺夢易水送歸魂取次栽墳樹從新拭淚痕乞休曽有疏酸側動天閽門庭思往日文雅盛當時共目三珠樹相輝五桂枝一朝虛枕被萬事罷塤箎怊悵餘生在衰顔欲對誰久客歸何倚孤蹤只自憐顧瞻鴻鴈影吟嘆鶺鴒篇翰墨藏春雨池塘慘暮烟經過酬倡地無處不􅏰然石門道中風雨石門道凄凄衣䄂單人家烟樹隔山徑草花寒蕭索前朝寺荒蕪何代壇十年來往路立馬一長嘆再過汶上路鳳岡民部出送河橋留别邑里經年别重逢春草芳一杯臨汶水三月綰垂楊豪俠齊公子風流漢省郎鄉山多勝賞後㑹莫相忘任城魏松軒山人擕琴見過從遊溪山數日書贈自遣樊中纍常多物外遊看君擕緑綺訪我到滄洲月色和烟映泉聲作雨流吾廬山水際是處可淹留南溪石上聽魏山人彈琴送别溪樹午蕭森因君理素琴乍將流水引寫作落霞吟别鶴飛何逺遊魚躍自深只今懷往路何處覔知音吳門周畫師從遊溪上數日賦贈林壑看如畫幽人此地過彈琴流水近對酒暮雲多地僻無來往山深足嘯歌牀頭有匹練試為掃烟蘿秋日從諸親友飲城南溪上遇雨呈亭山周師二首雨後南溪水新添幾尺流壺觴陪父老笑語到林邱掃石聊施簟烹魚旋摘鈎酒闌更坐起隨意看鳬鷗闊略師生禮相將把釣竿青山閒共適白髮醉同歡雨色尊前近灘聲樹杪寒踏泥連騎緩歸路不知難六月十二夜可大小酌即事客乘殘雨至席對晚凉開酒畔移燈去花間送月來風流河朔㑹倡和柏梁才更憶長楊路青葱玉樹栽時乃郎試京兆云七夕可大小㑹即事和韻小閣驅殘暑當筵夜色青樓頭生片月河畔度雙星桃葉虛稱扇松枝戲作屏秋聲驚白紵沉醉不能聽和可大七夕書懷新凉浮玉宇客館易為愁天上明河夜人間白露秋逃名惟對酒乞巧詎登樓自有豐城氣迢迢映斗牛江右黃淮朐文學可大客也以書授其弟姪東遊賦贈南州有高士邂逅見風流雅醉荆卿酒常隨郭泰舟窮經探魯壁作客佩吳鈎門下推師授名成兩夏侯陪朱可大丈遊陶山幽棲寺絶頂同張士師李鴻臚黃文學賦幽棲真此地絶壁到人稀石角斜鈎杖藤稍曲桂衣壺飱高洞險鐘磬下方微共有登臨興誰能不醉歸陶山懷古越相何年隱齊山舊有名地連肥子國路出鑄鄉城洞杳秋雲白巖深古木平臨池懷往跡頗識種魚情陶山贈張東山士師陶朱今不見君是魯朱家俠骨千金劎仙爐五色霞生涯隨畜牧鄉語話桑麻早結東山隱驚看鬢有華遊雲臺山窈窕黃山路秋雲入幾重寒聲泉上竹古色寺前松地隱秦時洞天連月觀峰由來真跡祕不許世人逢同可大宿黃山張氏精舍谷口隔疏籬林深鳥不啼石泉縈户轉山果亞枝低澗壑參差映藤蘿咫尺迷苦無向平纍聊可共依棲同可大對飲黃山玉龍峽上看山意不厭復此濯塵纓澗落飛虹影泉飄噴玉聲隔花分送酒鑿石共題名相對濠梁意翛然少世情泰山客館送朱可大登嶽息駕泰山麓何以慰所思送君九節杖拄上五松枝澗底出雲處夜中觀海時同遊不同醉應憶舊題詩重遊三陽觀宿曽向春山宿重來似舊青壇風落橡栗巖雨長芝苓試覔長生藥聊翻內景經不知凉夜永星斗掛疏櫺三陽觀木末亭晚眺因遲可大未至木末堪憑檻秋空四望開晚烟迷汶水落日滿徂徠酒憶壚頭醉人從嶽頂回那逢搖落候蕭瑟易悲來傲來山不斷青螺色依然萬仭峰雲間翔鷟鸑天杪秀芙蓉嶽界三千里仙閭十二重神功何處斂此地宅蛟龍山有芙蓉飛鴉諸峰山下石窟名曰龍池同諸君飲竹林寺樹下靈嶽多真境禪宫路更深五峰常隱日雙樹自成林涉澗逢瑶草臨流潄玉琴晚鐘歸騎緩沉醉北山岑寺在泰山下址觀泰山百丈崖瀑布盡日水聲中還看匹練空盤渦喧萬馬削壁鬪雙虹𣲖抉天河落源從月窟通固知靈境異融結駭神功望仙影巖泰山西峰石壁有仙人影側身東向何劫飛來影分明鶴上仙側身疑面壁作禮似朝天觀化興雲雨憑虛閲嵗年扶桑終日在幾見海成田西汀臨泛呈印泉舅氏二首秋水寒塘淨蘭檣别渚通林端懸片雨蘋末起微風孤嶼浮波外長天一棹中漁竿堪自老不是慕非熊西汀懷舊隱秋杪片帆來落照樽前樹寒烟水上臺舟移明鏡轉雲盡畫屏開笑語淹吾舅浮槎夜未回乙未十月傅金沙侍御殷洗心舍人過訪山中賦贈命駕何相值開尊夜向寒風高邊鴈盡霜冷菊花寒天地吾徒在江湖此㑹難占星應有地總傍少微看冬初傅金沙侍御過訪因韻賦和百里寒山道勞君問隱居𤣥言聆喻馬往事笑焚魚嶽色青尊外秋聲白苧餘良遊知不厭卜築意何如秋日閒居有懷黃大宗伯萬里溫陵道含情憶舊遊夢迷明月夜人老白蘋秋海闊休看鴈山深自倚樓何時江路柳重見木蘭舟山中寄徐少宰丈契闊同心侣多年嘆索居吳門遙繫馬魯國久懸輿嵗晚憐交態天長闕報書悠悠清汶水一為覔雙魚穀城山館集卷九
