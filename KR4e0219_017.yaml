body:
  text: 穀城山館集卷十七明于慎行撰五言長律閣試玉河氷泮六韻春色臨仙掌龍池積素開蛟迎新旭斷魚逐暖波來雲影回彤閣風紋觸繡苔不緣分玉鏡何處見瑤臺桂楫思無限雕闌望未回從兹賦曲水長奉萬年杯閣試賦得秋菊有佳色八韻曄彼黃金蕚翛然白露天馨香堪自葆顔色為誰鮮零落玄都蕊蕭疏灞上煙亭亭涼雨後冉冉曉霜前小苑寒無奈疏籬翠可憐餐英騷客賦送酒逸人眠不為春華少其如晚節堅擷芳未云已聞雁夕陽邊冬至郊壇扈駕受賜紀述六韻紫極膺圖日黃郊欵帝年鈎陳依太乙容衛駐甘泉奉詔趨深殿開軒覲邃筵陽知回洞府身覺夢鈞天恩自親臣渥珍從內苑傳所祈靈貺逺長共聖恩延扈從恭謁山陵紀述十四韻啓佑欽昭代勳華冠列王九宫靈肅穆十葉祚輝光弓劍儀型逺松楸歲月長璿儀扄大象玉座敞玄堂河嶽開天險乾坤護地藏勢應環雁塞脈起自龍岡寂寞軒皇鼎虛無漢殿觴皇情勤歲事明德薦時嘗環佩羣真會粢盛萬國將六宫陪負土百辟扈濡霜上食雕筵邃遊衣玉輦香驂驔玄武仗寥廓白雲鄉聖孝綿無極神圖鞏未央侍臣三倡嘆稽首詠羮牆恭陪聖駕步詣南郊禱雨有述六韻閔歲宸慈渥雩郊曠典行重城虛奉輦小隊罷陳兵玉舄飛塵擁天衣浣布成望雲歡兆姓夾日走羣卿禮數湯林薄明禋漢畤輕皇穹應有鑒何以答精誠西郊夕月六韻翠駕臨西苑瑤壇夕夜明三天凝象緯百辟會簪纓鑑瑩玄珠落尊芳玉醴盈上辛殷舊秩少采達遙誠肅肅金飈靜沈沈玉宇清方明開輦道燈火入西城賜扇六韻雉尾移春殿鸞綃出內宫侍臣移玉案天語落瑤空披拂開函處歡欣擁佩中團紗驚麗製裂素屬良工百綺裝明月千門散彩虹承恩咸不暍懷袖得仁風上座師殷棠川相公生辰四十韻聖代平津閣誰當不世賢鴻儒登禁闥駿烈耀台躔嵩嶽生申日東山卧謝年小亭臨曲水别墅在平泉金鼎調羮匕丹丘笈玉編改衣中府幣置酒大官錢綺席排雲麗朱輪映日鮮玉簫花裏度瑤草座中搴憶昔鵬摶海旋看鶴上天滄𬈑雲九萬岱嶽里三千射䇿終軍少傳經戴聖專文章千古上器略萬夫前鈴閣金蓮炬仙扉玉版箋宫霞春爛漫苑草日芊綿鶴禁清班邃銀宫內渥偏浮丘輸羽翼綺里奉周旋苦口皆良藥成功考細旃翊龍升碧漢捧日出虞淵問道朝三接酬庸歲九遷羣材齊入彀百辟絶隨肩斗際尚書劍花隂學士磚韋賢新相漢郭隗舊師燕鳯閣雲霄上鸞臺日月邊虛心收物表朗鑒洞幾先談笑回元化從容鎮八埏繫還南越組蕩盡北門煙吐握終無倦包藏細不捐星回三殿履月上五湖船窈窕雲歸岫蒼茫楫濟川兒童趨畫轂父老認金蟬春色南山雨秋香北渚蓮只今門似水自昔道如弦彌繫蒼生望難耽緑野便小夫慙濩落早歲荷陶甄地忝青藜閣吟虛白雪篇逢人惟説項下帳每延宣溲渤歸丹録駑駘受玉鞭病拋池上佩貧種汶陽田世態鳶銜腐人情蟻慕羶冥心求避俗野迹慕逃禪試檢南華頌遙登北海筵懷恩心耿耿為壽舞翩翩欲訪三山路長年證偓佺述大司空鎮山朱師治河功成百韻帝統恢元運皇猷播大方匡時資禹牧翊聖邁軒唐四瀆承休逺三靈協貺長金繩熒上瑞玉牘啓殊祥邈矣思河洛遐哉徹土疆堯年疏砥柱漢日塞宣房一自神州奠長令泰宇康有時仍羡溢無䇿乃隄防國祚千年脈河流一葦航通淮環寢廟達濟灌庾倉碣石東輸海陶丘北望漳川靈忱效順水德固難量何夕成澒洞經時害雨暘蛟龍微濩略舟楫半披倡近市多飄瓦沈沙總沒槍漁磯聲噭噭鮫室涕浪浪萬馬長河北千帆大澤旁扼吭三輔震枵腹六軍尫帝謂疇能乂公為庶所揚鸞書方痛切熊節敢相羊平土玄圭命登山玉簡藏鋪筵瑤作瑱釃酒玉為漿海若連蜷望河公跋扈強嘻乎雲漫漫可得土茫茫未謂新渠易其如故道殃良圖宗賈讓碩畫踵平當畚鍤諸州力樵蘇五道糧萬夫聲洶涌百吏狀譸張避地開奇險陂山鑿大荒淇園輸萬竹渭水出雙璜澤國三徂暑河隄四履霜雨行風淅瀝露宿月荒涼乘橇隨塗足顰眉問裹瘡時煩蒼水玉躬御紫遊韁解瑟思何眇吹塤和不防已成開馬頰胡乃遇羊腸匪石心難轉含沙道豈傷人焉俱諷議公也獨劻勷十二疏清濟三千激吕梁漕舟胡淡淡河水自泱泱粳稻充天府枌榆護帝鄉楚包來橘柚越篚薦璆琅浮磬登淮浦孤桐下嶧陽連旌回六鷁疊鼓震雙鶬竹箭乘流駛桃花逐水香川光明錦纜風色動牙檣岸草蕭蕭白汀蘆瑟瑟黃津亭遙不斷驛閣更相望罨藹圖淮樹分明植汶篁新畬煙漠漠稔歲室穰穰國既成溝洫民兼足稻粱賽神沈馬璧築闕象龍堂漢愧王尊節秦虛鄭國塘一朝通兖冀終古奠徐揚作舍謀應破盈庭議乃襄藏書封宛委畫閣勒旗常力竭身其瘁勞深報未償無論升鼎鼐有以潤縹緗憶昔鍾庚昴巋然起豫樟垂天凌鳯翥振海壓龍翔道解環中趣談傾稷下場文章追兩漢翰墨俯諸王趙璧連城價隋珠照乘光風猷洵駭厲器度展汪洋射䇿趨深殿持荷步廣廊聲華人緑鬢閥閲世青箱試政名城宰蜚英華省郎噴沙轅歷塊切玉劍垂芒閩海常公化河隂召伯棠三齊崇嶽牧七命備圭璋大國行風俗中臺布紀綱憂氓思扇暍祝歲試吞蝗望野飈猶赤搴帷鬢欲蒼非因勤振貸安得慰流亡北斗回星履東人宿繡裳方齊祠漢相學壘社庚桑藻火庸匡舜鹽梅實佐商九流欽水鑒百辟式羔羊自錫虞廷瑞因違漢殿觴維新承厯服求舊匹明良周度登元老殷憂侍御床六符光太紫八座列文昌玉燭輝無斁瑤圖鞏未央精忠孚黼扆孤立抗銀璫砥石千鈞力兼金百鍊鋼巉巖兼土壤泱漭納汙潢座有陳遵客奩無陸賈裝功崇心愈下道久力方將御廄騰騏驥天池沐鳯凰家聲知璨曜神理固昭彰賤胄生無賴孱資少不揚垂髫操誦籥束卷侍門牆推食家闈禮趨庭子弟行如天何以報矢日耿難忘久矣虛燕價蕭然滯魯狂吹噓欣化枳斫削謝為杗豈有光沖斗應無頴脫囊鑄顔慚上第報陸已荒莊忝載蘭臺筆曽隨桂浦塘河渠焉敢續聊以播餘芳送御史大夫與川葛公致仕東歸四十韻赫矣皇王代庥哉社稷臣三朝依日月八座上星辰海岱鍾元氣夔龍托後身由來人望久莫訝主恩頻自奏三千牘今更五十春風霜隨處厯雨露幾回新譽籍仙曹佩文操郢匠斤分符全陜地開府大河濵留省司邦禮銓曹佐國均雲方離逺岫鴻復上秋旻兩著東山屐重徴渭水綸明時登鼎鼐晚節識松筠北斗當喉舌西臺領搢紳從龍仍沛靄象嶽再嶙峋祇為酬丹扆應難厭紫宸紀綱羣吏肅聲教一時淳石砥中流柱風清要路塵門無朱履客座有布衣親共味心如水何妨鬢似銀况逢沖聖主全仗老成人尚父開周日韋賢相漢辰猶間青玉杖卻憶白綸巾五疏辭逾切三秋願始伸感恩寧避世頤老欲韜真展轉紆皇眷從容出帝闉宫階行日拜天語賜時諄酒醉都門帳花飛易水津廩人共白粲臺𨽻從朱輪異數優元老休聲鬯九垠志原暌雁鶩名已畫麒麟始謝人間事還隨物外賔安期新寄語曼倩舊為鄰境地煙波隔心期鳥雀馴固知風后侣本是葛天民先子同攀桂他時吐獲茵執鞭曽入洛伏軾亦逰秦倉卒情何渥蒼茫迹已陳遺孤重接待舊事轉酸辛自幸依髙矩誰堪愴别神踟蹰歌此曲聊爾謝鴻鈞夏日從馮葛二太史遊碧雲寺十韻靈峰環御苑寶地敞仙筵磴道湖邊出重關木杪懸危巖深吐月曲洞細生煙壁蔭捎雲竹階流噴玉泉松風聞梵夜梅雨散花天淨土風塵絶空門伏臘偏十千初地境百萬尚方錢響屧苔䀶積璇題鳥迹鐫無生應證法有漏未稱緣浩劫何由問踟蹰翠嶂前從二太史遊香山寺十韻夙慕香山勝振衣度石林煙嵐開上界臺殿倚層岑地盡羣峰合天回四壁隂松關旁翳日杏閣仰捫參樹結菩提色泉飛梵唄音歸雲朱拱宿間鳥翠屏吟涌塔名多寶開田號布金西湖寒雨斷北闕暮煙深客飯伊蒲供僧房薜荔侵禪心無去住遊迹且浮沈曲阜謁少昊陵六韻白帝傳遺迹窮桑訪故城丘陵何代築碑石幾時傾鳯紀金天歲虹分華渚精人煙連聖里鳥雀識官名落日荒原冷悲風古木平祇令郯子國百世遡宗盟東平謁堯祠六韻古殿空山裏荒丘野戍邊星文臨魯甸雲氣仰堯天綺棟丹霓落雕楹翠蘚鐫仙蓂猶應月黛柏自含煙化想垂裳代人懷擊壤年名言志浩蕩流眺土階前曲阜謁周廟六韻新宫嚴禴祀舊域應奎婁負扆開王化分茅胙帝丘勳勞周禮樂宗祏魯春秋暮色徂徠雨寒聲泗汶流雲霞丹殿敞苔蘚玉階幽闕里長鄰近猶疑寤寐遊恭謁闕里聖廟二十韻運會皇風邈乾坤聖宇開文章苞六代道德範三才象應奎婁次靈鍾海嶽隈人傳歌鳯去地想泣麟回舊里仙源祕遺宫帝制恢樂聲存魯殿車器出秦灰羽籥諸生肄牲牢萬乘來兩楹儀紫闥雙觀表璇臺問禮庭猶在藏書壁已頽畫廊圖藻緑寶閣寫瓊瑰古檜當時植新松幾代栽唐碑鐘作篆漢石繡成苔黻冕三千侍雲仍百憶陪小儒慚朽質微分簉羣材爐冶從甄鑄章縫荷翦裁繪天忘色相望海隔沿洄日月丹霄曜江河晚世催懷恩知罔極不去久低徊從二兄登雲翠山南天觀十二韻大地標瓊觀真遊入翠微中天開突兀半嶺度崔嵬回見平原繞低看野氣圍河流剛若帶雲出宛成衣霄漢身應近煙霞手自揮林篁天杪盡村落谷中稀過雨鳴松壑懸泉幕石扉地餘丘子竈名倣富春磯人去無雞犬春歸有蕨薇歌從靈運和藥向長房祈緑酒聊為爾丹砂不可幾醉來忘日夜戀賞未言歸雲翠絶頂東望􅱘山十韻二山在邑東南二十里水經所謂大􅱘也躡屩登丹嶂開尊矚錦岑懸崖分日月衆壑異晴隂鳥道霞標度泉流樹杪侵神工圖紫翠靈斧削嶔崟縹眇雲生岫霏微霧出林依稀瑤草色倣象玉笙音人代迷陵谷山形自古今醉餘歌爛漫秋至氣蕭森舊紉蘭蓀佩新抽玳瑁簪登髙仍望逺都寄采芝心夏日逰扈泉六韻奇峯涵秀景絶境劚靈泉逺脈遙通海平流半倚天歘驚銀漢落隱似白虹懸噴雪圖青壁飛珠散紫煙風恬聲未歇月出影相連對酒沾瓊液分波灑玉田濯纓同調在流水共潺湲恭謁孝陵有述十四韻聖迹開玄造神都奠舊疆基圖垂萬祀謨烈冠千王風雨園陵閉衣冠寢用藏霞標懸綘闕雲際拱雕梁勝地盤龍虎髙丘下鳯凰石麟秋作雨鐵馬汗為霜落月鋪金鎖飛花上玉牀重關陳豹旅濡露集鴛行扈蹕羣靈會包茅九域將長江縈閣道疊嶂列宮牆禮樂恢函夏明威肅大方治成周六典法畫漢三章縹眇松楸路昭回日月光小臣歌帝則繩武祝今皇登報恩寺浮屠覽眺十韻寶域橫三界璇標鎮八𬈑盤空依日月飛磴躡辰星乍似攀仙掌旋疑陟紫庭五城秋雨霽九市晚煙𡨕逺樹層層白連山面面青曇花揮麈落仙梵倚櫺聽彌覺皇居麗因知佛土靈前朝流水盡初地劫灰經銷歇悲人代疏狂混醉醒不愁天路近風御自泠泠魯國主賜宴述謝十韻閭門停使節國府覲親賢别殿陳丹扆重樓敞御筵三清甘醴泛七部法音傳舞曲秋霜麗歌聲渌水妍奎婁古分野鳬嶧奠山川申白談詩日枚鄒獻賦年為儒原在魯作客久逰燕幸侍蘭臺宴慙無桂樹篇春生修竹雨人醉緑雲天欲勝延陵客觀風六代前雙鶴六韻白鶴歸何暮雙飛下海田夜寒華表月春暖玉臺煙赴影隨疏節流聲應别絃緱山疑是雪吳市儼如仙燕雀空卑翼蜉蝣自小年何當成六翮飈舉閬風前己丑入院部宴八韻東閣頒新命南宫考上筵車旌三殿下劍佩五雲邊栁映金隄日花飛紫陌煙九衢欣聚覩百吏奉周旋鷟鸑儀瓊樹驊騮望玉鞭四科卑漢制三物狹周年桃李歸薇省人文列琰編得賢應有頌欲獻衮衣前貢院臨校即事八韻桂闕翹賢日蘭宫列署開五方偕計吏三試擢英才畫燭通宵映金鉦動地回千林輸郢匠萬馬會燕臺綵筆全成陳明珠半出胎藻衡懸玉府鐘漏切璇台幸厠春城賞欣看上苑裁垂衣逢景運側席泰方來上太保夢山楊公八帙生辰五十韻海嶽鍾元氣台樞列大賢功成循歲序名重屬林泉共羡生申旦真逢獵渭年延齡瑤草進續命綵絲懸磊落山中相婆娑地上仙氷肌姿綽約黃髮步蹁躚盛瑞人間紀殊恩闕下宣尚方頒壽杖少府致餐錢使者車臨巷門人佩委筵蓬壺樓十二桃嶺歲三千善頌連纓緌榮名耀史編傳芳知有後樹偉固無前憶昔登丹地精忠拱邃綖兩朝資弼亮百辟奉周旋履聽星辰上身依日月邊惟師官六典作宰柄三銓簡要羣情肅清通一節堅退朝門似水輟饋㸑無煙雅和鹽梅味工調燥濕絃帝臣元不蔽王道允無偏機重千鈞弩丹成百鍊鉛同升稀在野獨樂憶歸田解紱猷方壯懸輿歲屢遷庖刀藏自滿扁鑿巧誰傳小築嗤金谷清吟慕輞川雨餘南隴望日靜北窗眠鳥外登山屐花間送酒船曉猿迎客報暮鶴寄書旋姓字雕題問聲華繡簡鐫溫公耆社逸裴令午橋便黯淡看時事蕭疏絶世緣風塵何逼側道路日喧闐鯨海方傳箭龍沙有控弦樓船南動越烽火北通燕料敵爭前箸和戎喪左旃爭臣翻避地遊客正談天可惜朝廷體休論將相權人今思拯溺公豈念扶顛潞國威名重汾陽壽祉全後車應命載前席佇登延夙忝龍門役曽參豹尾聨周行歸矩彠鄭重想陶甄自祖都亭帳尋歸岱畝㕓海天雲漠漠濟水月姢姢夜雪虛蘭棹春風沐錦箋會聞稱上壽幾欲致微虔祇是心飢渴其如路眇綿斗山終在望枌梓敬誰先東壑安期棗西峰玉女蓮無因持獻祝聊賦紫芝篇送平隂楊令遷晉府審理二十二韻藉甚神明宰循良踵二京關西綿世胄梁苑茂家聲玉季雄霜府蘭昆比月卿談經推上第緤組試專城濊澤同春育孤操共水清萊蕪塵甑滿單父玉琴鳴紀政馴田雉憂時憤海鯨懸金親教射握槊自觀兵月稟揮將盡雲徒練已成不甘馳羽檄直欲請長纓廟畫方搜俊藩僚亦采英會聞公府辟先假士師名彭澤歸陶令長沙召賈生兒童啼擁路父老泣沾紘花樹存遺愛棠隂鬱别情幽居門久杜過訪蓋頻傾聽雨山坳醉衝寒渡口迎談玄詞要妙舉白氣縱橫自覺交情洽誰堪逺思盈寒氷結去水飛雪繞前旌鼓吹聲何急驪駒賦載賡壯心應未巳斗畔倚青萍楊善談兵適被撫臺檄留欲赴東征故篇中及之代送劉侍御出按滇南十韻藉甚西臺客才名起蜀都使星今六詔家學古三蘇倚柱傳新草題橋出舊塗驄連原上轡柏集府中烏越巂兵多少昆池瘴有無人稱八使選地入百蠻孤魚服遙通海蟬冠近渡瀘風霜隨漢節雷電偃軒弧聲教南荒盡封章北闕敷明光須早入聊此賦驪駒挽關西馬相公十二韻揆路登賢日台階扈聖年長庚光若月太華降從天聽履鸞臺舊橫經鶴禁偏兩朝資棐亮萬化想陶甄不悟鴻鈞運真如糾纆纒黃麻花裏拜素幔雪中旋一夕虛金鉉千秋閉玉泉都人捐佩玦明主輟宫懸無復梅和鼎空悲楫濟川函關銷紫氣渭水出新阡慘愴秦臺月淒涼隴樹煙唯餘麟閣畫終古繡青傳哭賈石葵司馬張玉陽宗伯二十韻出處分岐路朋交望各天一朝知己盡兩地訃音傳賦草張平子詩名賈浪仙銅龍行比翼金馬入隨肩然諾俱相信襟期各自憐盤飱談謔浪杯酒意流連聚散浮雲失升沈宦海牽逺遊江上省小隱嶧陽田密勿頒新渥艱難訪舊賢南宫陪聽履西府佐籌邊魯道軒車發梁園駟馬旋同時趨寵命連月入重泉照乘悲沈璧孤桐悵絶絃臺烏何日返池鳯幾時騫里思齊休杵皇恩再輟懸丹旌津樹雨繐帳海門煙夢斷論交地心摧憶别年報書猶在篋留劍已成阡糾纆何交錯蘧廬總遞遷楊朱非一涕南北兩澘然穀城山館集卷十七
