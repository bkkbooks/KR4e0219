body:
  text: 榖城山館集巻十一明于慎行撰七言律詩御試大祀方丘應制聖代郊禋典秩崇祗壇午夜肅齋宮五方琮帛坤靈㑹八變雲韶帝德通星斗疎明香霧裏旌旗回合曉霞中禎符欲勝汾隂日萬歳聲聞動逺空閣試中秋風露西清晝漏殘月華縹緲鳳城端三天如水銷銀漢萬里無雲瀉玉盤燕塞河山秋氣迥漢家宮闕夜光寒一聲長笛思千里倚嘯重樓十二欄館課聞蟬宴坐虚堂對午隂宮蟬處處逓悲吟沈涵自咽金莖露斷續長依玉樹林鎮日繁聲塵界遠寥天清籟禁雲深蕭森正自多秋興聽入泠風轉不禁館課冬至朝天官習儀遇雪𤣥都三日敞朱扉綿蕞初開素雪飛壇月低凝仙闕樹宮花徐落侍臣衣千門爽氣龍樓曉十里寒光玉佩歸明日君王郊泰畤總疑瓊島在天畿館課冬至齋居緹室灰飛晷欲長清齋仙館坐焚香雪殘樓閣虛瓊樹月出簪裾滿玉堂筆望五雲迎舜日心隨一線入堯裳明朝負橐趨陪地只在瑶壇帝座旁秋日有懷朱長君可大談經幾日别東州回首誰登濟上樓素月芳尊成遠夢長天極浦足離愁書傳薊北霜鳴逺人在漳南玉露秋一水蒹葭江口路何時却見北來舟代壽太宰蒲坂楊公六十璇樞一柱舊承天花甲今稱始壽年九塞烟塵歸指顧兩朝文物入陶甄南山近傍芙蓉闕左省高開玳瑁筵自是關西舊閥閲朱輪繡轂滿堂前送李敏齋内史奉使洛陽過家覲祖玉節仙郎下紫薇元公親授老萊衣暫辭生掖閒雞樹遥向西園佇鷺旗帆度河陽秋欲盡雲低淮浦鴈初飛重闈倚杖歡應甚萬石門前内史歸酬于子冲文學見寄和韻回首齊州思有餘玉函秋色近何如王孫自長山中桂青鳥初傳海上書簿俗交遊誰得意平生懷抱爾離居請纓漢闕終生在二十才名綠鬢疎送張月洲先生還閩二首長鋏何年歸粤海褒衣此夕入燕州傳經正想三秋待負笈驚看萬里遊杖屨重依春滿座琴尊數對月當樓不堪明發横門道又向河橋問去舟綽約紅顔傲赤松翛然七十不龍鍾長年細檢三山籙健步全虚九節笻韋孟家聲傳世業伏生經術號儒宗歸與好在胡麻飯瑶圃天開海畔峰奉寄家兄無妄二首載筆虚當侍從年多慙無賦奏甘泉愁中月露西清夜夢裏松蘿故國天石閣當山多鳥道蓬門臨水半人烟别來兩度經春草誰傍池塘白晝眠吾兄俠氣舊昻藏抱玉空山鬢有霜白石常封燒藥竈紅泉自遶讀書牀休從漁父思蘭沚漫羨詞臣賦栢梁此際秋風生桂樹歌殘招隱意蒼茫寄侯將軍塞上白葦黄榆玉塞秋將軍新試錦貂裘蓮花吐劔軍聲壯明月驚弦敵騎愁畫地常開風后陳解鞍獨飲月支頭班生故是文章裔投筆如今號虎侯大司空朱師分賜鰣魚賦謝五月霜鱗滿貢船長安到日色猶鮮牙檣錦纜來千里玉筯金盤下九天畫省不緣宮府賜蓬門寧覩吏人傳河淮一葦司空績歳歳江魚入御筵慰于子冲内艱用可大韻閭門此日欲何依巖桂庭蘐事事非千里空懸遊子夢一寒誰念故人衣春風四壁餘長鋏夜雨空堂有斷機莫向乾坤悲落魄三齋年少似君稀送少傅陳相公致仕還蜀二首黄閣功成尚黑頭遽將簪組付滄州商年伊摯初歸政漢代韋賢早拜侯東觀藏書三殿草西風倚棹五湖舟橋邊負弩空陳迹將相何人晝錦遊天書曉下禁門東白璧黄金出漢宮祖帳一時傳道路車塵到處走兒童秦雲夜擁函關月隴樹秋開劔閣風愛殺嘉陵江水綠垂竿不擬獵蜚熊送陳玉壘太史扶侍歸蜀露下清秋奈别何玉杯瑶瑟起離歌人經漢苑青山近路達巴江錦樹多萬里椷書迴鴈字三年珥筆共鸞坡題橋總似相如舊却奉元公駟馬過冬至院中齋宿酬朱可大文學詩問用韻瑣院森沈接苑牆齋居寒夜集冠裳風回畫燭香初散月上花磚漏轉長闕下卿雲將爛漫歌中白雪早飛揚憑君為獻甘泉賦詰旦鑾輿出未央春日同羅虞臣冏卿李本寧太史朱可大進士遊摩訶菴得冬字春盡看春興未窮還陪仙侶叩禪宮香臺路入烟雲轉石竇泉從薜茘通花落諸天渾是雨松臨午日不聞風當歌一醉愁無賴回首紅塵綺陌東送趙少虚先生下第二首三月花飛上苑春花前黯淡送歸人賦成却抱文園病老去還甘栗里貧月出離筵關樹曉塵清客路隴梅新熙朝自少南山隱莫向桃源學避秦彈鋏重歸奈爾何乾坤今日尚蹉跎黄金不買同時賦白石誰憐半夜歌北嶺春蘿仍對酒西汀烟月且披簑他時共睹孫𢎞對華髮名成首四科送鄭舒軒先生下第宮草萋萋滿禁城乘春又向日邊行一帆風雨還家夢十里鶯花去國情彩筆久傳鸚鵡賦青山頻聽鷓鴣聲石渠倘許推師授經術應齊漢五更送沈道立太史奉使肅藩親函璽綬賜王侯百二秦關亦壯遊華嶽三峰天外落洪河一葦日邊流星潢色動金城夜鼓角寒生玉塞秋咫尺崑崙應可問乘槎莫到海西頭雨行北安門外湖上湖上朱闌倚畫舟一天凉雨漢宫秋平橋蘆荻蕭蕭冷别浦鷗鳬汎汎流霧色迷茫三苑樹波光隱見五城樓由來仙掌多濃露十里芙蓉接御溝在告書懷柬可大金門何事轉愁予日見紅塵上錦裾祗為思歸長數鴈幾因多病欲焚魚鄉心瓦上三更雨客計牀頭數卷書幸藉旬休聊閉閣文園從此臥相如高太孺人輓章太史崑崙母也北堂典訓舊知名東觀圖書已勒成自有龍章貤上苑誰教鶴馭返瑶京霜飄楚峽𤣥猿淚月暗巴江杜宇聲歸路凄凉無限恨微吟不似賦西征送李壒邨叅軍奉太夫人南歸廣陵陳情曉下紫宸朝阿母雲輿度絳霄珠履名高西府幕斑衣色借上公貂花深楚苑春鳴棹月滿隋堤夜聽簫别後思君何處望淮南芳樹廣陵潮秋日有懷賈德修諫議朱可大文學裋褐論交歳幾更寥寥雙眼為誰明五雲公子才無敵三省仙郎諫有聲南國久疎鴻鴈字東山同繫薜蘿情衡門兩度經秋草華月空梁夢不成過香山寺誦先兄冲白送予赴濟詩潸然有感用韻呈亞沂崔君寥落空山古殿寒十年前路事辛酸空餘彩筆題紈扇不復長歌醉玉盤漢苑春花終有恨荆庭秋樹慘無歡平生意氣惟君在宿草成烟淚未乾山中有懷侯姊丈㕘戍魯國諸生舊有文又從投筆際風雲王孫盡自迷歸路卿子誰知號冠軍櫪上驊騮天廐馬帳前鼓角羽林羣同時年少還相憶曉月山城更夢君壽伯父九十賜爵田家亦有地行仙擊壤昇平近百年三代遺恩身自遇五朝舊事口能傳登山時復抛邛杖對酒猶能醵社錢十載松楸成逺恨歌逢棠棣轉悽然部檄以修史趣上當年束髮侍承明一臥東山歳月更築室還臨芳草路趨朝猶記禁鐘聲愁邊四壁家如舊病裏三都賦未成傳道長安飛詔下蘭臺已注史臣名九月廿一日同趙少虚文學李前峰司馬飲宮秀才山房對菊三首西風蕭瑟鴈聲哀處士籬邊菊樹開翠幄總從霜後見幽香半自雨中栽高雲錦石明秋日淡蕊繁枝映酒杯况是故人同駐馬不妨沈醉碧山隈芳筵高㑹聽鳴笳徙倚疎籬感歳華九日已過南浦鴈一尊還對故園花繁英爛漫迎人冷疎影蕭條向月斜白酒東籬成往迹千年秋色落誰家木落霜天萬樹林誰憐艷菊自蕭森一叢寂寞香難近百草飄零色更深地僻常能留客醉秋高纔得對花吟明年又作燕城客水畔東籬何處尋癸酉春日閒居四首孤蹤一寄白雲間鶴渚蘭汀夢亦閒病起鶯花憐故國春來蘿薜滿青山浮沈歳月空高枕厯落風塵且閉關東望石閭仙氣滿欲尋瑶草駐紅顔早歳承恩直漢宮石渠仙署鳳樓東時沾賜酒傳深禁每聽吹簫度逺空赤筆春裁三殿草朱衣寒颭五橋風只今臥病荒山裏滿眼氤氲想像中憶昨追隨法從班五更燈火叩重關雲開黻座雙團扇月出瑶階萬佩環一自樵漁來海上忽傳弓劔落人間江邨風雨孤臣淚清夢猶能識聖顔牢落中原嘆索居長安朋舊𣺌愁予池邊倚馬宮雲近臺畔開尊苑月虚别夢幾看南渚鴈春風難覓汶陽魚幽棲祗自成疎懶不是文園有著書送劉水部碧宇上保定太守白露蒹葭望渺茫使君千騎發東方斗邊一夜仙槎影河上三春畫省香劔氣秋空寒易水簫聲明月憶維揚他時欲識扶風守指㸃題名在建章七汲登舟留别親友閭門烟樹此時分回首春江惜鷺羣金匱虚當東觀草荷衣實負北山文花前酒盡人將逺雨後帆開日未曛滿眼浮榮渾是夢驪歌繾綣不堪聞故城道中夜泊長堤高栁暮雲平入夜扁舟堰口横千里烟波通海戍三家邨落雜齊聲殘燈微照孤帆動短笛寒吹片月明客枕清泠渾不寐滄洲一望颯然驚安陵雨泊廣川城北倚扁舟寒色蕭蕭對驛樓過雨菰蘆驚午夢乘波鳬鷺激中流長天積水千帆暮斜日疎林五月秋指㸃津亭問前路居人為説古瀛洲天津白浪浮空拍海門天津城下萬艘屯吹簫伐鼔中流渡賣酒烹魚何處邨黯䨴平林含雨氣迷茫逺岸吐潮痕江淮百億輸王府嵗嵗梯船奉至尊潞河舟中有懷可大時亦從江右北上孤帆遥夜倚汀洲却望天南憶舊遊越水呉山何處夢楚江燕月此時舟鴻聲欲斷三秋信海色遥含兩地愁同去長安不同到與誰先上酒家樓謁陵天作高山擁帝京九陵臺殿鎖重城靈旗風雨千巖應閣道松楸萬壑平河嶽東來盤王氣關門北去起邊聲祠臣展禮多悽愴濡露年年感聖情送張泰宇諌議出守衛輝綠鬢金章出上林兩朝獻納主恩深宮雲曉映仙臺佩禁漏春移畫省隂酒入驪歌魂易斷路隨明月夢難尋知君坐嘯蘇門夜竹影泉聲幾處吟送于嵩毓年兄下第薊門芳草路悠悠尊酒相看憶舊遊苑外春風楊栁陌湖邊秋雨芰荷舟論心暫解陳蕃榻失意還凋季子裘明夜思君孤館夢蕭條雲月不勝愁送劉鈍齋年兄下第十載相看薊北遊花前又欲起離憂黄金色冷空留駿白石歌殘自飯牛驛路曉星看佩劔海門烟雨繫漁舟青藜何日還相照劉向談經鬢欲秋壽新城王太夫人七十中朝甲第首諸王壽母今符寳婺光南嶽仙雲飄鳳馭西池春色照霞觴退朝絡繹金門佩問寢氤氲畫省香莫向清淮占世澤璇波直共海天長奉寄朱大司空老師上東門外一沾巾别恨千重總未伸自古難酬知已遇只今誰是報恩人即教寥落江湖日轉識安危社稷身渭水不須勞夢卜已從高閣畫麒麟新春報二兄書鴈行中斷兩天分南浦春聲昨夜聞池上夢回千里月山中人隔幾重雲雄文未獻河東賦壯畧曽觀隴右軍金馬浮沈休借問只應猿鳥自為羣送劉太史奉使韓藩名藩帶礪主恩恢使節西遊亦壯哉玉署天香三殿迥桐函春色五雲開川連博望乗槎路地盡軒轅問道臺歸向高堂行慶酒斑衣可識尚方裁為人題雙壽卷鹿門真隱舊知名藉甚仙郎漢列卿歸院宮雲隨玉佩上堂春酒汎瑶觥斗邊劔合雙龍氣月底簫分兩鳳聲詎假金書傳閬苑且看丹詔出層城七夕琪樹西風一葉秋銀河清淺月如鈎關前玉笛吹新恨天上金梭織舊愁鸞自飛回人欲盡鵲曽填處水還流浮踪此際渾無賴脈脈遥心自倚樓秋日同館中諸丈飲謝都尉林亭薊苑秋高望不窮主家臺榭苑牆東凭闌暝入千峰雨對酒寒生萬木風畫角聲殘龍塞逺玉簫曲斷鳳樓空先朝邸第多零落魯館依然氣色中除夕懷諸兄弟九陌笙歌歳又闌驚人時序漢長安凋蕭兩鬢池頭佩寂寞三秋夢裏蘭上苑花從今夜發故鄉書擬隔年看天涯兄弟應相念綠酒青燈可自歡禁中春雪五陵芳草欲成叢雨雪依然滿漢宮萬里關河銷紫塞九天樓閣冷瑶空西山月出寧知曉上苑花飛不待風徙倚銅龍正愁思陽春一曲賦難工春暮偕沈澄川太史遊城南王氏園亭和韻休沐相招盛㑹偏宜春苑路草芊綿重城樓閣籠春樹曲島松蘿散曉烟風起花香飄檻外雨餘山色落尊前由來杜曲多名勝斗畔猶疑尺五天文華殿進講有述珥筆承恩既有年論思今復厠羣仙春城日永紆清漏曉殿雲深擁細旃褏拂天香開繡簡心迎睿想入瑶編却慚經術元疎薄獻納無禆荷寵偏恭代皇上奉祝聖母萬壽無疆詩藐質冲齡御大方慈恩辛苦䕶垂裳祥開華渚仙源逺慶衍瑶池化日長上食親調金掌露舞衣時傍玉爐香承歡幸撫昇平㑹薦壽鴻儀倣未央秋日龍華寺小坐苑西橋畔古祗林滿院松杉晝鬱森山色平連三殿影湖光曲抱五城隂尊前細雨飄仙梵檻外凉風急暮砧宴坐不知清晝永一函經呪對沈吟西苑鼇山恭紀别苑春宵翠殿開華燈寳炬滿蓬萊花分火樹千枝落星轉璇儀萬象迴九陌香塵隨地合六宮歌管自天來恭逢玉燭均調日願取三山作壽杯遣迎子冲可大二丈入對旅鬢風塵感歳華故人今日尚天涯三年夢隔長安月千里春期上苑花濟北鴻聲來擁傳湖西雪色隱乘槎即看醉握雙龍劔依舊燕城臥酒家子冲可大二君新第同飲朝天宮臺上倚馬高臺興不禁垂髫舊侶共登臨三山暮雨飛仙闕萬户春花滿禁林縹緲簫聲雲裏近縱横劔氣酒邊深回思二十年來事今日吾曹可醉吟送許悟菴鍊師還雲翠山兼寄山靈二首舊時曽作小遊仙寄迹靈峰偶偓佺賣藥忽從都市見還丹豈向世人傳瑶壇月出渾如水玉洞花開别有天歸去正逢春色老采芝可傍紫雲眠家近名山住亦稀别來清夢轉依依愁生猿鶴花迷徑恨結松蘿月上扉青鏡空悲遊子鬢紅塵偏染仕人衣憑君寄語山靈道早晩抽簪向翠微寄庠師周介軒先生千里蒹葭水國天白頭博士枕書眠人從對酒青燈夜事憶談經絳帳年一札希逢西楚鴈雙漿好汎北湖船慚從魯國諸生後儒術無成侍禁筵登雙寺閣贈金陵懷上人倚馬東林訪惠休上方鐘磬一登樓千峰夕送花宮雨萬井凉生桂苑秋地向紅塵開淨土人皈白社結良遊不須却憶飄蘆處江北江南總帝州榖城山館集巻十一
