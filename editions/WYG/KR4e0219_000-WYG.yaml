body:
  text: 穀城山館詩集别集類五明提要臣等謹案穀城山館詩集二十巻明于慎行撰慎行有讀史漫録已著録慎行於李攀龍為鄉人而不沿厯城之學其論古樂府曰唐人不為古樂府是知古樂府也不效其體而時假其名以達所欲言近世一二名家至乃逐句形模以追遺響則唐人所吐棄矣其論五言古詩曰魏晉之于五言豈非神化學之則迂矣何者意象空洞樸而不敢琱軌塗整嚴制而不敢騪少則難變多則易窮若原本性靈極命物態洪纎明滅畢究精藴唐詎無五言古詩哉其生平宗㫖可以槩見然其詩典雅和平自饒清韻又不似竟陵公安之學務反前規横開旁徑逞聰明而偭古法其矯枉而不過直抑尤難也乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部六榖城山館集目録别集類五明巻一古樂府巻二五言古詩巻三五言古詩巻四七言古詩巻五七言古詩巻六五言律詩巻七五言律詩巻八五言律詩巻九五言律詩巻十五言律詩巻十一七言律詩巻十二七言律詩巻十三七言律詩巻十四七言律詩巻十五七言律詩巻十六七言律詩巻十七五言長律巻十八七言絶句巻十九七言長律六言絶句五言絶句巻二十賦
