body:
  text: 榖城山館集巻十三明于慎行撰七言律詩春初得吳太原道中書有懷草色春城嘆索居虗窓殘月𣺌愁予忽從五馬邊淮路傳得䨇魚隔歲書汾水東流連朔塞闗門北望是穹廬晉陽亦是談兵地莫使平時保障踈送董巢雄比部左遷上谷衛幕匡時獨抱杞人憂諫獵書成更逺遊逐客夢隨青海月仙曹香散白雲秋惠文列署閒霜簡神武新軍卸錦韝報國猶餘長劍在不須常撫大刀頭寄送邢侍御子愿晉叅楚藩芳草春前綰别愁除函又下殿東頭書囘閶闔千門月人上芙蓉萬里舟望㫁浮雲燕市逺歌殘白雪楚天秋依然法從偏承寵三十叅藩是壯遊平則城樓登眺岧嶤飛閣冠層城暇日登臨景物明萬戶鶯花春上苑九衢車馬漢西京烟開宫柳重重出雨靜峰霞片片生總是皇州多麗景五陵芳草殢遊情寄上外舅秦翁生辰紅顔閱世儼如仙絳縣將盈亥首年三島常浮滄海上一峰突起岱宗前同時父老遊誰健舊社桑麻樂自偏聞道華辰新酒熟杯中太乙是青蓮蓮花菴潭上夕飲禪宫遙倚北樓開樓下平湖落照來金水環城全象漢蓮花湧寺宛成臺諸香各捧空王座一葉能浮太乙杯便是忘歸歸亦醉夕陽清角莫相催北閘西城别苑勝瀛洲十里平湖靜不流岸草離迷橋畔雨宫槐隱映水邊樓聲傳簫管三天近香散芙蓉六月秋信道吾皇簡遊幸石鯨飛處鎻龍舟送姊倩侯將軍僉書留京樞府二首長安别路起征鐃笑攬金杯視佩刀舊國風雲開節鉞故園花柳過旌旄居臨六代青山近望入千門紫氣髙聞道江南多俠少將軍一爲試龍韜上將璇樞切禁林登壇自識主恩深雲連城闕江聲壯節擁樓船海氣隂宦轍百年萍梗路離筵千里弟兄心廟堂正復思頗牧豈有雄才可陸沉九日留都瀛洲㑹集呈諸館丈石渠仙署接朝陽綺席秋開白玉堂九日風烟吳禁苑兩都賔主漢詞章城依䨇闕盤龍虎池繞高臺集鳳凰館閣先朝多故事羣公勲業踵三楊南都諸公邀宴高座寺對雨天畔虗堂倚碧岑坐來烟雨動蕭森白雲暮結蓮花座隂壑寒生桂樹林三楚江山遊子興兩都詞賦主人心南朝舊寺應無㡬寂寞高臺自古今祠部李修吾駕部倪雨田虞部黄澹菴邀登牛首山盤曲徑萬松寒轉盡仙梯一倚闌䨇闕餘霞江上落千峰踈雨座中看風飄上界鐘聲逺日冷前朝木葉丹幸從仙郎分勝賞欲攜秋色入長安方仞菴陶蘭亭二比部邀遊棲霞寺禪宫遙對石城開上客邀歡載酒來霞散千巖成佛土天開䨇峽鎻香臺齊梁文物餘殘刹吳楚雲山映舉杯正自登臨多感慨秋聲蕭瑟若為裁太虗亭望金陵亭在攝山絶頂孤亭高倚暮雲秋平楚蒼蒼望石頭紫氣微分䨇闕影白雲中斷大江流蕭森落木來悲氣迢逓青山入壯遊王業千年根本在燕吳兩地對皇州遊甘露寺絶頂望金焦二山作示鄔汝翼陳從訓北固峰頭醉倚闌兩山秋作畫圖看海門對湧青霞闕江面䨇浮碧玉盤風靜㠶􅀈行樹杪天空樓閣出毫端不堪作客逢搖落二妙悲歌和更難金山江面孤峰秀絶羣芙蓉千尺鎻氤氲諸天臺殿空中湧四壁烟霞鏡裏分鼉窟長懸朝暮雨龍宫時散徃來雲登臨况值秋風起萬里濤聲不可聞焦山贈郭次父千盤鳥道上珠林蕭瑟秋悲未可禁江北江南烟樹色峰前峰後海潮音孤標自擢芙蓉影片石長飛鸑鷟隂不向烟霞逢地主古今隱迹逈難尋廣陵張郡丞宴大觀樓城上高憑百尺樓使君開宴俯江洲坐臨南北孤峰影目盡乾坤萬里流雨色猶分京口樹濤聲欲賦廣陵秋何來一曲桓伊笛寥落長天動客愁石介峰冏卿邀飲豐樂亭湖上青山俯郡城孤亭無改昔賢名杯衘落照千林影檻倚長天一鴈聲寒雨自憐征路逺重闗誰識戰塲平恭瞻聖祖飛龍地紫氣盤回接舊京閏九月朔日姜民部養冲邀登黄樓夜飲風露嚴城欲暮秋重闗燈火上黄樓山邀夜色當杯入雲擁河聲抱檻流片石長留蘇子賦荒原不散楚人愁論文况是登髙日藉甚逢君自勝遊過夏鎮新河有懷先師朱大司空廿載談經憶舊遊司空勲業此乗舟人烟尚記河橋夜漁火重經水國秋地近徐方多故壘渠分禹跡總安流不堪閱代成今古花樹西州涕未收乙酉九月從李元甫宫諭再登嶧山舊隱名峰岱嶽前重扶秋雨上層顛隂厓尚駐千春草險磴爭飛萬木烟河勢遙分䨇白練山形近作九青蓮狂來欲問巴渝客得似華陽㡬洞天觀張隱君䨇梅圖浣花溪畔即方塘别有羅浮兩樹霜國色並呈縣圃玉寒英對㸃夀陽粧尊前月凝重重影笛裏風飄片片香聞道上林春更早可知仙骨占羣芳送鄒四山太史册封岷藩便道省覲名家儒術素風敦奉使天潢布主恩詔出螭頭周内史國分鶉尾漢王孫秋聲七澤飛征蓋雨色三湘近里門到日趨庭應有問雄談碣石向誰論送季大承太史册封韓藩西凉烽堠接咸京詞客輶軒㡬日程玉節分茅臨絶塞朱門列㦸滿孤城鳴笳細雨囘中路飲馬寒流隴上聲聞道空同仙館在好將真訣覔蓬瀛送蕭漢冲太史册封秦藩銀潢百二舊河山璽綬新恩侍從頒日映丹泥分漢闕天浮紫氣度秦闗逢秋露下仙人掌望嶽蓮開玉女鬟自是鳳凰池上客錯疑蕭史駐雲間送李棠軒年兄上南少司空二首不堪握手悵離居柳色都門漸欲踈佩借司空蒼水玉篋藏學士紫泥書宫磚日影虗鈴閣驛路秋聲過錦閭負弩三巴應更有㡬人詞賦似相如前年同賦秣陵秋隔歲憐君訪舊遊風雨獨過朱雀桁烟波還記白蘋洲兩都文物歸仙吏八座聲華滿帝州莫戀江南好風景直廬空鎻鳯池頭張洪陽學士在告問疾碧草重門似瀼東十旬休澣度春風歸心桂樹生江浦渴病金莖出漢宫斗際龍光元是劍杯間蛇影自爲弓知君早鍊神仙骨且向堯時作侍中送唐曙臺客部告還南海用王宗伯韻清時何意厭朝叅郎舎頻抽碧玉簮萬里親閭炎海上十年歸夢大江南雲霞近傍仙城五松菊重開客徑三閉戶書成應更早好令白馬絀𤣥談金山望湖亭孤亭斜倚碧山隈檻外明湖對舉杯萬頃玻瓈天上出千巖紫翠鏡中開雲連閣道籠春樹雨過行宫鎻繡苔盡說昆明雄漢苑無如此地接蓬萊西山上華嚴寺空盤一徑躡珠林絶頂憑軒氣鬱森磴道松杉晴作雨洞門蘿薜晝成陰秋横城闕青山逈地繞園陵白露深囘首千門車馬路翠華前日此登臨答楊戶部廬山書時方謫居廣陵淮南桂樹又春殘幾度開書慘不歡華髮已曾淹畫省銅章那復滯鹽官秋空雁影愁應劇夜雨潮聲夢亦寒聖主長楊方校獵誰將賦草入長安送徐端銘太史册封衡藩便道迎養十二提封屏翰雄又頒丹詔下梧宫漢京首列諸王表吳客初陳大國風三觀春陰滄海上九河晴色畫舟中還朝更遂籃輿養却笑安仁賦未工送唐抑所太史册封鄭藩三榮天人漢大儒親銜尺一下周廬紅亭斜日乗槎外紫殿春深視草餘斗畔星潢開使節河陽花柳過仙輿賢王若問蘭臺史已列先朝諷諫書鄭國主嘉靖中上䟽建言故云送周寅所太史册封周藩并寄沈蛟門學士夷門堤下大河流詔使軒車駐綵斿梁苑詞人空作賦漢家王子盡封侯江頭片雨春帆渡海上明霞晝錦遊爲憶文園病司馬金莖别夢已三秋送彭肯亭太史册封瀋藩便道過里夀太公九十潞子城頭紫氣懸詞臣持節下從天綈函借日開銀牓綺閣飛花映醴筵踈雨寒聲汾水上白雲秋色太行前江鄉更待趨庭慶共羡彭􅀢閱大年送李榕厓諫議册封荆藩便道省覲方懷諫草侍螭頭復捧桐圭問鷁舟五色春雲天上節一帆明月水邊樓豐城劍合䨇龍氣銀漢槎懸萬里秋歸向髙堂行慶酒承歡最羡錦衣遊送馮琢吾殿講典試湖廣南國詞塲詔使開北門學士掞天才三江橘柚充包匭七澤栟櫚屬翦裁齊客舊稱吞夢渚楚宫猶擬賦蘭臺到來蕭瑟逢秋氣青草湖邊幾日廻送朱可大兵部典試廣東世家經術舊知名奉制掄才萬里征雨後人辭䨇鳳闕秋來節駐五羊城西江劍合星初動南海珠收月並明更羡越王臺畔路驪歌渾作漢儒生九月十三夜扈從功徳寺陪李漸菴大司㓂王忠銘徐檢菴二學士登金山對月二首長楊别苑碧山頭扈蹕登臨暮靄收正惜巖花過九日却憐湖月似中秋樓臺近映滄波出燈火深廻翠輦遊連夕尚方傳賜酒飛觴何幸藉林丘屬車颯遝倚湖濵湖畔青山夜色新爲侍宸遊分象緯因隨仙履上星辰勾陳影靜千峰月法界烟銷萬騎塵莫道秋光寒不耐温泉雲樹暖如春送蘇中一叅軍内艱南旋不因惜别重銷䰟無限悲心下薊門正對白雲思故國却從芳草怨王孫亭邊立馬斜陽影隴上啼䳌曉月痕我亦天涯欲歸客相逢應在武陵源七夕詠牛女銀漢横秋玉露凉䨇星猶自似參商經年脉脉情難授此夜盈盈路轉長月逈應無鸞入鏡河深寧有鵲爲梁佳期漫向君平卜天上人間共𣺌茫歲暮書懷寄賈石葵年丈山中歲晏意何如莫訝長安闕報書䰟夢幾悲池畔草封題少遇海邊魚百年病骨風霜後千里鄉心涕淚餘望斷石門秋夜月故人獨掩白雲廬送太宰夢山楊公致仕長安冠蓋滿郊畿元宰朱輪出禁扉從此聖心勞夢想只今祖道有光輝宫前柳色分紅斾嶺畔桃花待錦衣欲問東山舊樵牧麒麟閣上幾人歸送李容齋符卿册封魯衡二藩因偕健齋參軍同行親擕璽綬出雲間齊魯函封次第頒五月船經滄海郡千峰人度穆陵闗名藩累葉分茅貴上客連枝振佩還舊是平津門下士送君猶自愴離顔送朱養淳太史册封周藩蓬萊闕下五雲飛桐葉封函出帝畿漢苑花香隨使節河橋柳色上征衣天臨玉署恩偏渥星近銀河夜更輝試向汴京城裏望六街何處不朱扉送全𤣥洲太史册封趙藩邯鄲道上夾垂楊六傳飛塵出建章趙國河山連右輔鄴都詞賦在天潢登筵夜對叢臺月染翰春浮玉署香此日流離知滿路好陳謠俗報君王送袁玉蟠太史册封楚藩赤管年來侍禁中忽衘使節日華東九河雨色過梁苑七澤秋聲到楚宫故里歌成飛白雪大王賦就起雄風還朝欲問陳詩事莫采章華達聖聰送蕭𤣥圃太史册封淮藩天家同姓建諸王歲歲綈函出尚方三殿雲霞分璽綬九河簫皷動帆檣賔筵漫賦淮山桂使槖聊攜漢署香欲問江鄉應未逺鄱湖南去是瀟湘偕朱可大丞卿王興甫文學㑹于子冲藩伯於城西道觀二首長安城下路漫漫邂逅開尊集舊歡三輔征塵聊駐馬百年交誼此彈冠從知浪跡同飄梗不道流光迅轉丸囘首垂髫渾似夢翛翛華髮笑中看五月垂楊覆御溝使君千騎小淹留何知擊筑燕城㑹故是談經稷下遊雲起髙峰渾欲雨日長仙館只疑秋平生意氣還諸少酒態相逢可自由侯甥允吉入京相視送歸馬上征衫草色青炎天視舅到燕庭黔方客滯元戎幕魯國名傳博士經離别十年腸欲斷悲歡千緒酒初醒北堂定憶連枝影爲報今來兩鬢星送侯大將軍姊丈出鎮貴陽春草沅江萬里程十年旌節下神京韜鈐自握軒轅陣皷角重開驃騎營魯國諸生曾避席漢家飛將久知名燈前把酒猶相問不信封侯事果成平生結客少年塲一劍登壇鎮夜郎馬上山川連六詔匣中風雨渡三湘情知壯志圖龍頟無奈離愁數雁行别後相看萬餘里尺書㡬日過衡陽春日小齋閒居聞澄上人談義焚香清晝裊茶烟小閣閒叅一指禪浩刼塵機何處觧彼方妙諦幾宗傳有無盡息超塵境種地俱空啟勝縁身現人天知是幻聞師半偈已泠然送澄公還東海勞山出世隨方閱歲華曾承内㫖賜袈裟安禪舊對江干樹卓錫初停海畔槎花應潮音常作雨日蒸龍氣稍成霞吾家亦近蓬瀛島白社歸來路未賖病中遣懐三月孤齋斗帳寒十旬休沐主恩寛閒翻藥裹呼兒晒細檢詩筒借客看千里鄉心芳草緑一年春色杏花殘浮踪去住渾無頼行路人間信是難贈張就山隱君相逢杯酒說行藏問字曾師李奉常梁苑十年依幸舎商歌一曲擅詞塲鄉心長白山頭月客鬢桑乾馬上霜昨夜讀君張翰詠西風已自斷歸腸胡竺西山人遊塞上入都坐談邊事九邊行盡到長安抵掌論兵髮指冠厭見羌夷秋入塞愁聞漢將夜登壇黄金結客壚頭盡短鋏成歌馬上彈欲笑當年吳市隱沉淪空作歲星看九日胡竺西過小齋視疾酬和殘菊牀頭剰欲簪長安秋色閉門深羈懐漫對重陽酒俠客能爲洛下吟說劍寒霜飛大漠繙經法雨落祇林維摩丈室勞相問已㑹忘言學陸沉真空寺留别馮葛諸丈蕭踈菀柳寺門前别色相看一黯然十月繁霜凋客鬢重城殘雨上離筵心同張翰思吳日事異梁鴻去漢年别後雲山未相間尺書猶有雁南旋出都書懐寄同遊諸公長安大道抗離旌廐吏將車出禁城恩禮虗同䟽兩傅行藏實愧魯諸生夢殘芳草山中路興盡浮雲世上名惟有㶚陵橋畔柳柔條踠地不勝情過蘆溝橋束髮承恩禁苑遊鄉心今夕渡蘆溝千峰過雨官橋暮廿載飛塵客鬢秋驛路行分三輔界宫雲囘見五城樓車中却聽渾河水閱盡歸驂日夜流過莫州故城一客長安華髮生十年重過莫州城堤搖野浦長天靜樹夾殘霞片日明澤國蕭條來徃路秋風憭慄古今情不知擊筑燕䑓客有底悲歌氣未平封御史邢翁八十䨇夀二首濟北賢豪行誼敦年躋上老徳彌尊真封已自稱烏署髙隱還應並鹿門明月千山芳杜若春江九畹茁蘭蓀仙齡幸際昇平理拾穗謳吟亦主恩雙闈同拜玉函封夀袠今開第九重青鳥日隨王母侍白雲常滿丈人峰已看庭際翔三鳳更向壚邊跨兩龍欲問齊眉吳市隱千秋誰許繼髙蹤賀平隂劉元陽新授四氏學掌教聞君待詔出長安儒服新裁委貌冠魯國諸生皆聖裔漢家博士是朝官橋門暮雨隂槐市講席春風自杏壇囘首鄉閭殊未逺北堂魚笋致非難答周啟明大叅書握别長安㡬歲星人間離合總飄萍儒臣使節移梁苑病客歸驂出漢庭卧久山中芳草緑書來河上片雲青聞今正有宣房役報國無然賦采苓過汶上贈路鳳岡太守蕭踈䨇鬢感華年把臂相看一惘然别緒三秋燕市酒生涯百畆汶陽田髙城雨色青驪外閒苑花香白墮邊爲道池塘春夢苦傷心蜀魄化啼䳌時聞長公侍御蜀中哀音酬寄茅鹿門先生人宗江左見風流詞賦名髙鶴髮秋倚馬應閒青玉杖藏書欲滿白華樓籬邊松菊陶濳酒湖上烟波范蠡舟尺素來時看明月不知裏許夜珠投山中報陳玉壘少宰湖上清秋片月寒為誰殘夢入長安一千里外素書到二十年來良㑹䦨欲候三台依帝座先聞六典建天官他時世業光青史重向扶陽傳裏看哭賈徳修司馬二首幾日哀音發嶧州傷心千緒淚䨇流那知渭水燕飛地正是遼城鶴化秋幕府勲名留趙魏詞垣文賦擬枚鄒可憐一片長安月猶照當時舊酒樓滿眼悠悠世上名誰將金石喻交情蔣家舊日開三徑魯國當年並兩生只道浮雲輕聚散不知華月易虧盈從今寂寞梅花信腸斷山陽笛裏聲暮過楊劉有感多年不到楊劉戍此夕馮軒過里門前代津梁無聚落舊家蘿葛有兒孫烟横逺隴迷山氣日落平沙見雪痕水木遺踪多所念惟將悲淚灑空原贈金陵張文學太初曾將玉樹擬風姿倒屣驚看絶妙詞雨後青燈揮麈夜江頭明月掛帆時孫𢎞首奉西京對韋孟家傳魯國詩此日淮南叢桂滿不知誰折最髙枝過殷少保先生金輿山房有感相國名園負郭開朱䦨寂寞鎻蒼苔泉聲故自花間出山色依然座上來多士尚疑懸帳日蒼生空想濟川才誰憐廿載平津客淚灑東風首重囘卜築黄山别業歸來四壁故依然卜築桃源别有天種樹新移彭澤柳買山舊賜水衡錢園林但欲成環堵門巷應教似輞川廿載行藏君自見乾坤五畆白雲邊大名王仲木從梅侍御西征奏凱北旋賦此壯之十年裘馬客長安杖榮從軍戍賀蘭桓典霜威開幕府陳琳檄草據征鞍鐃歌出塞邊沙白烽火登城漢幟丹誰道䕶羌諸校在功成今日屬儒冠贈獲嘉岳茂才内日華仙掌一聨乃是夜夢中句也䨇鳬别路久凄其令子相過慰所思倚馬梁園新著賦趨庭魯國舊聞詩日華近傍仙人掌春色髙分玉樹枝儒術承家須俊少卿雲早見繞彤墀朱光禄可大倚舟河上擕公子過訪對酒話别蘭橈幾日倚江闗命駕相過水竹間星聚陳荀聊對酒春深黄綺暫還山分攜易下中年淚落魄難銷烈士顔愁殺城南新柳色依依青眼若為攀宿雲翠山洞送可大南還十年重作碧山遊萬事相看兩鬢秋夜鶴有情驚别夢巖花無語殢春愁天開洞壑䨇樽酒人去滄浪一葉舟峰後峰前徃來路少時還擬待鳴騶酬馮學士用韞寄問宿酒初醒午夢餘春皋小雨試揮鋤忽逢隴上梅花使為送雲中錦字書别後瑤華常滿袖歸來白髮漸盈梳聞君亦有東山興海畔秋風掃石閭鄭生承武自閩來訪蓬蒿三徑少將迎客有相過萬里程觀樂遊同吳季子談經業繼鄭康成悲歡徃事青燈話要𦕈新辭白雪聲他日上林傳賦草應知首問長卿名夏日東園諸友同鄭承武小會山園五月海榴開小㑹欣逢上客來竹裏詩題青玉管花間酒汎紫霞杯庭皋逺樹留殘雨城堞輕隂閣晩雷欲似當年河朔飲翩翩詞賦盛論才謝繹梅中丞過邑賜訪不遇題詩驛壁而去賦此寄謝雨後蓬蒿滿徑荒不知千騎過東方憑熊謾駐旌旄色題鳯還餘藻翰香敢向雲霄踈故舊已從樵牧混行藏慚君為憶青蒲對囘首長安事𣺌茫題孫湛明侍御征西巻朔方昨歲起邊聲繡斧親徴六郡兵漠北烟塵歸指顧征西車馬藉威名胡笳夜靜昆邪塞漢月春輝敇勒營猶有遼陽烽火在還將前箸贊昇平山居懐寄可大隱几空齋意晏如美人别後底無書未應湖海還浮棹却想藤蘿已卜居避地自堪遊五嶽逃名誰許問三閭惟餘逺道長相憶為勸加餐寄鯉魚寄問馮學士扶侍旋里兼候北上儒臣啟沃沐恩偏予假寧親輟禁筵春酒自承盤上露宫衣不散案頭烟䟽家謾擬辭榮日石氏今當卜相年歸闕何妨尋舊約長安路出岱宗前酬寄馮學士見問孤城欲雪雁無聲海畔書來幾日程隔郡闗河勞逺夢多年京洛見交情青山久絶人間累白眼閒看世上名珍重心知酬聖主應令樵牧覩清平送鄭承武文學還閩歸客翩翩玉劍裝河橋斗酒對飛揚帆前雨色來吳㑹馬上秋聲渡汶陽萬里攀留徐孺楊百年寥落陸公莊從今夢入三山月夜夜驪珠採海旁正月四日香山寺閣同侯大將軍送孫湛明侍御北上二首寳閣髙臨不住天霏微春色畫闌前孤城欲墮寒峰雨野水猶凝逺戍烟上界香花開勝境故園風物入新年屠蘇剰作東林飲又送離歌到酒邊尊前山色碧氤氲徙倚髙臺對落曛闕下春歸周柱史亭邊夜醉漢將軍丹霄法從多鵷侣白社風流有鹿羣此别澄清應在念螭頭封事可相聞春日閒居即事閒居愁思轉依依邑里春深正阻饑深巷炊烟渾欲少平田蔓草亦應稀中原㓂盗還消長海外兵戈有是非好在黄扉諸相國從容調燮佐宵衣黄石山堂即事坐倚青山望翠微堂髙不礙掩荆扉千巖落照遙含雨萬壑秋雲近上衣世路風塵歸後少故人書疏别來稀十年學道雄心損惟有烟霞未息機石樓獨坐效長慶體燕坐危樓日影遲田家幽事亦多岐因防過水移門徑為礙㸔山剪樹枝地簡將迎全罷酒人無酬倡少裁詩年荒正恐烽烟起悵念園葵繫所思夏日嶽麓山房即事夜合花開一院香烏皮几畔小胡牀蘿烟撲牖晴猶濕竹色含秋午亦凉避客總荒蔣詡徑為園半學陸渾莊只今負郭全堪隱况復青山對草堂四月五日周師攜尊過嶽麓山房同少泉侯丈小集三徑常邀載酒歡小亭散髮對憑闌春殘未覺花香盡日午纔分竹色寒仙令䨇鳬初解綬将軍萬馬舊登壇浮名已入髙陽㑹莫憶人間道路難時周初歸田侯亦罷将故云四月十一日侯將軍兄弟邀從亭山先生遊洪範東流二池宿南天觀登雲翠山絶頂奉和四首百尺髙臺古樹林池邊不雨晝蕭森遊逢載酒春先暮興到看山客自深片石千秋留鳥篆寒潭百尺想龍吟何時得遂移家計長日垂竿藉緑隂右洪範池馬上壺觴處處從花源又入白雲封石渠飛沬濺春酒茅屋臨流響夕舂雨色微侵青薜荔山光倒映紫芙蓉南天咫尺今須到萬壑丹霞宿幾峰右東流泉野色嵐光面面新上清樓閣俯嶙峋杯間月出瑤臺夜杖底雲飛玉洞春地盡羣峰開象緯天容雙屐出風塵從今便結羊何侣長與名山作主人右南天觀玉皇閣中天積翠削巑岏掃石銜杯醉不冠樵路半垂青嶂底歌聲全出碧雲端飛來别作仙人掌望去平臨玉女壇笑問風流彭澤宰白頭曾得幾回看右天柱峰夏日侯將軍兄邀陪光禄朱丈遊虎窟山南洞遇雨奉和孤岫岧嶤隔虎溪還陪雙屐共攀躋尊前雨落珠林暝洞口雲生寳界迷絶壁泉聲雙樹杪夕陽帆影數峰西山城舊隱無多地處處都邀綵筆題朱可大飲餞言别秋歌一曲入清商斗酒踟蹰夜未央子舍應㸔雲北向征車却逐雁南翔行藏自信心如水離合相㸔鬢有霜聞道尚方孤劍在徴書早晩下明光秋日送可大南旋萬里過從樂未休花時胡不少淹留東籬曉色方含雨上苑天香欲報秋嶽畔攜將三秀草湖邊歸去一扁舟豫愁明夜思君處别酒初醒月滿樓山中懐寄王對南相君屈指朋遊歲晩踈雲中相國比何如百年禁苑論交誼千里關河嘆索居月落楓林常有夢鴻歸榆塞乆無書天涯若問同心侣素髮于今已映梳甲午除夕孤懷此夜倍悽然明日應過半百年瞥眼聲華杯酒外驚心節序曉鐘邊圍爐對婦更殘燭帖勝呼兒覔綵牋最是春遊關意念早時留取杖頭錢榖城山館集巻十三
