  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0219_WYG_008-1a, image: WYG1291/WYG1291-0075c.png}
body:
  text: 穀城山館集巻八明于慎行撰五言律詩懐寄張玉陽年丈二首怊悵前年别綿綿嵗月征積薪從古歎投杼至今驚春雪梁園道秋江建業城行蹤何處問愁絶鴈來聲聚散年來事茫然思不禁薄遊交道淺久宦世情深别日楓林夢愁時桂樹吟悠悠大河水詎盡尺書心薊門行四首為于大夫子冲賦漁陽開幕府授鉞魯諸生廟畧魚麗陣軍符驃騎營懸金親教射畫地細論兵半醉歌聲起風高右北平少年多意氣仗節赴燕雲曉月懸弓影春星吐劎文防秋歌出塞逐敵賦從軍未許平陽騎横邀萬里勲九月平原獵材官大合圍雪凝驕馬汗鐡澀侍兒衣塞鴈連天起征蓬巻地飛此時都膽落前隊射鵰歸邊烽傳大漠一劎夜臨闗鳥道千重戍龍城萬仞山降兵旗下出侯騎雪中還苦樂行間事魂銷壯士顔奉寄李北山先生四首當代論騷雅公存大國風源流千古見才儁一時空嵗月鴛行外江湖鶴髪中倚天長劎在猶覺氣成虹先朝老法從白首臥巖阿避世交遊簡藏山論著多醒酬漁父問醉倚雪兒歌大有餐霞秘紅顔盛若何雅道何寥廓時名易陸沉不因今日論寧見異時心翦拂千金價宫商萬籟音故交蕪沒久亦許附詞林先君為公舊友承采遺詩故云龍門何日御流想碧山隅文雅從先進聲名避大巫白雲康樂墅春酒步兵厨早晩抽簪去能容絳帳趨同馮殿講琢吾夜過東鄰魏光禄見泉二首一曲宫城陌君今幾卜居小開蔣詡徑别作子雲廬花落藏書後風生漉酒初相逢殊恨晩傾葢意何如舊好應無厭新知亦已歡銜盃遲月上揮塵惜燈殘世態閒堪見浮蹤拙自安所欣東壁影時近夜光寒夏日過雙寺贈寳藏法師偶過城北寺一憩寳公堂午飯青精滑新茶玉乳香疎鐘沉片雨髙樹出斜陽為叩經行地浮盃海路長代書答陶比部蘭亭落魄佳公子天涯可定居適來江上使傳得篋中書湖海名方盛雲霄事轉疎沉冥吾所慕數飲態何如贈人為金吾郎二首俠少羽林郎承恩直建章臂鷹馳道側調馬御樓旁夜月燒燈苑春風蹴鞠塲錦鞲渾未脫十日從長楊陌上錦雲連期門校獵旋射聲銀作鏑躡影玉為鞭撇草連雙兎凌空接兩鳶應憐漢飛將白首滯窮邊可大邀遊張常侍園二首夙慕名園勝因君載酒看山容虚榭滿竹色小樓寒地主更新貴遊人續舊歡愁中春色過纔此一憑闌五侯開别館平野碧湖東乳燕翻槐日鳴鳩試麥風水窮千樹裏亭隱百花中却憶山園路芳菲正滿叢壽寳藏上人二首舊檢高僧傳林公勝範稀安禪多寳座印法六銖衣雨落時聞梵花開自掩扉空門忘嵗月想見刧塵㣲壽者原無相何因證大齡階前雙樹老閣上片山青地傍蒼龍闕函開白馬經應憐朝市客幾日鬢毛星送侯六參軍燕城秋欲暮疋馬送君還投筆書生志鳴鞘壯士顔邊風吹錦帶海月落刀環慷慨匡時畧何年出玉關送妹倩李子授侯門教讀天涯思弟妹見爾帝京遊捧檄趨軍府彈冠傳子侯黄花征路晩𤣥鴈塞城秋那值池塘恨臨風涕泗流時方有亡兄之戚故云出塞四首為遼左李大將軍賦塞上發鳴笳軍聲動地譁三秋徵彀騎七校選良家曉月分弓影秋霜吐劎花主恩何以報急為掃邉沙銅符天上至漢將出龍城雲鳥圖成陣河山幕作營日凝金玦色磧冷鐡衣聲早報匈奴滅西京甲第成元戎新授鉞俠少逺從軍莵塞秋山合龍城舊路分角聲吹凍雨旗影亂浮雲百戰城南道方成上將勲玉節君王詔軍中夜築壇金人歸少府鐡騎散材官逺戍三秋斷嚴霜萬里寒功成多意氣歌舞入長安懐周公瑕苦憶吴門隱翛然一釣竿烟霞雙鬢老天地五湖寛閲世憑烏几逃名著鶡冠何時燕市裏重逐酒人歡詠史十八侍中郎春深侍建章呼盧金戺側蹋鞠玉樓旁夜賜離宫酒朝薰異國香可憐秦殿女向月巻羅裳周公瑕有書見問寄答故人何所似契闊已多年舊事閒應記新詩老更傳花開三徑雨門閉萬峰烟猶采相思樹封題到逺天春日有懐東郭草堂吾廬吾所愛雖小却宜春草色常經雨花香不受塵歸期何日定旅夢此時真怨殺烟臯鶴臨風待主人閣夜隱几虚堂夜幽懐誰與論星河臨九陌鐘漏徹千門黯淡傷春事踟蹰念主恩蘼蕪今已緑歸路滯王孫報鄔山人汝翼念子不能寐三年闕報書自縁歸興久非是故情疎南北無寧嵗江湖有索居爾時吴市隱寥落復何如報雲翠山道士許公契闊茅山侣書來見素心養砂還守竈種樹已成林月出巖泉冷花飛石洞隂知君相憶久日聽曉猿吟春暮歸心無可奈先作送春歸細草河隄合殘花苑路飛夢廻雙闕雨思繞舊山薇想到征輪動薰風已上衣臥病臥病已三月歸圖猶未成慰留明主意推挽故交情御路蘼蕪發春山杜若生湖邊小行徑處處有魚羮閉門閉門多所適懶與病相宜岸幘全忘沐匡床久未移酒醒㣲雨夜衣減落花時只憶河橋柳應餘未折枝告中馮用韞宫諭朱可大丞卿見過臥閣荒三徑惟容二仲過借書酬寂寞說劎慰蹉跎未路交情少他年别思多東門楊柳色執袂可如何小閣小閣經時臥琴書靜不譁丹衷猶戀主清夢已還家幾對春城月虛開杜曲花一牀餘丈室還似住毘邪可大遊摩訶菴有詩見示賦答少壯歡娱地憐君只自遊一春全臥病舊事幾經秋聽雨花間坐飛觴石上流歸心將别恨憶此更悠悠孤鴈池上孤鳴鴈因風憶斷行凋蕭形影共蹢躅羽毛傷有恨驚霜露無心慕稻粱如何籠伴鳥噭噭主人傍上書上書書未報旅思且盤桓天意高誰問人情巧自看味兼甘苦盡色併笑啼難耿耿孤臣志惟餘一寸丹雨中遣使買舟時節忽復易閒居事更幽㣲風吹木杪片雨到牀頭未解虞卿印先尋范蠡舟行裝書數巻沾濕不無愁乞休華髪登朝列承恩嵗月深病酬吴客問思作越人吟世事容蕭散時名任陸沉本無匡濟畧報國在抽簪聽姜生彈琴客來山水際為我鼓鳴琴月泛三湘色松流萬壑音焚香消晝永啜茗到更深莫漫彈招隱方懐桂樹吟寄題楊夢山先生半間樓舊有滄洲興今成緑野遊桃花千樹雨月色半間樓隱几山光入開簾海氣收却令麟閣上圖畫想風流新城館中夜坐獨坐燕南館桃燈坐自深還家遊子路去國邇臣心落月征車動寒霜客袂侵陸沉非避世吾道在雲林白溝河西風吹易水曉飯白溝河獵騎平原淺漁舟别渚多地分燕趙敵國蹙宋遼和今日逢全盛盧龍尚枕戈途中書懐二首聖代無高隱行藏亦有因寡交思避世多病學全身止足存㣲尚安危付鉅臣所慙恩禮重雪涕念君親太息宗祊計回天事信難三年頭欲白八疏口將丹璇海波能潤瑶臺月正安漢庭多彊項誰敢測宸歡單家橋十載橋邊路巾車此重過秋聲連渤海寒色下滹沱避地紅塵逺還家華髪多來時道旁柳生意稍婆娑暮抵徳州城下瞥見漳河水燕齊兩界分郡樓融晩雪津柳掛殘雲病骨寒應倦鄉音近稍聞明朝看海氣遥禮泰山君茌平道中感懐父老迎相問君今華髪歸雲霄身自貴家國事多違具邇差皆盡同遊既已稀畏看舊門巷先有涕沾衣銅城望見雲翠諸山歸途今日愜憑軾見吾山以爾千巖翠慙人兩鬢斑向來多逺夢從此閉重關不似終南路依棲慕世間立春日楊户部廬山謫官河南枉道過訪軒車來逺道執手意何長喜對春盤酒愁分畫省香士龍名入洛司馬賦遊梁莫漫悲岐路雄心在四方除夕前四日送楊户部之官河南送子嵗云晏踟蹰可奈何酒邊生白髪雪裏渡黄河落魄才難盡飛揚意故多春風洛陽道早晩聽鳴珂抵舍承邢知吾侍御賜問裁答二首海畔投簪始伊誰問索居長安千里使濟水數行書世事焚魚外時名夢鹿餘平生周柱史避俗意何如海嶽終堪隱風塵幾倦遊采芝隨綺季種竹待羊求月迥春天樹江寒雪夜舟何時芳駕至尊酒一淹留歸日王興甫文學于子冲大參來視山齋春欲盡上客到羊求對月休愁思看山且醉遊蟻封知是夢駒隙信如流不見芄蘭侣辭官已白頭輓趙秀才竹里二首别來能幾日溘已隔重泉不作鵬摶海翻成鶴上天談經溪閣月對酒竹樓烟回首東山社傷心涕泫然連年家難劇雙淚日沾纓已嘆無兄弟誰堪喪友生延陵荒草合管子舊臺傾更甚山陽路空聞笛裏聲穀城山館集巻八
