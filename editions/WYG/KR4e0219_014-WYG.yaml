body:
  text: 榖城山館集巻十四明于慎行撰七言律詩乙未元日試筆東風一夜滿春城海畔曈曨旭日生市里衣冠朋舊誼田家簫鼓歲時情花開綵勝嬌相媚酒到屠蘇黯自驚遙祝楓宸天未逺履聲猶似近承明人日對酒感懐五十纔過又一春為逢人日轉愁人寒暄自閱杯中世形影相依夢裏身舊事莫談温室樹初衣不染洛京塵東風底是多情甚吹送霜華入鏡新十三夜周師邀飲同侯將軍賦綺席清尊送晩霞節臨元夜豔春華河橋欲滿城頭月火樹初開雪後花萬里風塵今對酒百年時序此聞笳相看可奈踈狂甚爛醉行歌漏轉賖十六夜陪周師侯兄歩月過橋即事孤城殘雪漏聲寒燈火稀踈社皷歡元夕已過人未醉小橋重度夜將闌月華似向瑤臺見花雨真將玉樹看囘憶長安歌舞地五侯驕馬正遊盤夏日山居周文伯起部倚舟過訪長夏齋居玉樹林蓬門忽復聽車音停橈别浦江雲逺對酒明河夜色深佩向仙曹分水玉名從國士重南金清時報主多同志野老應餘擊壤吟周文伯載賜中泠慧山泉水賦謝過江曾酌南􅌕水恨隔毘陵第二泉何意䨇甖來逺道併教五月失炎天香疑露下金莖夜色憶氷分王井年小試龍團俱妙品清風兩腋總泠然輓李北山先生二首海嶽靈分振代英當年神降是長庚風塵一吏淹華髮詞賦千秋起盛名紫氣闗前何日隱玉樓天上幾時成愁聽化鶴歸來後嘹唳寒城夜月聲符璽先朝侍未央陸沉今古事堪傷騎箕自應星精位握槧還為地府郎篋裏遺書存禪草壺中大藥失仙方心期欲觧延陵劍落日悲風起白楊山中承陳寅所憲伯書問賦謝都門三紀挹風流想見今來雪滿頭雲裏忽傳鴻雁札山中近隔薜蘿秋懐人仲舉應懸榻傲世元龍自倚樓聞道枌榆新結社追隨無計覔扁舟讀髙年㑹詩録寄夀陳寅所憲伯華堂髙㑹聚耆英黄髮如雲象赤城四座飛觴喧笑語百年擊壤沐昇平人浮洛社詩中數事勝襄陽傳裏名七十主翁猶未老已從仙籍領長生秋日亭山周師招飲黄石山頂岧嶤片石枕䨇流載酒登臨欲暮秋萬古長留髙士傳一編曾啟帝師籌川原囘合浮佳氣烟樹微茫結逺愁亦有受書年少客白頭今伴赤松遊秋日偕亭山先生暨諸親友飲城南寺山石上南溪不到已經年溪上髙丘坐𣺌然日夕千峰懸片雨城秋萬木起寒烟人歸洛社真堪隱地入桃源自是仙眼底舊遊渾欲盡當歌莫惜酒如泉重建雙檜堂成追憶兩兄有感背郭堂成傍嶽祠盤桓雙檜憶連枝池塘寂寞逢今日華蕚翩翻是徃時髙棟重懸初署牓頽垣猶見舊題詩小山漫自稱真隱隻影誰憐兩鬢絲閒居效長慶體乾坤屈指閱行藏不是狂夫老亦狂寵辱百年身似夢浮湛五畆醉為鄉鷦鵬各自便髙下鳬鶴誰能制短長囘首昔遊愁憶汝緇塵偏染鬢成霜春日承蘇岱髯長史寄問賦此奉酬并謝藥餌之惠邯鄲古道魯門西錦字誰将尺素題遇主虞卿初相趙談天騶衍舊遊齊賦成明月堪疑璧藥就黄金試作泥此日思君何處切平皋春草正萋萋初夏陳東甫張仲叅東園小集竹間三逕午凉新四月烟光似上春倚檻青山全入座隔林黄鳥故窺人花香零落隨歌管酒態蹁躚傍舞茵但使求羊能共醉知他何地有風塵夏日侯將軍過訪黄石山莊榖城山畔舊田家坐客開尊對晩霞種秫新醅陶令酒為園近接邵侯瓜同時朋好人誰在早歲行藏鬢已華聞道邊塵今稍靖儘堪農圃寄生涯夏日訪侯兄東山别業因閱兩甥行巻悵别東山歲頗深將軍樓閣鬱蕭森松濤晝送孤亭雨薜幌晴交滿院隂萬里風烟今日酒百年兄弟白頭心吾甥更自多文藻最羡君家桂樹林樓成山居雙屐不曾休更為看山旋築樓倚檻時飛丹嶂雨隔城常對白雲秋逃名自可成巢隱縱目還堪作卧遊數巻殘書一杯酒此中合作小莵裘里翁張慮齋八袠二首寰中信有地行僊八十氷肌類小年華蕚曾聨文苑盛衣冠雅稱素封賢蘭臯夜雨看耕耒綺閣春燈醉舞筵共慶清時多舊老三朝遺俗口能傳常將沆瀣當朝餐矍鑠風神世所難走馬自輕飛鞚逺看花猶劇蹋歌歡青葱日長堂前樹郁烈春芳澤畔蘭欲向仙臺占夀紀不知渤澥幾時乾濮陽李鴻臚為大父北山先生求銘名家閥閱未湮淪䋲武君今列從臣司馬正當求草日杜陵猶有乞銘人操觚雅解親文史委佩應堪侍禁宸海内相逢多世舊休將薄俗浪悲辛元戎少泉侯兄六十誕辰二首晝錦髙堂列綺茵鳴珂深巷聚雕輪旬周花甲人稱夀瑞紀桑弧日在辰勝節漫同河朔飲幽居不受玉闗塵憑君試訪延齡藥歲歲瑤觴祝大椿矍鑠丹顔鬢未霜牀頭龍劍吐星芒㢘公善飯神方王鄂國徴歌意正長門樹常嘶金絡馬庭苔漸澁緑沉槍君王拊髀應誰問老將勲名在夜郎賀王郎季輔新補博士弟子諸生魯國受經初標格王郎玉不如倚馬舊傳文考賦籠鵝雅學右軍書家聲此日標瓊樹世業當年論石渠手澤應須開萬巻早懐三榮詣公車寄吳少溪宫録七十名家俠節世稱賢七十餐霞偶列仙結客長安曾置驛買山陽羡久成田書來濟北春鴻逺夢落吳門曉月懸為問庭前雙玉樹青葱欲賦上林篇奉寄趙王殿下長陵佳氣五雲浮大國分茅古冀州兩界河山連魯衛一時文物盛應劉銅臺月上華池夜玉殿風生桂樹秋每羡康王舊賓客至今詞賦壓人流寄送林太華民部報命北上傾盖長安意頗親山城重枉駐征輪兩河使節歸仙吏一代家聲屬世臣路入五雲闗樹曉賦成雙管禁林春郎曹縱自多文雅誰許青箱事可陳山居自述呈王對南相君闕下班行舊日分海邊名姓少人聞一竿自釣南溪月五㹀親耕上阪雲竹徑堂無猿報客松闗惟有鶴為羣只縁不忘平生誼塞雁來時屢夢君送黄與參水部報使還朝木落霜臯菊始華離情咫尺𣺌天涯三秋佩擁河隄節八月星浮漢水槎思客山中踈薜荔緘書白露滿蒹葭論交何地還傾盖悵望驪駒對晩霞黄水部便道省覲附候葵陽學士從槖名郎滿屬車世家吳越邈誰如傳經夙受金華草問水初藏玉簡書逺道西風囘使節片帆秋色過鄉閭趨庭為叩東山履早晩徴函下石渠馮宗伯請急東旋寄候六傳西風簇繡鞍都門又作畫圖看應縁斗畔星辰逼不為人間道路難漢闕恩光深子告齊城佳氣滿承歡思君此際還千里愁聽秋聲木葉丹馮宗伯居廬書至答慰空山華月𣺌愁予此夕風前得報書千里人歸滄海路百年淚盡白雲廬方從宿草悲陳迹况對寒梅憶索居聞道蓼莪詩總廢春園那不賦潘輿丙申除夕獨坐婆娑雙鬢坐寒宵鼓籥驚心倍泬寥駒隙百年逢節序鶉居五畆寄漁樵雲屏舊自楓宸賜臘醖先將栢葉調常記南宫封印出猶題尺䟽勸春朝丁酉元日試筆隔歲逢春雪未乾春風元日入椒盤即看淑影蒸雲氣已覺晴光到蕙蘭天外音書渾欲斷眼中兒女劇為歡門前好問朝正使溟海邊烽可報安人日親友夜集人日隂雲起岸沙不知春色落誰家寒更怯對歌邊酒短髮羞簪勝裏花擲罷明瓊呼得雉燒殘銀燭聽啼鴉相看一笑渾難事莫惜追歡負歲華元夕觀燈呈張君侯孤城此夜豔年芳巷陌絃歌玉漏長殘雪離迷明月影踈燈隱閃畫橋光笛中折栁聲新聽馬上傳柑事未忘為報河陽仙令道春風花樹已飛香正月十五日李黄羽司理行部過訪中州文苑舊名家結駟相過巷路賖雪後初傾元夜酒燈前已發上林花六條問俗推星使兩世論交感歲華為訊髙堂容鬢好春山誰伴采明霞山中懐寄李比部滄浪西京仙吏久分攜逺道傳書報每遲恨别無因重對酒追歡只記舊題詩春留海上金光草慶衍堂前玉樹枝何地思君倍惆悵山城落月夢醒時懐寄𤣥同宗侯春風吹夢緑雲端此際思君蕙草寒北海才名應振世鄴都詞賦早登壇每從斗畔占精氣轉向樊中惜羽翰天禄藏書如可校青藜夜色許誰看懐寄貞白宗侯奎宿長臨岱嶽懸天家今日盛才賢圖書七略分中壘文史三冬屬少年魯國諸生多避席梁園詞客半隨肩不須别授平臺簡自有靈光賦可傳暮春邢侍御子愿命駕過訪夜談喜賦十五年來繫夢思軒車何意到茅茨探春正及花開候對酒還當月上時色動青天看倚劍寒生白雪坐論詩芳樽十日君休厭眼底交情更有誰子愿東園小集和韻草𤣥亭閣負山城上日開尊命友生花事欲䦨初駐馬栁隂纔合已聞鶯林中幾醉平原酒雲裏疑飄洛苑笙廿載相看渾似夢白頭繾綣不勝情子愿告還敘别窮遊殊未罄交歡纔道分攜意轉難湖海何人能命駕乾坤今日少彈冠世情總付雙尊酒生事惟餘一釣竿却羡紅顔渾未改憂時還復勸加餐山中逄吳閶薛文學是韓宗伯丈門人附書問訊坐中有客自南州為問傳經憶昔遊别日塤箎三殿草歸來雲樹五湖舟春山見月頻疑夢逺道緘書倍結愁欲識瀛洲圖畫裏同時强半雪盈頭韓丈繪登瀛圖列館中同年畫像春暮與陳東甫飲白莊栁樹下懐傅伯俊侍御時有驛使投書語中及之門前五栁映樓居倚杖看山逈自如夕雨霏微芳草路人家歴亂白雲墟田間斗酒為君醉隴上梅花何處書却憶薄遊周柱史江南春色滿囘車殷洗心中翰奉使取道過訪林花落盡殢鶯歌谷口勞君結駟過使節三春來内苑征軺五月渡黄河含香池上家聲逺揮麈尊前俠氣多聞道螭頭封事在扶桑何日息鯨波山中懐寄御史大夫漸菴李公雙闕觚稜漢苑秋當時曽御李膺遊乾坤别後多戎馬湖海年來有釣舟華嶽雲峰天外聳函闗紫氣日邊浮同朝晩進公應記一卧滄江亦白頭承趙國主賜問并賚刻書二種敬因蘇長史奉謝緑雲縹緲隔清漳玉札封題到草堂閣上青藜開璧府枕中鴻寳示仙方東平樂善偏承寵北海工書久播芳更羡名家蘇季子白頭簪筆侍君王九月七日南昌太守王君華岡過訪東郭小園有詩見遺酬贈負郭停驂路未賖孤亭麈尾發烟霞題詩坐聽千林雨對酒先看九日花寥落山中逢勝侣風流江表見名家知君佩有豐城劍斗畔何人識物華送朱可久文學南歸前年此日雙鴻影今見孤鴻思不禁燕市黄金難得意楚天白雪重知音秋聲蕭瑟來杯酒舊事凄凉結寸心華閱才名歸二阮君家桂樹總成林送朱長倩文學南歸山城木落菊花前杯酒逢君意黯然和氏且須懐白璧干將終自倚青天孤帆别路三千里兩世交情四十年此後雲霄長在望早看槖筆賦丼泉九月十三日大雪唐君平文學入對過訪有詩見投賦贈清秋多病罷登臺卧閣因君一舉杯𤣥雁自逢江上度菊花何意雪中開髙歌郢里驚人調健筆梁園作賦才不是闗山寒色早上林瓊樹若為栽寄王對南相君午橋花竹為誰歡毋謂成功在考槃海上烟塵方絡繹中原黎庶欲凋殘輿情此日歸司馬揆路何年起謝安同學老生無世慮亦題尺牘勸加餐讀許雲村先生小傳有述紫雲峰下石為閭尚想幽人舊隱居避俗青春違禁闥移家白首寄樵漁名標吳國先賢傳手校西京太史書此日綈囊餘諫草臺郎封事滿公車南天觀追憶許鍊師悵然有作曽向三山訪列真重來不道海成塵峰頭鶴化猶疑夢洞口猿啼别是春玉觀凄凉花似雨松臺寂寞草為茵仙家日月還如此人代茫茫可更論攜陳山人東甫飲黄石山頂黄山片石如斗大與爾捫蘿到上頭撃劍放歌雲霧裂攀崖送酒猿猱愁咸陽帝子何事業圮上老人無土丘兵戈滿眼那得問元龍嘯傲真吾儔送邑侯瀛海張君入覲二首管子臺西汶水寒朝正駟馬向長安齊城吏績徴三異渤海家聲起二難日近宫雲春自早烟消津栁雪初殘遙知課最承恩處内殿黄金擁漢官㡬月鳴琴單父堂絃歌聲滿百花香詞華舊羡題鸚鵡政化新傳下鳯凰天向九闗開左个人從千騎發東方朝囘好乞金莖露綵服春風一舉觴阿城舟中送别張洪陽宫保南旋一笑相看共白頭君今亦遂碧山遊憂時早辟留侯榖蹈海初浮越相舟千里人隨江浦月十年書隔薊門秋燈前斗酒休辭醉别後闗河雁亦愁秋日邀張令君侯都䕶野集溪亭用韻奉和小築漁磯構野亭心期久已托山靈何縁斗畔郎官宿忽傍江頭處士星對酒峰霞侵晩樹垂竿溪雨散秋萍烟波自識逃名理不向人間問醉醒張令君汎舟南溪用韻奉和一曲清流鏡逺空蘭橈初試藕花紅鷗鳬影亂千峰雨蘆荻聲殘兩岸風嘯詠何人兼吏隱江湖此地屬漁翁兒童亦識髙陽醉拍手銅鞮唱轉工馮宗伯書來知以隕珠之感遂輟西遊因寄詩見問用韻慰謝二首契濶多年想盍簪花前惆悵發郵籖海門又緩青絲鞚嶽觀終虗白玉函為惜明珠曾照夜可知春草更宜男時艱正復資匡輔共指星華在斗南十年心事未曽違黄石春深長蕨薇漫憶封章傳畫省虗慙經術侍彤闈山中姓字無榮辱天上風雲有是非為謝故人多記念白頭已老薜蘿衣崔仲素郡丞寄詩見夀用韻奉答二首山城别後想鳴珂五見春風長緑蘿漢室新紬循吏傳燕臺舊和酒人歌林中朋軰看全少海畔烟霞占已多十二樓臺秋色裏不知㡬處有行窩不記雕弧此日懸敢勞三祝寄華箋浮沉大塊虗稱老嘯浪深杯久避賢百畆桑麻山澗曲一丘花樹浦雲邊人間何地還堪徃已借蓬𤣥小洞天送傅伯俊侍御詣闕結廬同卧岱宗雲無那離歌此日聞江路蘼蕪人欲盡春林猿鳥自相羣休嗟華髮長為客剩有青山可待君主聖時危須努力且看麟閣勒功勲題烟波釣叟圖門外汀莎映倚欄百年生事五湖寛烟簔夜掛芙蓉雨荻月寒浮翡翠竿半醉漁歌花裏聽清秋鶴髮鏡中看天家近日多征税祗有滄浪卧尚安七月望夜與劉晉川司空約㑹南旺湖舟中賦贈二首湖上蒹葭白露秋司空小隊若為留十年不對陳徐榻百里同登李郭舟巻幔踈燈搖浦樹停杯凉月墮津樓那堪細數生平事無限悲歡是舊遊華髮相逢意轉殷當年藜閣共論文元卿地應䕫龍㑹野老名逃鹿豕羣此夜占星知近斗明朝望嶽欲生雲惟餘别思如圓月不逐河流兩𣲖分司空别去登岱舟在分水廟前同馮用韞少宰登岱因送北上三年書札鎮相聞倚杖髙丘此送君憭慄秋聲天末起微茫海色霧中分情闗離合詩難就興到登臨酒易醺頗訝連朝多雨氣已知攜出上峰雲九日登三陽觀與馮用韞學士公孝與文學言别神霄峰下有仙壇送逺還同斗際看地近三天秋氣凛節逢九日酒杯寛紅塵閱代多新事白首論交少舊歡此别良遊恐難再惟將茰菊勸加餐送魯雲松博士遷郾城掌教漢家博士雅傳經忽訝銜魚落講庭五月梁園塵似雨十年魯壁鬢如星鄉心芳草從前緑客味寒氊依舊青此日諸生同祖道驪駒歌斷不堪聽榖城山館集巻十四
