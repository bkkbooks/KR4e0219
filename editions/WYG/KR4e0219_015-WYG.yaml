body:
  text: 榖城山館集巻十五明于慎行撰七言律詩賀孫湛明侍御新第落成青山甲第卜居新燕雀髙飛喜氣馴座上頳霞三島曙階前寳樹四時春藏書自校文園草閉閣全踈綺陌塵更見祥源開子舎天風吹送石麒麟時值孫公舉孫及之春暮山遊邂逅中貞宗侯别後却寄十年魯道𣺌予思邂逅名山若有期文雅自承中壘後賔交無謝建安時看春正對花如雨感舊應憐鬢有絲揖别峰頭勞望眼馬蹄蹀躞出林遲題孫侍御百尺樓仙家何地接蓬萊畫閣平臨百雉開遶檻溪山春隱映宿窓星斗夜昭囘雲臺舊抗匡時䟽天禄還翹著賦才莫謂長安看較逺紫薇深處是三台平隂徐南龍令君夜邀别後有詩見寄賦此酬謝傾盖相逢意頗深髙軒銀燭夜沉沉斗邊久識豐城劍堂上初聽單父琴百里謳吟欣化俗千秋風雅重知音别來復枉瑤華贈囘首山城思不禁山中懐寄沈龍江先生劍履當年别漢宫每從先進想流風安危正卜山中相著述方傳河上公梁苑池臺明月裏魯門花樹片雲柬書成何處還堪寄腸斷南樓度早鴻閒居懐沈㓜真司成長安城角寺門前把臂魂銷十五年夜鵲空迷千里月春鴻未帶五湖烟眼中緑鬢人俱老身外青雲事可憐屈指藏山多所著不知𤣥草向誰傳送蔣監臺文學校士東省事竣㑹試北上鼓篋吳門賦北征翹材又進魯諸生華林欲帶瓊枝長龍種還媒騄耳行馬上寒星冲佩劍霜前殘月墮離觥春來却望看花處五色宫雲滿禁城得李大宗伯丈報書酬寄渝州昨日使還鄉始得岷峨字數行讀去不知雙淚落别來已是十年强人間歲月何流易天外風波正𣺌茫兩地青山俱不負儘堪漁釣老滄浪寄沈㓜真年丈吳江烟月夢中殘起坐空堂念所歡别日只憐分手易歸來便覺寄書難斗邊共識張華劍天上誰彈貢禹冠莫問同遊最年少蕭蕭鶴髮照漁竿懐寄林𢎞齋大卿館丈燕市分攜歲頗多烟江𣺌𣺌奈愁何雲間上客顔何似海畔書生鬢已皤望月㡬囘迷逺夢鍼魚無處遡流波還思少小追遊日腸斷春城白玉珂石樓觀穫樓前髙栁晝成隂樓上窓開夏日深隔岸鶯聲猶似管迎風麥浪已如金奚官唱罩遙分隴野婦提筐漸滿林幸藉薄收供早稅憂天且釋老農心憂旱五月欲過猶未雨秋苗漸槁青可憐白日火雲但裊裊半巗泉水空涓涓北來流離滿道路西望邑里踈人烟城頭鼙鼓復不罷勑使普天飛索錢夏日石樓夕望登樓聊復當登臺小戶踈簾面面開遶檻溪聲千澗落垂天雨色萬峰來時艱驛路多豺虎民力秋原半草萊醉倚石闌成永嘯髙城愁聽角聲哀登樓重門無客少時開獨上髙樓坐不廻落日霞光還㶑灧隔城山勢自崔嵬時名正可抛詩巻世事惟應付酒杯悵望𡨕鴻方有念羣飛燕雀莫相猜四月八日約髙年諸丈東園開㑹首夏張筵聚草堂耆英髙㑹踵遺芳遊仙未覺丹霞逺浴佛初經慧日長新竹娟娟看欲翠殘花冉冉折猶香城中酒伴俱華髮莫放青尊佐老狂寄董太初令君平生詞海渴人龍下邑欣傳借魯恭祗畏攀轅期更早不知傾盖事難逢三年夏省還真拜百里春城但素封衛水齊山非謂逺論交何日得從容董司馬寄示春懐八首附此奉答山齋誰寄四愁篇儒術家聲自廣川健筆憑陵寧玩世長吟激烈為憂天少陵苦思應同調北地雄詞可並傳此日君王歌雲漢試調繁露佐祈年宿雲樓閒坐久將心事付山靈石几焚香對翠屏萬里秋聲雲外雁一天寒色雨邊螢閒來只自燒茶竈病裏憑誰著酒經總為此中堪避地不教人指少微星送張崑江文學北還蕭蕭一劍馬蹄輕家在燕南㡬日程自着逢衣遊上苑曽將寳訣覔長生風髙古道鳴蟬急天闊平沙落雁横老我巗棲愁病客與君何處訪蓬瀛送徐南龍令君北上盧子城頭問去蹤不堪别恨結遙峰春風㡬發河陽樹客路重趨薊苑鐘豈有明珠藏薏苡惟餘長劍吐芙蓉浮雲西北休愁思霄漢還應雨露濃贈王文學中柱南旋衡門誰為駐歸驂國士名髙舊所諳馬首春風辭塞上刀頭明月憶江南楊穿百歩才無兩璧剖連城獻至三此日漢庭推授受石渠同異待君談沈大宗伯使問寄謝憶昔趨陪禁苑遊宫霞日日五城樓十年夢隔金華漏千里心依玉樹秋望裏雲鴻能北向愁邊河水自東流知公容鬢今何似魯國書生已白頭西山夕眺城上高峰帶晩烟峰頭石閣啟秋筵空巖雨色寒相入曲洞松枝靜可憐落日千帆飛鳥外浮雲萬壑酒杯前遼陽烽火何時斷醉眼愁心望逺天南池水亭池上亭臺卜築深石橋西畔萬峰隂流來曲水廻通岸栽就新松稍作林天杪雲霞時隱見鏡中魚鳥共浮沉閒心未欲酬漁父落日滄浪靜自吟夏日東園方胥成小集五月虚亭載酒過踈林髙樹晚凉多馴將鶴子閒能舞飛出鶯雛小解歌城上斜風吹暮雨洞門白石長春蘿炎天逺道君何徃且醉花前金叵羅石樓新雨榖城峰下晚霞沉黄石樓頭暮雨深正見氤氲生逺岫旋看颯沓滿平林朝廷可下捐珠詔田野空為種豆吟縱獲西成民已困只應重雨櫟陽金送思修上人南遊花前别思重凄然秋色迢迢望逺天結夏久棲祇苑樹逢秋又上越江船衣冠到處成蓮社雲水何方欵梵筵總是禪心無去住可教清夢及林泉聞里中健兒歸自朝鮮述單中事有感從軍年少說成功道逐樓船過海東㡬見蠻烟迷月黑曽看獵火照波紅椎牛已自空夷國賜幣還應出漢宫嘆息愚痴石司馬枉將七尺殉和戎夀謝仰濳令君七十赤畿茂宰漢郎官文物家聲奕代看江左風流傳作賦雲中節鉞頌登壇河陽去後花成樹彭澤歸來菊可餐大是清朝真隱在白頭湖上理漁竿寄題李棠軒宗伯玉華洞天二首新開靈窟起何年舊號青城小洞天千古山川留勝蹟一時名字証真縁丹臺曉落綿江月石室春浮寳樹烟自是君家稱相館三巴别業似平泉城傍林壑逺囂塵卜築當年隱上真玉几金牀三島勝琪花瑤草四時新袛疑平地探靈境不識前身是主人亦有洞名爭未得可憐天隔錦江春吾邑雲翠山洞亦同長春舊名秋日酬寄周二魯符卿萬里秋江入畫圖望中人已北歸無十年海畔烟波逈一䟽朝端日月孤國論當時頻倚借民生何計許昭蘇只求且漏漁竿稅着得扁舟在鏡湖寄送于念東符卿南上金陵滿案除書報最先主恩那不念才賢兩都地望符臺重一代才名藝苑先楊子月明沽酒市秣陵秋色渡江船舊遊可得追尋徧扈從還依尺五天九日南溪汎舟節過重陽菊未花且隨白露汎蒹葭十年自卧滄江雨九月虚浮漢水槎鼔角城頭當落日樓臺天上歛殘霞不須却羡龍山㑹定少林光似若耶送鄭文學明景貢入成均首奉徴書詣上京儒家舊業世康成齊門久薄吹竽調燕市初髙撃筑聲繫肘方書多要妙臨池墨帖更縱横漢庭待詔須才子莫負扶搖萬里征送畢侍御印石按貴陽七月清霜下御隄乘軺又到夜郎西新開漢郡連三楚舊領蕃方帶五溪東觀聲華人地逺南牀名字斗山齊即今滿路逢豺虎白簡能􅁯萬里題寄賀公孝與吉士閣夜青藜可更探君家文物滿齊南明堂舊禮傳公玉石室新書續馬談此日去天真尺五當年聚嶽是星三山中酒畔頻聞喜幾度封題待爵函葉臺山宗伯入賀過訪夜集黄石峰頭駐綵旃蓬蒿三徑埽寒烟他年别夢金閨逈此日秋聲玉樹偏幸有卿雲能捧日不須杞國浪憂天山深朋舊相逢少莫厭城笳觸酒筵葉臺山宗伯舟次寄詩酬謝露白楓林菊有華轉從寒水望蒹葭千秋共㑹呼嵩禮九月初廻上漢槎篋裏明珠來照夜帆前紫氣過成霞江干不是淹留地到日詞頭已進麻送張晉臺博士宰徐聞諸生祖帳擁離顔雲際飛鳬不可攀萬里天懸瓊島月三秋人住榖城山梅花北嶺通閩路海水南頭望漢闗此日鮫人愁正極因君欲見去珠還寄髙瀛臺郡理江左才名自世家曾從窮巷駐征車登臺乍對千峰雨汎海遙看萬里槎月下吳歌思玉樹天南漢節隔梅花春風露冕多吟興筆綵都成絳闕霞歲暮得何蘭陽叅戎書酬寄漁陽老將别多年歲晏開書意惘然綵筆何人傳賦草青門㡬處買𤓰田笳聲久斷闗前月劍氣猶横海上天莫向烟波聞同調一竿殘雪五湖船恭聞東宫禮成志喜午夜前星耀禁林龍樓紫氣曉來深當年苦竭愚臣悃此日真知聖父心關塞烟銷休戰伐江湖春至起謳吟瑶圖億萬高皇綂只有神靈䕶至今壬寅元日試筆一卧滄江十二春每憐春色媚初辰盤椒試筆先成頌臘蟻浮杯後入唇華髮欲逢星再紀璇霄幸覩日重輪可知舊是商山隱不作非熊夢裏人正月二日大雪歲籥初更雪滿天知留靈瑞符新年樽餘栢葉寒仍汎笛入梅花調併傳六出休疑開臘後三農猶喜降春前只憐吹上雙愁鬢不逐東風散酒邊立秋吳翁晉郭汝承南溪小集和韻積雨空齋久閉門溪亭為客下壺飱長林一葉傳秋氣絶壁層波吐浪痕莫向時艱空指畫且將文事細評論晚凉不待東山月已覺明珠照酒尊送阮叔文上福州司理六月征塵滿玉鞍閩方南路尚漫漫名家自擅詞人賦望郡重簪法吏冠過嶺囘看鴻雁白逢秋應識荔枝丹中丞部曲無多在忍問當時舊將壇酬寄張洪陽宫保西江秋望水盈盈三十年來故舊情地逈雙懸梁月夢雲深㡬隔塞鴻聲山中上相稱𢎞景天際真師號廣成却悔當時交臂失白頭始解學無生送思修上人西遊少林叅請海上浮杯自落迦叅師名嶽又天涯秋晴少室寒峰月路遶黄河曲岸沙佛士此方開五葉仙壇何處覔三花空門真境應無住一鉢隨縁是歲華夀表兄少石劉翁八十苕溪漁隱舊稱仙一卧菰蘆近百年門徑不通車馬路行踪只在水雲天魚梁日落頻呼酒栁岸風輕每放船試數同時鐘鼎客㡬人能結海鷗縁王仁之明經北遊過謁常羡名家玉樹林空山何幸辱招尋青箱尚記烏衣事綵筆能飛白雪音珠出梁園應照乘車過單父試聽琴索居愧倒中郎屣世舊相逢意自深唐君平文學北上謁予黄石山樓賦贈十年㡬賦榖城秋五月還登百尺樓過雨林光渾似染拍天嶽色莽難收一丘自遂逃名計三筞誰懐濟世憂片石峰頭君試訪書生何術事封侯夀太宰二山楊老先生奉詔存問二首休從絳縣數流年甲子今來已近千進退雍容明主記精神矍鑠逺夷傳中朝四世稱元老上界三都證大仙聞道𤣥纁馳詔使莫教驚動海鷗眠歸來時事轉囂然憲老猶聞憶舊賢几杖重看中謁賜牢尊特自尚方傳期當潞國還朝日數過磻溪遇獵年尺一臨門應有問酬恩何筞且囘天新都程君房寄墨數螺道中為稅使所𣙜戯作志感客卿聞已渡江涔烏有何從問藝林楮國交遊成落寞松侯封爵付銷沉思𤣥但檢張衡賦守黑空遵老氏箴為語中人休錯誤隃麋原不化黄金山堂宴坐有感尺組當年早自抛溪山隨處小誅茅孤踪放浪慚真隱末路浮沉念素交萬里雲深難假翼一枝風靜可為巢虚襟久已􅁯𤣥白肯向人間作解嘲夀業師周先生八十朱袍黄髮態蹁躚夀算今齊釣渭年渤海舊民祠令長蓬萊新籍註神仙石函自有還丹藥菊徑曽無貰酒錢自幸白頭稱弟子長陪杖屨醉花前寄李中丞總理河漕陽九終疑數未真江淮保障屬貞臣風霆立破千妖膽雨露能銷萬里塵澤國方多沉後竈河隄更少負餘薪東南半壁歸軍府珍重艱危報主身閒居述懐未老歸隨鹿豕羣十年閱盡北山雲神全瓦注原非巧名混金甌久未分歲晏誰能懐鄧禹功髙自合謝田文華陽十賚皆君寵九命何殊闕下聞哭馮大宗伯四首齊城笳鼓玉音開漳水樓船素幔廻國運能堪傾棟厦主恩已自徹泉臺百身莫贖千秋淚萬事空悲一代才忍聽雍門琴裏調牛山凝眺不勝哀十年講幄奉宸聰獻納先成宻勿功著就新書惟賈傅傳來啟事是山公南宫忽坼中台座東海虛論大國風一䟽酸辛遺死諫何人不信史魚忠海色雲門欲斷腸君家今昔事堪傷慈烏夜遶空林月雛鳯寒棲苑樹霜劍許延陵何處掛書成名嶽㡬時藏還疑緑鬢文昌相别版仙卿侍玉皇前年執手碧山阿剩有心期對薜蘿只擬麒麟當日畫不疑鸜鵒去時歌平生倡和牋常滿别後封題字未磨垂老自憐知友盡㡬囘悲淚灑流波送郭汝承都試京兆二首離歌此夕動秋聲萬里元為薊北行碣石曽游燕處士緇林聊對魯儒生毫端五色春能吐匣底雙鋒夜自鳴别後思君惟見月芙蓉新鏡影分明傾盖論交意氣偏君家才地踵前賢燕臺市駿誰稱首洛浦登舟自是仙大業應從千古見時名不必衆人憐西京侍從多枚馬珥筆還期直木天送王靜所明經北謁主爵黄石祠邊瓠子河秋聲送客起囘波魯城此際重觀禮燕市何人更和歌除吏自應收士望翹材原為廣賢科知君苦憶臨邛令橋畔還遲駟馬過鮑兵部山甫過訪榖城山館飯牛隴上不曽冠有客停車問考槃驛路烟塵勞使節田家雞黍愧盤餐梁懸舊榻還能住袖出新詩且為看千古蕪城傳賦草華宗誰許嗣登壇送南皮湯明經入遊太學渤海名家尺五天凌雲卿子世稱賢薛公幸舎賔常滿漢代明經第最先匣裏劍光寒射斗庭前槐色翠成烟清時欲講河間禮六館諸生拱法筵送邑侯見廷張君入覲二首首春握綬出明光立見英聲滿岱陽膏雨千家歌麥秀和風百里散花香御屏久已書名字左省還應最奏章多少朝元天上客驚傳年少是龔黄千騎牙旌擁道周齊城仙令古元侯春前鳬影翔霄漢日下鴛班拱御樓玉扆望懸天左个黄金擎拜殿東頭傳宣倘問羊裘隱白髮滄浪一葉舟送寧陽徐令君入覲魯道謳歌擁畫筵東侯奉璧逺朝天仙鳬影集追班地神雀祥徴奏最年别日雪銷梁父社歸時花發汶陽川承恩莫拜黄金賜請為餘民折稅錢榖城山館集巻十五
