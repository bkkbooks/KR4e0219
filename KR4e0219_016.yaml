body:
  text: 榖城山館集巻十六明于慎行撰七言律詩紀賜四十首有序皇上登極以來日御講幄談經論藝五六儒臣趨陪近弻晨朝三接寵賚便蕃歳無虚月即勲貴大臣有不與焉臣慎行自丙子秋叨侍日講至已丑七月進掌春卿始解計横經御案前後十有四年特恩賜予不可數計仰仞皇上緝熙聖學懋建太平文史小臣過承恩渥念雖捐糜無以報稱歸田間日録出歳時賞賚每事占詩一首以紀榮遇且見聖明初政勤學嚮道如此使後之傳聞者有所頌説以對揚君父之盛美云辛夘臈月臣慎行頓首記丙子二月初與經筵進講紀述春雲别殿倚平臺問道恭承步輦來講席平依丹地轉經圅近對御筵開凝旒晬穆聞天語委佩從容列上台聖學方隆恩禮茂儒臣長此奉康哉丙子七月初侍日講紀述内殿雲深啟法筵隔屏初聽玉音宣宫臣舉案趨宸幄閣相垂紳拱細旃壁影絲絲浮繡網籖頭字字指瑤編氷兢祇懼終無補未覺身依尺五天丙子八月扈從聖駕幸學賜御膳銀葉等物臨雍縟典跨前王翠輦趨陪侍總章已聽諸生叅問難更隨三老沐榮光八珍乍見分神鼎七寶驚看出尚方國祚知同文運逺皇猷應共聖恩長丙子九月工部奏進萬厯制錢式様賜講官六人各一錠漢苑新成少府錢萬年寶厯赤文鐫青鳬闕銅官奏黄紙題名玉署傳趙壹囊空留暫滿東方俸薄賜常偏五侯甲第虚成埒未擬儒臣受寵年丁丑三月上親灑宸翰大書責難陳善四字以賜龍箋一幅日星光天藻昭垂自尚方久向横經窺聖藴還因納誨奉奎章琅函想見僊毫動蓬室驚聞御墨香儒術承恩逢景運非同常侍漫登牀丁丑五月大旱雩禱上齋居御講頒賜素蔬一盒雲漢憂歌歲事艱桑林䖍禱聖心殫祈年不輟金華講减膳猶分玉箸餐始見僊盤疑汎露却嘗寶饌是調蘭崇朝膚寸紆宸想霖雨應騰四野歡丁丑八月奏進世廟實録賜白金文綺錫宴南宫十載編摩帝典成神功四紀勒昇平瑶書此日陳丹陛石室從今秘赤城賜服總分新綺繡陪班猶見舊公卿漢家枉續周南史欲藉藏山作世程戊寅正月上出内府畫冊命講官六人各題四幅分得宣廟御畫二幅詩成奏上各賜銀葉一包百年壁府䕶僊葩奉詔恭題睿覽賖豈為丹青懸日月欲慿翰墨發雲霞叨榮乍捧銀為葉摛藻虚慙筆有花文學承恩逢盛典黄金買賦未應誇戊寅正月上尚巾禮成羣臣稱賀賜白金文綺負扆年來海嶽安春朝繡幘始勝冠龍樓拂曙天顔近玉座垂旒日角寛九廟神靈應已慰兩階環珮不勝歡邇臣幸奉青蒲對珍賜還看出上䦨戊寅正月進講賜大紅織成段衣一襲講殿朝朝聖渥頻賜衣又見出楓宸織成共識金梭巧貢到初開錦様新色借宫雲紅近日香浮僊珮暖宜春垂裳幸值軒唐理補衮無勞愧許身戊寅二月大婚禮成賜萬喜金字綵幣等物前殿欣觀六禮成千門容物動班迎歡聲欲滿雙龍闕春色先歸五鳯城擬向宫闈歌燕喜敢期幃幄被恩榮行看寶祚開蘭戺願托華封祝泰寧元旦賜門神掛屏葫蘆等物歲以為常節啓青陽歲籥新金人十二畫為神韶華自合留天府御氣誰期洽近臣綵勝仍分僊禁縷雲屏况借漢宫春却憐寂寞揚雄宅門巷恩光接紫宸端午賜黄金艾葉銀書靈符等物歲以為常芙蓉闕下玉書宣午日恩頒侍從前寶葉光分僊島月靈符香綴御爐烟歲時舊自荆人記風俗曾經漢史傳聞道宸逰臨太液龍舟鳯管畫樓邊八月十七日萬壽聖節賜白金文幣及鏤金萬壽福禄篆字銀書黃朱靈符等物歲以為常華渚祥開禁籞天恩光每覺近臣偏圅加白璧來天上錦散紅雲出日邊裁就靈符華舜旦鐫成寶畫紀堯年銜恩効祝慙無補金鑑先時獻御筵十月朔日頒厯賜新書五十冊歲以為常聖后乘乾萬宇欣明堂布朔啟靈文龍墀已忭羣工賜玉版仍陪上宰分蓂展瑤階春動律日蒸寶鼎氣成雲慙將赤管隨恩澤試卜周年祝大君十一月二十九日聖母萬壽聖節賜金幣鏤金篆字黄朱靈符等物歲以為常長樂凝和婺彩光侍臣沾貺聖恩長璆琳内苑開銀甕雲錦天機隱御香鳥跡呈書僊算永龍文紀瑞寶符黄朝來碧落韶簫度内殿親稱萬壽觴冬至恭侍慶成大宴南郊夜燎泰壇烟内殿朝開大慶筵兩陛衣冠承湛露千門鐘鼔震鈞天親瞻玉几雲霄上久汎僊盃日月邊温㫖三傳咸已醉歡聲動地未央前宴中三奉玉音初云官人酌酒再云斟滿三云飲乾甲戌七月奏進穆廟實録賜白金文綺宴於南宫紬書金匱愧非才曾是先朝侍從來鵷列趨隨蘭檢進龍衣立待石函開濡毫每憶攀髯望珥筆新承賜錦迴大典已成鴻號永聖心南面尚含哀賜内府新刻經史直解獻納金華閲歲年石渠同異已成編縹緗每向鸞扉獻琬琰新成玉府鐫聖主淵𠂻開道籥小臣丹悃托言筌還期至德登三五經訓當如日月懸賜新刻擊壤集千古名儒道業真弄丸常自擬堯民詎知異代逢明主猶訪遺編賜近臣迹托無名言未隱理超有象物皆春虚憐輕薄詞人體總似枚鄒亦後塵賜新刻韻府羣玉䇿府羣書代所躭珠英玉屑巻中探曽聞乙夜開芝檢敢望彤庭錫寶圅子孺休稱三箧記莊生漫向五車談從前亦恐酬清問浩瀚青藜閣上叅賜畫面川扇九華綵扇貢巴東午日承恩出漢宫雲影金泥黄帕解花開寶繪玉圅空擎來濯錦江頭月動處披香殿裏風自是君恩在懐袖惟將皎潔矢丹𠂻賜鮮笋殊錫光生玉笋班曽從青簡賦檀欒蒲筐乍解香盈座錦籜初分緑滿盤一飯疑含僊禁雨三秋猶憶北牕寒慚無鳯實儀千仞祝有龍孫長萬竿賜鮮藕芙蓉别殿曉風凉玉井靈根出水香薦熟方聞開寢廟賜鮮已見布朝堂氷絲欲斷鮫人縷瓊液疑含閬苑霜憶昨金鼇橋上望紅衣翠葢滿銀塘賜鮮楊梅臙脂濕暈火珠紅呉苑楊梅入漢宫帆帶春氷江上水盤分曉露禁門中曽聞枝裊闗前月似聽花飄笛裏風消渇詞臣空有賦慚無鼎實附羣公賜鮮枇杷佳名漢苑舊標奇北客由來目不知緑蕚經春堆籠日黃金滿樹入筐時江南漫道珍盧橘西蜀休稱薦荔枝千里梯航來不易懐將餘核志恩私賜鮮桃李講罷傳宣殿左廂分將苞品燦盈筐宫桃剖出丹霞冷僊李沈來碧玉香方朔瑶池人汗漫安仁金谷賦荒凉懐恩正恐虚秋實不羡春華吐豔陽賜鮮鰣魚六月鰣魚帶雪寒三千江路到長安堯厨未進銀刀鱠漢闕先分玉露盤賜比羣卿恩已重頒隨元老遇猶難遲囘退食慚無補僊饌年年領大官己夘春以病在告上疏乞歸值聖體違和旋即萬福再賜萬喜金字白金文綺於私第拜恩春朝華祝動僊班寂寞詞臣尚閉闗七日曽疑遊帝所一春全未覩天顔簪符已奉期門送金帛還從卧閣頒長使聖躬承昊貺歸山魂夢亦應閒己夘請告南旋奉恩詔乘傳并賜金綺路費經術承恩侍漢京歸家猶作錦衣行賜金闕下誇疏傅擁傳橋邊愧馬卿試語鄉閭應未見即垂簡冊亦稱榮江湖未覺長安逺咫尺葵心向日傾癸未甲申三扈聖駕上陵賜大紅織金曵撒鸞帶等物閣門五夜聽傳呼受賜先從左闕趨繡帶平懸金鑿落鞶囊斜掛錦襜褕行隨豹尾陪天仗立傍螭坳夾御爐却笑甘泉稱侍從不知原廟似今無甲申春月扈從車駕奉兩宫聖母閲定壽宫賜綵花文綺等物鑾輿三駕出山隈墨食欣傳福兆開地擁真圖連朔塞天留紫葢作軒臺兩宫共倚璇丘望萬乘親扶玉輦陪遙見黄門傳散綵紅雲朶朶下山來丙戌廷試讀巻賜宴文華西室遣内監出陪例也臨軒五度擢英才品第連朝直帝臺香案前頭文字進殿門西畔爼筵開清班許從元公列曲宴傳教内監陪聖代得賢應有頌遭逢惟祝泰方來丙戌秋月以皇次子生賜萬喜金字綵花金幣等物西宫送喜到宸旒侍從恩隨禁苑優勝剪雙枝花作綵金鐫萬喜字當頭他年茅土應藩漢此日珪璋早頌周共識昭陵多王氣年年春色滿龍樓丙戌冬至南郊扈駕聖母軫念天寒特賜薑蘇杏仁一盒黄門飛鞚到天壇傳道東朝賜講官祇為甘泉勞扈從特從温室下盤餐調蘭欲動先春色斮桂渾消午夜寒慈念殷勤知有望慙無一字罄衷丹丁亥二月奏進大明㑹典賜白金文綺宴於南宫仍給三代誥命九朝謨烈玉書藏祖德宗功萬祀昌漢代不須條故事周家惟用考前王頒恩内省恩綸降賜宴南宫廣樂張就裹儒臣稱最渥特煩三錫下龍章戊子九月壽宫隨駕步視寶城還於東廊稱賀玉音宣勞賜茶並賚綵花文綺等物朱樓絳闕冠層霞玉車犬金支駐翠華元相幄中分御錦侍臣冠上珥宫花僊城步閲教隨駕别殿常叅命賜茶可道龍顔多喜豫萬年福地屬皇家己丑六月三品考滿荷蒙聖恩遣内使及門齎賜羊酒寶鈔典禮南宫侍禁筵還因奏績荷恩偏牢尊特遣中涓賜楮幣親從少府傳漫擬恩華同八座猶將名字厠羣僊多慚衮職曽無補一巻牙籖十四年庚寅辛夘久病在告兩荷聖恩遣内使臨問頒賜米粥𤓰茄等物卧閣驚聞勑使來綈圅黄帕到門開㣲痾曲軫君親念朽質寧堪雨露培内苑香粳加匕箸天厨珍葅溢甖罍銜恩隕涕沾衾枕魂夢初疑帝所迴辛夘九月乞休得請欽遣内使齎賜路費寶鈔次日又遣内使齎賜白金文綺葢六卿日講各有特恩也乞休十疏始抽簪勑使連朝出禁林備物卿臣元自厚殊榮講幄舊來深初衣已巻天機錦歸槖猶圅内殿金慚負宸慈何以報惟將丹扆效餘箴穀城山館集巻十六
