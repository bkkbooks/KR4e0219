body:
  text: 穀城山館詩集别集類五明提要臣等謹案穀城山館詩集二十卷明于慎行撰慎行有讀史漫録已著録慎行於李攀龍為鄉人而不沿厯城之學其論古樂府曰唐人不為古樂府是知古樂府也不效其體而時假其名以達所欲言近世一二名家至乃逐句形模以追遺響則唐人所吐棄矣其論五言古詩曰魏晉之于五言豈非神化學之則迂矣何者意象空洞朴而不敢雕軌塗整嚴制而不敢騪少則難變多則易窮若原本性靈極命物態洪纎明滅畢究精藴唐詎無五言古詩哉其生平宗㫖可以槩見然其詩典雅和平自饒清韻又不似竟陵公安之學務反前規橫開旁徑逞聰明而偭古法其矯枉而不過直抑尤難也乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部六榖城山館集目録别集類五明卷一古樂府卷二五言古詩卷三五言古詩卷四七言古詩卷五七言古詩卷六五言律詩卷七五言律詩卷八五言律詩卷九五言律詩卷十五言律詩卷十一七言律詩卷十二七言律詩卷十三七言律詩卷十四七言律詩卷十五七言律詩卷十六七言律詩卷十七五言長律卷十八七言絶句卷十九七言長律六言絶句五言絶句卷二十賦
