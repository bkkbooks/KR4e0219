body:
  text: 榖城山館集卷四明于慎行撰七言古詩唐體樂府附長安道東出灞陵橋回望長安道煙花萬户暖風輕羅綺千門明月曉漢家宫闕鬱岧嶤碧閣珠樓倚絳霄丞相衣冠蒼玉佩將軍甲第赤欄橋平明內殿承顔色日晏朝回行紫陌夾道金羈赭汗流盈門繡轄朱塵塞人生得意自輝光刺謁紛紜滿路旁一笑看人回祿命片言酬客腐肝腸小子勝衣皆受印蒼頭結綬亦為郎貔虎三千陳列第鴛鴦七十閉東廂銀牀月瑩流蘇帳翠幕煙浮玳瑁梁鐙前北里千金舞座上宜城九醖觴年去年來無旦暮春花秋月依然度歌吹平連長樂鐘林園直接新豐樹祗知娛樂不知憂轉眼榮華逐水流誰道氷山可永峙誰言天雨可重收曾聞上將幽鍾室曾見元公賜養牛博陸門前羅鳥雀平津邸內走鼪鼬古來世事渾如許道上垂楊不解語唯有東陵舊日侯瓜田看盡青門雨將進酒君不見洛陽城東桃李花暮時紅雨早時霞又不見瑶臺素月飛銀闕三五蟾光四五缺人生行樂不須愁富貴豪華電露流昔時鼎盛五侯里今時零落成荒丘長安貴人眼中數規名規利何太苦日中走馬平津第絳塵拂衣汗成雨白衣蒼狗在須臾雷公駍鍧震下土揚雄寂寞默守玄賈誼太息將安補青玉案紫霞杯與君沽酒臨髙臺烹龍炮鳯白日暮清歌妙舞香風來朝不從騏驥遊暮不從黃鵠棲浮名碌碌果何有天地於我如醯雞茫茫吹萬同一吷曾史桀跖皆電滅君今少壯復不飲坐使紅顔鏡中歇紅顔銷歇奈爾何華髮蕭蕭日以多直須枕藉杯中酒莫問浮沉海上波巫山髙巫山髙髙不可極十二芙蓉入天碧楚王館前暮雨飛流煙凝翠濕仙衣蘭詞半吐卷衣去渺渺行雲不知處日髙枕上聽猿聲惆悵髙唐夢不成有所思有所思乃在蕭關道玉井蒼苔嵗月深門前細路生春草春草如煙秋月缺路逺魂飛不可越祗聽關山笛裏聲登樓曠望肝腸絶東來有鳥正西飛願寄一書到海涯鳥辭天長去不反藏書懷袖衣帶緩戰城南去年戰龍城南今年戰烏丸北海門半夜風雨聲島嶼微茫天地黑邉營嗷嗷新鬼號頭顱亂落芙蓉刀平明幕府歌鐘起白璧黃金北斗髙夷奴垂鞭出海嶠回首遼陽馬上笑可憐膏血滿野塗異方飽死原上烏至今愁望零支道白草寒霜萬骨枯朱鷺篇昆明池水金堤曲朱鷺飛來春草緑紅樓紫殿度香風片片丹霞水上宿王孫蘇合作彈丸飛落碧空池水寒網絲漠漠如煙織斂翅裴回不可即朱鷺朱鷺何紛紛避人引子呌入雲刻畫白頭人不識海邉笑殺素衣羣輕薄篇長安九陌花初發細馬輕車看不歇五陵少年遊冶郎開顔發艷朝日光珠窗繡網煙如織明月樓中夜吹笛雙燕西飛底不知銜泥飛出碧梧枝烏夜啼金陵城頭秋月深城烏夜半啼髙林閨中思婦桃紅燭斜倚寒窗聽不足低鬟無語濕羅衣起視明星河漢微賈客樂廣陵賈子江東客大艑珂峩倚江側朱樓繡箔月如霜醉臥壚頭小玉牀五更解船大江去鼉浪鯨風何處住洞庭秋水接天來五兩成林夜半開西登三峽立百丈灔澦如牛不得上環環布帆欲退飛猿鳴一聲淚沾衣錢刀睹快狎風色歸來金多頭已白同時隴上飯牛子睡起煙臯夜吹笛大堤曲大堤春盡花成雨大堤女兒隔花語揚州估客四角幡暮泊蘭橈宿江渚芙蓉寶帓緑雲鬟翠簟銀缸夜色寒倚瑟當壚春酒盡卷帷望月曉裝殘石城一曲歌未足日出天空江水緑含啼送客更多愁腸斷煙波萬里秋對酒行送朱廷評可大左遷汝州别駕朱君朱君為我楚舞我為君歌金尊緑酒春風過天長道逺可奈何爾不能泛泛與鳬俱上下一朝海水生白波我今送爾萬里長河道歌聲一闋令人老上有悲鳴噭噭離羣嘯匹之春鴻下有萋萋斷腸草斷腸西去思悠悠洛水齊山兩地愁平生不作兒女態今日為君雙涕流朱君朱君與爾登髙丘望逺海茫茫塵世不知年秦皇漢武今安在天生豪俊必有用如君自是人間才縱然落魄江海上浮雲於我何有哉朱君朱君爾今且飲三百杯行路難送可大典我千金裘共醉千鍾酒何處正愁人月落青門柳長跪問行子君今何所之海風五六月豈是客遊時北上太行坂羊腸詰曲何時返南去渡長河津梁隔閡生風波蛟龍出遊雲雨多雷公砰訇奈若何行路難難未巳何當與子浮滄溟一挂長風三萬里白馬篇送可大白馬黃金羈蹀躞溝水頭君今且莫去為我暫淹留昔我束髮年與子同出入幸承明主恩並列金閨籍行彼長安途宛如雙飛翼自謂連行兩不離豈知一旦成分析我棲東海岸君去洛陽遊天津橋下水不盡古今愁陸機名髙翻見妬賈生胡遭絳灌仇人心對面如山海世情交道何悠悠丈夫得意自有數豈能與蜉蝣翠羽楚楚爭春秋為君笑盡一杯酒彈劒悲歌醉未休明妃曲送可大妾本名家子十五顔如玉羅綺閉重閨羞道黃金屋君王選秀色早嵗入深宫三年不召見憔悴泣春紅同時入宫人一一錦屏中芳顔自倚能傾國肯學他家買畫工祗憐寂寞深宫裏不道風塵邉塞起君王一顧不可留蛾眉逺嫁三千里紅頰兩行啼邉城草色萋今宵胡地月昨夜漢宫雞漢宫桃李春如雪此時緘怨辭丹闕但使君心悟畫圖不惜龍沙愁夜月鳴鴈行寄趙瀫陽年兄南粵鳴鴈發雲中羽翮摩天舉何意長風來吹向瀟湘渚連行接翼不忍分忽然散落如風雨洞庭波寒木葉稀霜空嘹唳常苦飢迢迢故國日已非聞弦虛驚使我欷今復彈射將安歸不及銜泥雙燕飛金窗繡戶春日微一為鳴鴈行三嘆沾人衣江南曲蕭蕭煙雨秋江口兩岸青旗拂細柳估客初回錦纜舟妖姬正熟銀槽酒珠樓宛轉畫橋東油壁輕舟綺繡中桃葉江前對明月莫愁湖上起西風繁華莫唱江南曲吳宫舊草茫茫緑關山月隴頭流水何年别戍客辭家心欲絶橫笛寒吹塞上聲春閨近對關前月如花小婦翠眉低覽鏡愁生玉面啼十年征戍音塵斷不得雲中半紙題織成錦字空自嘆緘愁那到玉門西行行且遊獵篇為于子沖賦漁陽九月陳雲黑使君叱撥桃花色酒酣弄轡意氣豪呼鷹出獵燕然側黃間欲挽倚寶刀銀鏑飛過雙青骹千羣玄鹿大如兕排風跖地走且號日斜勒馬原上立蕭條狐無遺迹書生自學萬人敵為君却掃隂山北洛陽道漢宫烏啼天欲曉平明試馬東城道銀鞍玉勒五花驄十八承恩拜侍中春寒花滿披香殿溫室璇房夜開宴呼盧一擲賜錦袍百和輕煙經宿散君不見咸陽三月花如雨卷衣淚落秦宫女采蓮曲芙蓉江上秋風烈采蓮少女沙棠楫紅顔耀日總疑花翠袖凌煙渾勝葉月髙船重花欲稀漸聽花間笑語微停橈忽憶巴陵道悵望煙波涕滿衣上雲樂東廂食舉百戲作魚龍曼衍中堂落華鍾忽駐舞綴停更進西方上雲樂老胡家世是文康紫髯深目華蓋方白巾裹頭火浣細緑珠作帶韎􅞘長曾從海上栽若木吹笙更截崑崙竹朝看阿母鬢成霜夕見安期顔似玉却候明時日再中朅來獻賮玉門東流沙暮涉三萬里碣石天開百二重辟邪師子陳成列赴曲聲隨簫鼓節漢苑白麟未足珍宛城寶馬空稱絶白題歌舞奏仙倡為祝黃圖日月長但願百蠻九塞靖烽火陛下長傾萬嵗觴杯槃舞歌吹鸞簫考鼉鼓四座停酌看槃舞七槃宛轉一匕舉左翻右覆勢如取九日落天星作雨晦明滅沒不可覩觀者疊迹色怖沮跳丸弄劒安足數夜長酒多絃管清收槃按節作緩聲月髙露下天宇平向來巧拙虛無形鳯臺曲未央宫前桃李花柳枝煙裊御陌斜貴主初臨萬年館小侯新試七香車香車繡幰開長樂十里天街鋪錦箔臺上乘鸞白管簫樓頭走馬黃金絡賜衣分得御袍香寶玦珊瑚佩帶長朝遊歌管金張第暮入風流趙李場君不見隴西老將頭白盡百戰不博通侯印閣試征西將軍出塞歌榆關九月寒風早玄霜已白邉城草敵騎朝侵敇勒營將軍夜出祁連道關山曉月度龍沙馬上芙蓉吐劒花連營畫地傳刁斗十萬軍聲靜不譁期門少年健如虎束髮從軍思報主畫角寒銷玉塞雲鐡衣冷拂金城雨援枹執鼓何雄哉笑看樓蘭動地來合圍瀚海渾無敵轉戰臯蘭未肯回紫騮汗血歸來後肘背黃金大如斗胡牀坐解月支頭割鮮笑釂蒲萄酒酒泉亭障接烏孫輜重如山入塞門五雲闕下報天子萬里封侯安足論館課沙隄行漢家宫闕五雲裏復道連綿正相倚建禮門前綺陌開銅龍樓下沙隄起沙隄迤靡屬東城十里宫槐緑影橫街官閭吏傳呼過隄上隄下人不行黃麻早下平津閣萬玉班髙元宰爵華轂遙從天上來沙隄半自雲中落滄海桑田事未真人間富貴等流塵只言避世金門客曽見沙隄幾度新題桃川圖贈錬師張子故西苑方士也我歌桃川圖舊識桃源客骨青髮短雙頰紅十年賣藥長安陌自言本是武陵人花落花開不記春姓名偶被先皇識選列仙官侍紫宸紫宸宫閣天中起西苑繁華如夢裏銅盤百尺落秋空綺幕千門照流水祠壇隊隊羽衣羣鶴蓋霓裳擁聖君黃金白璧年年賜豹髓鸞膏夜夜焚當時等輩俱光采算袋裶衫揖上宰曽窺阿母降瑶臺更訪安期入東海海上重來鬢已秋鼎湖龍去水空流夾城輦路多青草别殿宫官半白頭承恩舊侣知何處聞逐雲中雞犬去惟餘野迹走風塵却憶桃花源裏住我聞此語涕沾膺世事從來不可憑君今莫説丹砂事松柏蕭蕭冷茂陵贈塢秀才汝翼白頭自如新傾蓋自如故西風蕭索朔鴈號江南老生來何暮我聞吳楚之間多大雅布衣往往稱作者才情不復論三唐直薄西亰接枚馬君乎君乎何壯哉握筆一掃傾羣材凄風寒迸金石裂長濤怒激天地回眼前浮沉那足數文章有真心自苦胡為乎敝裘零落雙眼白一夜商歌淚如雨我為歌一闋君為盡一杯白雪誰憐楚客調黃金空築燕王臺看君落魄今何似古來才人亦如此莫言得意自有時人生所貴成名耳送業師黃東野先生左遷衛輝郡博漁陽城下多秋草漁陽城頭秋月曉涼風颯颯吹客心驅車逺下三河道三河地接太行秋倚劒悲鳴回紫騮滿堂擊築吾不樂黯淡胡為賦逺遊先生落落閩中彥束髮牀頭開萬卷賦成盡擬似相如待詔金門不召見明光宫裏落雙鳧握綬江城興不孤推轂難逢北海薦抱經却授西河徒青氊莫道成蕭索博士古來官不薄買駿終歸郭隗臺登龍本出孫𢎞閣垂髫舊日魯諸生負笈從遊濟北城十年不立門前雪望斷江南萬里程薊門煙樹今何夕白露滿庭空水碧一尊相對夜色寒挑盡青燈話夙昔長歌忽漫是離筵不盡浮雲黯逺天淇園到日應相憶萬竹寒聲沸百泉彈鋏歌為鄆樊生賦君家閥閲髙東魯亦近樊城傳舊土兩朝八座祖與孫後代簪纓仍接武爾亦翩翩帝里遊茱萸錦帶鷫鸘裘紫雲闕下彈雙鋏來向朱門傅小侯朱門修巷臨長道翠閣瓊樓相映好明月時聞內苑笙春風日踏芳隄草髙堂上客號三千俠少風流獨迥然鬬雞南陌爭金距走馬東城揖玉鞭相逢斗酒多傾倒胡姬壚頭天未曉汾陽甲第貴盈門那作樵漁空自老薊門春盡雨茫茫汶水梁山路阻長錦衣歸向橋邉過不是青絲馬上郎荆門歌送沈澄川太史奉使楚藩荆門望望渺何許橫跨三巴控三楚髙臺落日大王風明月空江帝子渚侍臣持節下蓬菜三楚豪遊意壯哉銀扉朱邸江邉峙玉檢金泥闕下開青門柳枝日未午胡姬壓酒當花塢聚散渾如陌上雲别離苦恨尊前雨驛樓官樹潞河西七十長亭路不迷贈客幾投青玉案當歌一聽白銅鞮南登即向巴陵道苦竹香楓相映好斾指芙蓉澤畔花槎凌鸚鵡洲邉草蘭臺仙館白雲秋飛蓋爭隨上客遊應教非同靈運賦懷鄉不上仲宣樓嗟君聲名何煒煜彩筆驚人珠萬斛論道三年侍石渠校書乙夜開天祿長安春色正霏微侍從翩翩滿禁扉早看方朔歸金馬莫學相如戀錦衣夜郎歌送賈諌議德修奉使黔中臨問屬夷酋長燕城客舍經春草落花如雪間不掃故人忽作夜郎行離心溝水長安道與君追逐競髙蹤翩翩矯若雙飛龍春風共載承明筆曉月同趨長樂鐘嗟君風度何磊磊夙昔大名滿東海千言倚馬疾如飛賦成四座騰光彩一列金閨法從班朝朝鳴玉侍天顔牽裾折檻偶然事諫草琅琅動九關夜郎越嶲天南土萬里夷荒開幕府倚劒秋回七澤雲挂帆夜渡三湘雨天書逺向百蠻開辮髮番君夾道來嘯吒風雷震山嶽白日罔兩何有哉金杯紅燭月鳴杵酌酒與君對君語區區離合安足陳懷抱平生吾與汝春晴日觀轉愁豫十二河山錦不如莫詫故林偏得到吾將走馬深嵓居白將軍歌為吉軒令君賦君不見關西故將五陵豪束髮從軍受六韜蓮花玉劒浮雲騎橫擊隂山塞月髙又不見五雲樓閣春窈窕射䇿彤庭海日曉碧衣行盡長安陌玉勒銀鞍弄騕裊君家甲第隴雲東文武家聲霄漢通已看彩鳯鳴秦苑早見仙鳧出漢宫三年試政齊城宰萬樹名花何罨藹函關却望紫氣深姑射山中春未改將軍矍鑠狀如何七十猶能擊缶歌廉頗善飯英風在馬援憑鞍壯志多封侯萬戶吾何有庭種芳蘭門種柳結束還徴俠少遊十千一醉新豐酒齊城東去是三山弱水蓬萊路不艱郎君跪乞長生藥為駐仙人千嵗顔吾聞黃河東來三萬里橫亘榆關天際起將軍世澤亦如此纍纍肘後何足比投筆歌送侯兄上清浪參將昔年謁告黃山側西風送爾遊京國我來昨日入明光送爾南登古夜郎相逢相送何其迫踟蹰溝水令心傷翩翩爾自佳公子丞相勳名在國史中丞踔躒本如龍汗血神駒更千里關西老將力不如魯國諸生名大起十年不售昭王臺轅下長鳴泣未巳爾時投筆大昻藏仗劒悲歌去故鄉兩臂常開十石弩千金笑入五陵場橫行直貫單于幕手縛樓煩紫塞旁六騾已遁一騎返雪花如席髙雲黃馬首血懸月氐器小婦壚頭索酒嘗赤囊一日奏闕下錦鞚飛塵朝建章三十男兒好身手腰懸兩綬黃金璫旄頭已落胡天久郅支呼韓同稽首不聞天子獵長楊却召將軍屯細柳西南未罷伏波軍都護金章大如斗生年自有封侯骨彈鋏長歌勸君酒長歌未巳涕沾裳客子浮雲各一方兩甥牽裾啼不去一雙白璧騰精光大者日受三四卷小者學語聲琅琅顧我猶多離别嘆憐君不作兒女腸吁嗟乎桂水橫煙不可迫流入牂牁天地坼湘潭七十五長亭羡爾今為萬里客旌節遙連銅柱隂樓船直壓鯨波白諸部蕃王伏道周千羣將吏喧江澤玄猿暝嘯跕鳶驚正使豪遊壯心魄春江瑶草緑可折何當寄我長安陌送業師鄭舒軒先生署教海寧同子沖可大二君薊門四月楊花白丹鳯城南送行客兩生擊築酒欲闌先生默默不盡歡我今為歌行路難憶昔振翮閩海濵才名踔絶無與倫腹中萬卷已成笥筆底千言若有神數竒不逢得意薦賦成誰念馬卿貧十年漢闕泥穿履幾度燕城桂作薪道傍明珠真按劒櫪上驊騮空絶塵長歌投袂出門去江上聊開絳帳春絳帳青氊殊不惡東南山水堪遊樂千峯夕翠入講堂一枕夜潮浸郡郭東風桃李色方深秋雨芙蓉顔自若天生豪俊豈無心不合先生長落拓君不見會稽寒士西入秦公車不收小吏嗔偶然懷中探尺綬黃金繫肘意氣新又不見新豐市中貰酒客寒賤時逢里媼謫一日忽承內殿宣青驄蹀躞生顔色人生得意自有時世事浮沈那可知還看獨對彤庭問接迹夔龍集鳯池聽琴篇呈李雪滬先生雨鳴瀟瀟風滿壁虛堂孤坐春草夕何來兩客登我堂坐索瑶琴鼓前席吾家焦尾舊無絃世路逢人不解傳丈人錦囊出緑綺為我揮手松風前宮聲一曲試瀛洲文物翩翩禁苑遊人間帝子銅龍館海上仙人綘玉樓倐忽涼飈飄四屋新聲轉作瀟湘曲沙清石碧江水寒月明呌入汀洲宿絃悲調急聲轉微滿堂擊節淚沾衣幽蘭白雪何要眇此意世人知者稀丈人自是賢豪客橫琴呼酒雙眼白借我朱絃三尺強試理清商入蕭索匡廬山人歌寄胡少白文學廬山之髙髙入天孤峯秀出真青蓮峰懸石鏡何年影照盡彭湖三萬頃平開雙闕赤霞浮翠嶂丹崖萬木秋飛濤倒瀉銀河水灑入長江九派流青山亦不摧流水亦不絶謝公行處空雲煙東林舊迹莓苔滅豫章胡生才且雄匣中玉劒雙飛龍拂衣欲出人間世走臥匡廬第一峯香爐雲氣飄山閣明滅千巖與萬壑雨急朝聞嶺上猿月寒夜聽江臯鶴有時結束帝城遊俠骨常輕萬戶侯上書北闕不待報笑臥胡姬舊酒樓罏頭日髙金管歇楊花茫茫春雨雪此時彈劒却歸來脫帽長歌舞秋月胡生胡生無與倫心雄萬夫步絶塵英賢古乃起屠釣何况儒術逢昌辰彭蠡為君腹瀑布為君口俯瞰洞庭波吸作一杯酒但欲澆爾胸中萬古之壘塊風塵蹩􅍷吾何有胡生胡生何時與爾同上匡廬巔足躡星虹禮南斗贈于子沖大參請急南旋長安城頭秋雨繁長安城下雙朱轓去年忽向洛陽道今年却入長安門誰道分司非達宦誰言朝請不承恩行邊慣試渥窪馬到闕仍依白虎旙憶昨胸奴入邉塞隴坂以西殺氣昏右方王將旃廬滿北地煙塵士女奔元臣廟略馳三殿上將戎軒厯五原青海幾經傳尺檄玉關依舊有遊魂翻令蠻府提鋒鋭欲掃干戈靜塞垣謝公談笑亦何易賈生流涕亦太煩競説請纓臨瀚海爭言倚劒出崑崙爾曹落落不入眼此事悠悠誰與論我今但欲拂衣去斗酒悲歌意氣存看君四十頭未白勉加餐食無多言壽李北山先生八十君不見扶桑之下一杯水一峯突出三千里其北有濟西有濮當代詞壇宗二李濟南修文地府深濮陽垂老臥空林同時已抱千秋恨異調俱稱大雅音江淮當日嗟流落尚璽先朝官不薄雙袖天風逐鳥還一竿秋水知魚樂至人遺形在杜機如翁達生識者稀不從北闕懷簪紱不向西山采蕨薇安期大藥欺人久石家金谷誰能守有田但種東陵瓜有錢但買宜城酒只今號作北山人素髮丹顔八十春躡屐當間青玉杖呼盧時側紫綸巾半酣擊缶耳稍熱笑擁如花歌未歇洛陽七貴眼中塵長安五陵原上月天道有盈日有虛得名得壽福已餘璇閨况繼中郎業金匱還傳太史書中郎太史亦爾爾君家柱下差足擬請為小著五千文藏在白雲封中石閭底榖城山館集卷四
