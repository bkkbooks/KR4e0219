body:
  text: 穀城山館集卷二明于慎行撰五言古詩敘曰余為五言古風好學魏晉非其質也夫魏晉之於五言豈非神化學之則迂矣何者意象空洞朴而不敢雕軌塗整嚴制而不敢騁少則難變多則易窮古所謂鸚鵡語不過數聲爾原本性靈極命物態洪纎明滅畢究精韞唐果無五言古哉余既知其解矣而不能舍魏晉者取其可以藏拙且適所便非能遂似之也海內賞真之士有以吾言為是者詩雖不視可矣感懷二十首皎皎天中月照我虛堂壁撫枕心不夷起視今何夕攝提指孟陬年嵗忽復易跳丸日夜馳迫迫將焉適烈士懷貞心夸毗營寸尺因時覽羣動感嘆無終極皚皚原上霜萋萋道傍草金石有銷鑠人生安可保大化為爐錘萬物何繳繞達士恥近圖所思在逺道榮瘁非有期修名苦不早焉能自結束坐向風塵老日出上東門桃李何灼灼回風中夜起嘉樹紛其落昔時五侯子寶馬黃金絡北里吹笙竽南鄰鐘磬作鬭雞出長楊挾彈過平樂光采照雲日意氣何軒霍高臺一旦平里巷飄飛藿不見東陵瓜近在青門郭迢迢泰山隅渺渺無行迹猿鳥夾路啼松桂百餘尺中有嘯歌士鳴琴卧泉石夕采山上薇朝吸松間液放情凌絳霄流目矚四極宴息藐無言中情多所適我欲往從之惜哉無羽翼薛公昔好士珠履羅高堂酒酣指白日各欲吐肝腸相印甫脫肘門前迹已荒魏其盛賓客田侯安敢望一綰大將組車馬盈路傍疏者為膠漆親者為參商朝暮市門改貴賤交情傷灌夫與馮子意氣何飛揚悠悠數千載此道久淪亡朔風凄以厲憭栗吹人衣玄雲起大陸雨雪何霏霏孤鴻號中夜百卉具已腓長恐堅氷至凜凜傷骨肌雞鳴感時物遊子駕言歸白日回青陽春草萋已緑遊子忽不樂沉吟聊躑躅躑躅將何為念彼東山麓澗壑生白雲岡巒蔭修木飛泉落絶壁璆然寫哀玉山水有至音安用徵絲竹長揖陌上人去來從所欲東出長安門倚馬息道周上有百年木下有萬古流華軒馳廣陌冠蓋如雲浮去者日以逺來者日以遒朱顔入朝市皓首將安求應侯朝上書蔡澤暮西遊榮枯在俯仰譬海浮水漚所以赤松徒屣脫萬户侯陟彼高臺上天風吹我裳顧見雙黃鵠浩浩摩空翔振翮翳若木矯翅凌扶桑羽翼豈不修其如天路長橫絶薄四海中道以倣徨如何燕雀羣追逐令人傷吾慕漢隂叟灌園聊避世搰搰自行汲不肯生機事掉首謝聖儒比之為技係混沌雖假修厥言良有味世人徒營營心勞自憔悴三年雕一葉為日已蹉跎木鳶徒跕跕不能出網羅天巧固已鑿於世亦何加大圓惟混混萬木生條柯工者力常少拙者力常多操斤代大匠傷手將如何登彼薊門道東望漁陽城漁陽秋草落萬里隂雲生鳴笳彌曠野虜騎何縱橫羽書東西馳刁斗日夜鳴一戰左賢遁再戰谷蠡驚白骨蔽榛莽落日空原平成功苟如此安得有吞聲十五㺯柔翰操業遊藝林縱志有遐覽頗見千古心委質事明主嵗月忽已深懷思敢不報所愧在浮沉悲歌覽青鏡長恐華髮侵大塊陶萬籟纎巨固殊音微尚在虛恬經世非所任俯仰感白日嘯吒誰能禁家本東海裔樵牧東山下先子秉儒術歌音追大雅一吏稍浮沉舉世無知者眇豫秉薄祜宛洛隨車馬丘隴日以遙松柏在原野風木無停音雨露凄其灑一為皋魚嘆零涕緣纓瀉昔我珠樹林熒熒照瓊島子仲工文詞竒氣何夭矯如何時不遇嵗宴空山道卞玉苟不開誰知為世寶傷彼蕙與蘭含芳揚緑藻嚴霜被空谷將欲同秋草用大世所難咄唶令人老習習澤中鳥斑斑五采質天寒遊石梁十步不得食一朝棲靈囿羽翰生顔色餐君玉山禾飲君丹霞液道旁有寒士感之長太息拂拭豈不懷人養非所適願因晨風發振我凌空翼大鵬運溟海舉翮觸四隅鷦鷯巢一枝棲息常有餘適志無小大窺化有盈虛昔日五侯里狐兔嘷其墟君平卜百錢常有終嵗儲老氏戒止足千古銘盤盂櫟社有大樹輪囷以樛棼下枝蔽牛馬上幹干青雲匠伯睨不顧終古絶斧斤翡翠巢南海何嘗慕世氛金丸落珍木惟以羽毛文膏火為誰銷蘭香徒自焚多材實身纍沉冥與道羣六籍既已逺揚馬不可作鉛刀為湛盧臘鼠稱周璞偉哉二三子將操郢匠鑿胡為崇亢厲亦復呈丹雘裂吻御寒葅飄帷奏清角信美非大觀矩裁焉所托雅道和且平治音安以樂不悲而噓唏皇風無乃薄黃帝遊赤水象罔得玄珠遇道皆如此安用圖與書奈何江左流所味在清虛六籍皆糟粕三墳為土苴得魚可忘筌無筌焉取魚譬人適莽浪倀倀將奚如悲哉道喪世一嘆徒愁豫古意十二首新知且莫歡生離且莫悲憂來無定端愁思當語誰夙昔同衾裯中心悵有違何况萬餘里欲以見容輝君行忽已久嵗月不相守浮雲蔽中天涼風吹户牖憂來不可宣浩嘆成疢首黽勉加餐食素心良不負春夜一何永置酒臨高堂賓從列四座廣樂奏東廂清歌激流羽琴瑟悲且良高張發促柱哀音不可詳沈吟欲何待酌醴不盈觴人生天地間辟彼隙駒光世路豈不懷坎壈多所傷乘時慎自保為歡殊未央名都開大道上有三重樓桂樹羅櫺牖飛泉鳴道周盈盈樓上女新粧麗且修當户彈鳴琴皓齒發清謳一彈幽蘭生再彈白雪流遊子在萬里邈焉無匹儔忽忽嵗云晏不知春與秋音稀和者寡顧念徒懷憂遊目送飛鴻淚下不可收漫漫秋夜長四壁涼風烈空庭流熠耀高樹號鶗鴂仰視玉繩垂衆星爛成列志士多悲心憂來不可絶俯仰念昔遊流睇雙龍闕同時有舊好高舉翔寥泬昔為雷與陳今為秦與越永懷平生心風塵非所閲麾手謝故人長當從此決迢迢百尺樓下俯長安道上有狹邪人玉顔一何姣當户理琴歌沉漢悲清曉本以倚門姿委心結宴好良人逝不歸憂傷難獨老顧匪姬與薑悠悠亦何保湛湛江湘址蕭蕭芳樹林褰華思有贈馨香盈我襟美人渺千里欲致無依因江寒風已厲曠望愁人心且復置懷袖聊以襞錦衾瞻彼泰山岑厥有孤生竹冉冉捎雲霓亭亭上巖谷凄凄嵗欲寒盈盈華色緑涼風振層阿音響如哀玉高節抱貞心可折不可曲顧見女蘿枝綢繆附喬木天霜降嚴威零落成朴􅈪所以君子心邈然自結束我行秋江曲覩彼蕙與蘭紫莖發緑葉秀色若可餐芳馨隨風轉郁烈不能干采采不盈掬思以遺所歡所歡在天杪道路阻且難棄置委空谷將隨百卉殘佩幃豈不充無乃蒯與菅蘭芳非有待所佩誠足嘆驅車東城道言陟崇山阿茫茫顧四野萬木更條柯薄雲出巖岫緑水生微波四時更代謝寒暑遞相過日月化顔容華髮亦已多修名苦不早秉燭嗟蹉跎覽鏡念平生浩嘆將如何暮秋多悲風玄霜凝大澤駕言出行遊遊彼重城北道旁何代丘鬱鬱松與柏上有千里塗下有萬古宅不知王與侯狐兔多遺迹人生匪金石地上長如客新故遞相尋神巧不能測傷彼道旁子矯性何迫隘寵利既內營榮名多外飾交戰汩衷和鬒髮日夜白胡不放情志逍遙以永夕猗頓慕營殖日夜謀錢刀大貴多所傷空令意氣豪鼎鼎百年內辟海流風濤憂煎伐天性此生無已勞所以古達士四海捐鴻毛安能為物役長使心忉忉仙人羡門子邈矣非吾曹涼風戒秋節嵗事聿已暮蟋蟀吟前除玄雁號空度委心懷所思邈望關山路卒嵗念無衣為織機中素沉憂結夢魂嬿婉如相遇離合在須臾撫枕不知處良晤不可追佳期多所誤引領望明月悲啼知天曙館課初入翰林自述初日照高樹內苑歸新涼苑中有芳桂清芬聞我堂連雲步七閣緑簡何焜煌蟲書錯綺繡緗帙紛琳琅對此倚長嘆置卷發慨慷念本榆枋翼早㺯瓊琚章迥心托千古大雅規翺翔熙哉覯皇聖文化浹埏荒眷言闢九畹樹此椒蘭芳菉葹恧嘉植偃蹇充其傍離離豈不玩所需紉幃囊素修苟不植何以答虞黃大猷渺玄漠抽緒開微茫先民有高矩祗奉思皇皇願將襪線微裁君雲錦裳願以徑寸輝垂君珩與璜良時不可失榮名不可忘勉哉惜居諸皇圖鞏未央館課代此日不再得秋夜一何永北斗橫西樓客子不能寐攬衣起行遊俯視清水波到海無停流仰觀明月光四五忽如鉤驚風飄白駒嵗事聿已遒夸夫逐榮寵日夜將焉求志士營世業常懷千嵗憂鷦鷯搶榆枋鴻鵠摩天遊托心各有謂誰能識所由大禹古賢聖寸隂矢逺謀千載諒吾師努力追芳猶不然日月邁老大將安尤慎旃懷令圖勿為達士羞館課代迢迢牽牛星漫漫銀漢流耿耿橫天路盈盈河畔女燦燦臨長渡軋軋㺯金梭颯颯鳴如訴展轉不成章躑躅倚誰顧睆彼牽牛星負軛何遲暮舊歡諒已陳新約期難遇脈脈恨河梁悠悠不得度攬佩坐徘徊涕泗紛交鶩館課雪夜講莊義寒風吹朔雪霏霏日云暮廣庭列瑶階空林挺瓊樹有偉高堂上宗工陳矩度摳衣侍絳帷懸河啓諄諭大道既具陳玄史亦紛騖載闡南華篇探彼環中趣卓哉漆園吏齊論歸逍遙葆光守天府泰宇懸高標乘元御六氣九萬恣扶搖解牛悵四顧夢蝶紛飄颻大知一萬物衆籟空調刁太息至人逺夢覺何寥寥蟪蛄與彭祖物化競一朝指馬得真詮心鬭聿云消歸去夜未艾三尺方瀌瀌噓嗒不得寐隱几坐蕭條閣試抵璧捐珠趙氏有良璧連城不可索抱之會澠池鼓瑟聲何迫魏侯得明珠徑寸餘光澤照彼轔轔車不阻函關軛哲王固有貴所貴非瑰竒請觀垂裳后帝則昭良規四表諒已格列辟咸師師猶惇玩物警惕若興遐思曄曄結緑珍丸石投空谷輝輝明月光湮潭委魚目豈不懷至寶懷寶傾天祿宫中徑寸珠可易千人粟宫中盈尺璧可築千家屋珠飢不可食毋自枵民腹玉寒不可衣無袴歌聲蹙所以唐虞理光華燭海隩淡然寶無為茅茨坐穆穆館課觀蘭亭修禊圖嘉辰屬元已遲晷流芳年邈思東堂會遐想華林篇忽披曲水圖幅素渺綿連茂林蔚翠嶺華薄被芳田紫燕翔且嬉丹英婉欲然斐雲蔭修竹飛觀開瓊筵澄澄緑水波縈曲流其前遊娛有嘉客冠服何翩翩朱軒解蘭臯羅坐臨回川金巵乘波進素俎激流還或沉翠綸沒比目驚重淵或攬緑藻柯擊棹浮青蓮緩帶既覆爵或藉百卉眠亦或扼素腕握管揮雲箋中懷多慷慨意態何蹁躚將無瑤池侣夕飲崑崙天亦云山隂會祓禊徵羣賢風流逈千古遺想托雲煙至今蘭亭下曲水流潺潺代作白頭吟此唐體也不列樂府蔚彼高樹林上有雙鳴禽請君罷歡宴聽妾白頭吟兒時同里居追逐亭臺下妾㺯青絲繩郎騎碧竹馬十六始嫁君花靨垂兩鬟宛轉郎左右何時不可憐妾意尚疑新郎心忽已舊不是故情疏自是新恩厚玉臺對明鏡紅顔未應老炎天棄團扇涼風何太早君如雲中雁妾如枝上花雁飛自有處花落向誰家戚戚復戚戚世事不可必但恨識君初兩心望如一含情欲誰語攬涕背人流君心如明月不照妾心愁道逢故家人寄書豫父母嫁女事貴人不如田家婦田家雖苦辛白頭長相守晉陽男子行隆慶己已太原丈夫化為女子歌以識之太原有男子壯烈世所無身長九尺餘白晳好眉須自負良家子募作材官徒腰中轆轤劍橫擊當路衢并州惡少年見之伏且趨一朝覽青鏡侘傺空堂隅三日不出户忽然見彼姝綽綽夫容顔盈盈玉雪膚蛾眉娟且長高髻墮馬梳脫我金鎖甲繫我繡羅襦挂我白貂帽珥我明月珠委心懷嬿婉不惜健兒軀昔為雲中鵠今為水上鳧昔者一何厲常關十石弧今者何柔曼巧笑傾城都仰視浮雲馳變化不須臾茫茫窺元運玄黃無乃渝世人但云好不必稱丈夫寄趙少虛先生四首空谷有佳人素質明秋霜凌風拾翠羽皎皎雙明璫負薪日慘廪怨此江路長紅顔委中野三嘆以倣徨傾城難可再一顧何茫茫念此不得寐嘯吒令心傷岱宗海上來西蹴千峯倒虎岫何崔嵬倬彼空城道下有嘯歌客翛然淡懷抱十年不下堂腐心著玄草藻翰縱橫流百家如電掃如何鮮良覿落落荒山老青蔥松柏顔敷華不在早君其愛景光修名以為寶親交匪一日先子同衣禱渺質亦何知忘年接勝遊別君殊未久忽復成三秋嵗月何其迅道路阻且周尺素逺方來慰我心煩憂一讀再三嘆屣履下重樓玄霜彌大野神物蟠深湫我心匪不念悢悢無輕舟青鳥雲中翔遺我尺錦翰卷中有新賦麗若金琅玕華藻耀朝日悲嘯曽雲端俯身視陳宋昻首接建安大雅久寥廓文章忽欲殫夫子駝高駕啾啾鳴玉鑾舉世徒徊徨焉知若所觀景行不可得寤寐坐長嘆夜發楊栁青望天津海口夕泊大隄口雨氣侵肌骨舟子不得停鳴槳中夜發聞道海門近驚栗不敢越漁燈隱遙浦簫鼓聲未歇人語煙中村舟橫沙上月岸接逺流平樹入回波沒不覩潮漲竒安知溟渤濶喔喔天雞鳴東望蒼煙裂霞生赤城嶠日出扶桑窟朧朧五雲裏欲吐金銀闕鐘鼓羅宫廷百辟修朝謁整衣顧我僕神情坐超忽送朱可大南還三首驅車漁陽坂四野何蒼蒼我友駕言邁去去天一方踟蹰一斗酒相送渡河梁豈無絃歌曲可以佐杯觴仰視浮雲馳蒼白忽相望黃鵠一為別悲鳴聲正長何况同心子當為參與商人生如浮梗良會安可常俯仰感平生豈不結中腸願為雙飛翼送子以翺翔相思鬱以紆我懷多苦辛苦辛將何道念此平生親總角從君遊奄忽二十春嵗月一何迫白日如颷塵恩深不可報情至日以新兩心托金石何乃慕雷陳風波一相失怨彼江路津日長苦道逺繾綣竟不申豈無里巷遊邈若胡與秦久要苟不替燕越如比鄰何必岐路側空為兒女仁步出燕東門海月聿已曉班馬蕭蕭鳴流猋來逺道江湖深且長南望令人老感彼荆卿徒烈風世所少懷恩不返顧長虹日中縞平原三千士風期一旦掃咄嗟世上兒論交何草草願持嵗寒心皓首長相保東海有貞婦為馮太安人賦東海有貞婦烈志青雲齊本家遼水上逺嫁海門西夫君璠璵器射䇿黃金墀伯氏籍天府兩叔印纍纍何意蒼梧雲飄飄不復返日落湘水深淚向南天逺程嬰存趙祀磊磊萬古聲徒死亦何為雪涕出瑶京故家千里道鬱悒令人老不作逐風萍寧為負霜草秋閨素機冷露夜青燈微生兒不識父泣盡負兒衣雪中千仞松嵗事聿已寒其下無俗植所植桂與蘭蘭苕何青青桂華自成樹上有一翠鳥飛向天門去陳書叫九關一讀一潺湲此事不可道酸辛感聖顔錦函天上來吹落五雲表霓衣何鮮澤鳯吹轉綿􅥞兒跪長歎息願母加餐食日月有虧盈榮名不可極送太常賈卿册封親藩北斗挂城闕河漢東南流我友悵明發駕言逺行逰玉節耀橫軛黃金飾馬頭悠悠涉河濟去去登舊丘前驅二千石逢迎王與侯念子何當返寒暑聿云周河梁臨往路顧念今人憂有酒不滿觴為我且復留匪無陌上交其如道不謀眷言在同志何以喻綢繆書吳門韓封君友蘭卷二首南國有逸叟蜚遁吳山阿畏榮避軒冕韜景耽雲蘿誰結同心契攬此秋蘭柯契合在空谷紉佩交如何月出鼓鳴琴一奏郢人歌彼美握香子南陔詠方多蘭苕何猗猗結根在秋坂皓露夕以零靡迤風自逺幽人秉沖尚眷言樹九畹匪資服媚榮將以華嵗晚生不當門户餘香流茂苑鬱彼背堂萱相對方婉婉持此永年夀願言加餐飯春日過李宛平于美春風歷皇邑宫草萋其緑良辰感客心行遊北城曲有美懷紱人卧閣方避俗開尊華軒夕延我酌􅌬醁散帙有餘覽瑩情無近矚縱橫今古談日宴未云足嘉會匪有期深衷一何篤眷兹一笑歡宿心諧所欲相彼雙闕間塗軌多局促道旁磬折子胡為自結束蘭香匪為人鵠白不日浴泠然物外賞願言偕芳躅書楚劉封君鄉賢卷昔有灌園者忘機不忘力邈彼鹿門人躬耕不可即此風一以渺韋素多雕飾皇皇俯仰謀日夜靡知息何哉楚江父身隱名獨植入敦仁孝模出為里閈式不惜千金裝而將一諾亟中堂樹蘭桂芳颷聞四域生不學宫遊沒從學宫食諸生奉巵豆長吏匡且敇貴賤等隙塵尸祝無終極同時圭紱兒名氏誰復識送朱金庭李棠軒二太史奉使册封聖朝睦藩服策命臨侯王近臣發皇邑于役天一方行行日以迫相送上河梁清葭戾中野班馬鳴路旁逺望長風起夕雨下沾裳樂飲未及釂僕御已嚴裝征人懷逺路遊子望故鄉停舟問滄海驅馬過涇陽君如雙黃鵠各自東西翔我如晨明月望彼參與商托交固金石別促會當長願言整夙駕覽風陳國章送于子沖上澤州太守二首涼秋聿云暮烈風飄人衣念子逺行邁整駕出郊畿倣徨以中夜起視明星微出祖城南隅握手不能歸孤鴻號中野木葉縱橫飛聚散一如此素心亦已違惟有雙魚札慰我長渴飢古者不可作交道久茫茫念我二三子總角共翺翔歡衷如日月別思苦參商五馬向路馳俯仰情內傷問子今何適驅車陟太行曲坂造雲日溪谷深且長人情多嶮巇世路固難量勉哉懷令德叱馭有遺芳送趙瀫陽殿讀上廣東憲副凜凜嵗事寒重雲蔽城闕遊子欲何之驅車適南越南越萬餘里江深安可涉鳶墮五溪雲猿號修嶺月耿耿烈士顔世路無工拙况握黃金章名在諸侯列我皇眷邇臣賜環不賜玦惟是同心人歡情中道缺踟蹰在廣路悢悢不能訣砥如水中石皎如山上雪直道諒已難憂心未云掇吾將從此辭長歌棲林樾題雲間林諫議重夀卷雲間有逸叟德聲穆若蘭緬昔諧良覯登堂揖鶡冠肌膚瑩玉雲兩頰渥如丹大飲呼五白清夜不知闌一往謝朝市戢景吳江湍涉海掇瑶草臨流倚翠竿借問此何為言奉北堂歡北堂有夀母百嵗以盤桓晨羞沆瀣滓夕進雕胡盤老人為兒啼七十戲堂端殊事聞逺近眇然使我嘆魚翼不可並純祜世所難况復青雲客為時麟與鸞兩世有寵命服之吉且安飄飄千餘嵗娛樂未云殫雜詩八首蔚彼蒿下田中有雙黃爵五步逢一飲十步逢一啄仰見鴻鵠遊六翮翔寥廓豈不願從之道逺將安托天寒多野風四面張罦絡蘇合作彈丸歷歷空中落鼎俎苟不干蒿下亦已樂陟彼高臺上四顧臨郊畿下有清冷水寒流日夜微何來孤鳴鴈嘯匹空中飛天風一以厲烈烈吹毛衣稻梁既不慕葭菼亦已稀茫茫在中野日暮將安歸我欲負爾去惜哉羽翼違長吟望雲漢祗使心勞悲巫山不為高湘水不為深結交寧在廣所貴相知心朝雲既暗靄暮雨復涔淫頃刻更變化安知陽與隂交情苟如此世軌良嶇嶔將邀羡門子天路相追尋北登遼陽城顧望三韓道大海何蕭條白骨橫野草下充蛟魚食上使烏鳶飽傷哉十萬師大半塗肝腦粟米量如沙金帛積成島功名誠可為封疆在自保閉關謝逺人良圖胡不考所思在何許在彼沅與湘何以問遺之解此雙明璫葺蘭結菌桂室宇何芬香佳人殊不至望望天南方煙波弄白日容與凌風翔江空嵗云晏零露成朝霜不忍棄所寶且復自倣徨端居有餘玩思逺徒勞傷延陵有長劍寶若千金璧閉匣泣風雨開匣干星日駿馬與名都羅列終不易服之適異土見謂鉛刀質徐君亦何為神襟獨爾識欲色在不言心許成莫逆如何歷聘歸墓門已有棘含意竟未伸涕下空沾臆宰木集晨風可以懸三尺寸心苟不渝是物何足惜驅馬去郊原棄置如遺迹賢哉貴公子交情固金石咄彼市門徒景行宜自惕名都有士女居在城南端前庭樹桐梓後閣羅苕蘭齊紈為上襦魯縞為中單援琴理清曲惠聲穆且間惜哉嵗不與憔悴空江湍芳華一以謝烈心不可干蹇修為誰使遺我雙瑜環朱衣從千騎寧可一為歡聞此竊自嘆立身誠獨難貴亦各有慕賤亦各有安豈伊霜雪質能睎桃李顔斂襟謝媒氏自下重門關神龍時未遇蠖略蟠深淵不有浮雲藉何由潤八埏鵾鵬隨海運一徙隂重玄扶搖非有負羽翮安能旋逺臣必有主邇臣必有先商君因景監五羖介穆賢內資富強業外秉侯王權功名豈不偉烈士無稱焉行藏制在已升沉制在天寸尺既可枉尋丈寧無愆所以魯連子抗志青冥間隻矢三軍解單辭六國全萬鍾苟不欲屣脫如浮煙諒哉天下士疇克與比肩榖城山館集卷二
