body:
  text: 穀城山館集卷二十明于慎行撰賦附叙曰班氏有言賦者古詩之流也蓋云雅頌不作流而為騷賦爾五言既兆又賦之流而為詩去古逺矣然自屈宋以下所謂古賦者猶有雅頌之遺若二京三都則辭類紀述江左六朝則體淪俳偶於詩道益遼然哉豫兄無妄好擬楚騷豫雅慕之久涉風塵曽無暇晷竟不能為也徒從應酬搦筆間作俳賦於古無當焉為其列于六義稍存二三聊以附詩體云爾閣試經筵賦皇帝嗣基御宇奉一德協三靈建元極合天中掃地肅乎泰畤圜橋穆於澤宫祕軒弧於武庫櫜舜戚於空同玉馬金牛表清明之景瑞龍庭蛟窟沾覆露之鴻功既已恢神聖之大統鬯三五之遐風而猶冥搜乎乾乾翼翼勤思乎赫赫明明凝神九主之戒遊心六代之英乃詔司存敦掌故搜衢室之遺文究石渠之矩度趾二祖之遺謨踵七宗之舊步髙駝禮法之場遐獵皇王之路探蓬觀之丹鉛發藝臺之湘素儒衣禮席列內殿之九賔玉檢芝函考西京之四部爰昧爽而負屏蓋大昕而展輅爾乃九衢霧斂雙闕霞光萬國㑹塗山之玉百靈拱軒后之堂翊旗旌於殿陛鏗鐘鼓於巖廊望中天之廣座方晬穆以垂裳爰慨焉而四顧思問道乎總章遂乃轉金根響雲蹕導容容之羽旗啓森森之枑梐徑㑹極之通門憩文華之奧室瑤芳布乎蘭戺明月輝乎椒壁伊雕几之前陳覩黻扆之中出尚衣陳席司儀贊揖元公秉圭徹侯奉璧四輔雍雍六官秩秩或左侍中之貂或前期門之㦸或聳柱後之冠或珥螭頭之筆劍珮陸離冕裳舄奕莫不鵠立廣庭屬耳乎前王之迹於是惇誨之傅博碩之儒出夔龍之髙列懷旦說之良謨振褒衣而徐進步方履而前趨瞻青蒲而拜手委玉珮之瓊琚環鳯掖鰲扉之彥奉赤文緑字之圖松槧芳乎帙氣柏燻起乎文厨於是石函微展錦帙輕舒核𤣥𤣥之妙義闡洋洋之聖謨帝驟王馳六藝之文郁若周情孔思一統之義昭如若乃授簡載筆之紀連雲委閣之儲或亹亹小心而鴻名無斁或涓涓不塞而狂瀾競徂羌從容而抽衍期警戒於無虞於是天子超然𤣥覽朗然遐覩𡨕探五際濳游三古傾道藝之芳華憩文章之林府喟上聖之遐風想哲王之髙矩抵舜壁於窮巖投隨珠於奧浦朝懸告善之軺門設乞言之鼓焫六符於泰階晰八埏於庭戶爾來命中使戒大官釃桂醑出椒盤元公授几羣辟登筵晞湛露而鴻恩溥奏鈞天而廣樂歡跨金華於往籙輾白虎於前編願緝熙之無斁保隆稱乎萬年重曰於昭維皇崇至德兮巨典煌煌猷孔赫兮措軌堯階躋舜室兮吹萬亭毒建皇極兮聿駿有聲與天無息兮魯藩三瑞承恩賦維魯建邦傳阼九葉誕啓哲王昭假前烈誦聲洋洋國容有曄乃奉天書載修璇闕考閟宫之鴻圖踵靈光之巨轍庶民子來百工歡悅九成之構方新百順之徴咸浹於是申白侍前浮丘在列胥陳瑞應之圖競檢含嘉之篋王乃召列大夫而問曰維殿之基為磩為皇有産維物厥狀未詳如龍如馬非圓非方九莖煒煒三秀煌煌色苞金翠質有沃光此何物也大夫對曰此芝草也記曰王者慈仁有道則芝草殖服之延年與真人息故漢武帝以甘泉興歌黃軒以齊房紀迹其為君王獻壽瑞乎王曰唯唯否否寡人何敢當此眉壽萬年䕃及九族敢為天子一祝異日又召列大夫而問曰維苑之隙厥有腴菑禾易長畝頴栗標奇殊穗協莖同本三岐其秀纍纍其實離離有邰之所不藝田畯之所不知此何種也對曰此嘉禾也記曰王者德下至地則嘉禾生厥為五穀之長璇星之精故異畝書於周典六穗長於漢庭其為君王獻富瑞乎王曰唯唯否否寡人何敢當此嘉穀順成兆民用康敢為天子再祝異日又召列大夫而問曰先王之宫列松在庭有幹輪囷枝亦縱橫眷曲綿冪結而成形外密如綺內疏如籠仰而窺之狀如飛蓬又何植也對曰此謂松巢松者百木之長冬夏青青上集鸞鳯下栖仙靈枝枝相值葉葉相繩故曰如松茂矣無不爾或承其為君王獻傳世之瑞乎王曰唯唯否否寡人愈不敢當本支百世宜君宜王敢為天子三祝於是采風之官陳詩之史延諸士民聞於天子曰惟王孝友之誼表於宗姻恭儉之澤孚於國人傾身下士㢮帑振貧恪修侯度以贊皇仁宜有褒勞用𢎞德音帝曰俞哉􅓪諸禮臣乃錫命曰叔父茂昭厥德以蕃屏余一人余一人實嘉饗之其遣內史以璽書幣玉往勞叔父尚永終厥譽用撫我東土時則有郡邑師帥宗室長年諸生庶士濟濟翩翩造王宫而賀焉兕觥載㪺雕爼升筵無小無大拜手於前乃歌曰瑞芝兮熒熒含輝兮揚榮金柯兮九華翠蓋兮六英出銅池兮表瑞秀瓊􅜲兮長生荃服之兮宜年荷寵命兮千齡又歌曰嘉禾兮翼翼偕秀兮偕實和風兮披靡寶露兮滋液紀北里兮兆祥産崑丘兮服食降康兮有年佐我皇兮無斁又歌曰惟鳯有巢兮蒼蒼者松繁枝繚繞兮密葉蘢蓯上為偃蓋兮下有游龍取之徂徠兮封之岱宗翊本支兮萬世流苗裔兮無窮王乃遍揖宗室吏民而謝曰以不穀之無似徼有天靈受帝嘉祉父兄士庶賁豫小子敢不夙夜以光圖史乃命藏室著之麟紀栩栩園賦有序御史中丞尹公家於漢上厥有十畝之樊命曰栩栩蓋志適也榖城居士聞而羡之為賦以紀焉其辭曰漢隂主人遊神藝苑棲志𤣥蹤狹塵遊於紱冕馳逸軌於雲松覽辟疆之素業慕公理之提封將以偶平泉於哲相匹獨樂於人宗乃卜於湖洲之壤而闢是園也其始剃丘榛翦柞棫脉奧衍圭曲直偭雲岑之綿邈瞰平臯之茂碩繚大隄以象環疏清渠以帶璧搆文杏之駢梁拍芳椒之邃室固已嗤金谷之豪奢笑玉津之汰逸爾乃葺以蕙茝擷以菅茅不黝不堊匪琢匪雕髙軒博敞傑觀岧嶤亭參差以星置臺蹇産以雲標鏡虛池以映牖衡曲徑以通橋納浮雲而翠棟借旭日以丹寮莫不謝炎蒸於溽暑屏雪霰於寒宵于是瑤草盈除琳華被屋裛露繽紛從風淑郁熒曄兮崇蘭檀欒兮修竹或含景兮披香或凌寒兮振緑畦沅芷之猗靡畹江蘺之陸縟山霞影而成文溪雨零而如沐則有荷蕖菱芡蕰藻菰蔣泛紅葩之狎獵翹緑葉之芬芳朱鱗浮而散綺皓鶴翥以飛霜惠氣沈兮秋水淡夕隂起兮虛館凉又有文梓長楊髙梧翠竹松落落以停雲楓森森以翳日梢橘柚之葳蕤拂栟櫚之茂密淮山之桂樹凝丹秦洞之桃華耀碧莫不槭墜葉於秋隄煦初條於春陌乃陟曽丘裴回騁望左右殊姿俯仰異狀其前則岷峨别𣲖嶓冢支河滔滔駭浪渺渺澄波韻鳴榔之夕響聆采芰之晨歌隱帆檣於逺樹集網罟於烟莎斜睨舊宅遙倚崇阿畫閣之隂迢遞朱槐之影婆娑楫分流而送酒門隔水以鳴珂既避喧於闤闠亦選勝於江沱其後則積水漩澴明湖漫涆日月之所沈涵煙雲之所沃灌值閌閬而浮天觸堆崎而激電水禽喋唼以􅀈襂崇荻簫篸而萰蒨遊落日之黿鼉呌寒蕪之鵠雁固將混江漢以朝宗絡荆巴而表觀者也夫其遐探臣澤逺眺雄都瀹以洞庭之野苞以雲夢之區逆黃牛而上峽連青草以成湖子虛之所著賦三閭之所卜居有不扈下游而襟帶略上界以縈紆者與主人於是偃仰髙栖周回𤣥晏陳圖史於匡牀列琴尊於奧館鳴鑾廣莫之區縱緤清虛之苑既欲去而思留每懷歸而恨逺乃援夫蝶夢之嘉名以躅彼漆園之舊簡聊弭興於林臯尚圖芳於琬琰客謂主人曰先生之志深矣夫心無兩在物不兼存故理得者迹逺形略者神尊先生方擁旄方夏緤組金門沛濟川之舟楫邅稅鞅之丘樊乃僴然結遙思於薜荔標遐想於蘭蓀得無待神遊以適願甘夢境以怡魂者與主人曰唯唯否否夫道探罔象德黜雄成物無適而不愜心有寄其必盈彼莊之寓言夢亦覺也而不可以覺遇吾之真境覺亦夢也而不可以夢徴方吾之遊是園而忘其在園也栩栩焉爾矣及吾之去是園而忘其不在園也栩栩焉爾矣千里可周俯仰咫尺可謝將迎何覺何夢何隱何形而子乃嘐嘐於真幻之際亦淺於幾而陋於情者與詞既都閒意復夷晏陳圖抽管續而為亂亂曰緬彼中園介漢沱兮搴蘭樹蕙藝女蘿兮我行日逺歲蹉跎兮愛而不見謠且歌兮匪覺匪夢神栩栩兮萬物熙熙遊吾宇兮無有邇遐遺出處兮縱心逍遙其則侣兮菊齊賦為習封君作有序菊齊先生者廬陵隱君子也懷才砥行髙蹈丘園有鹿門㑹稽之風焉號菊蓋其志也行從厥孫太史君遊慕先生之清風作菊齊賦其辭曰相士林以𤣥覽偉南國之逸民性狷潔而遺世志俶儻而絶塵羌抱璞而不試翳握瑜而自珍既髙挹乎物表乃稅駕於𤣥津搆閒宇以遊志借瑤圃以為鄰約芳蓀於四壁䕃椒桂而成林爛羣芳之所處班陸離而彬彬桃春華而夙謝槿朝榮而暮湮何靡麗之不有匪豫𠂻之所欽偉嘉樹之秋茂挺孤英以自陳亶歲寒而不改信幽香之可親諒素心之所託遂名齊以自倫爾其為植也標蒼震以葳蕤稟金商而肅穆青柯布以四延密幄森以上矗葉萋萋而猗靡藻英英而耀燭曄乎束於雕䦨淒其施於寒谷淹白露而彌榮泫清霜而逾緑爛朱華之若錦倚素容之如玉振翠袖而凌風躍金英而奪目紛雲布而星羅狀斕斑而馥郁芳菲菲而襲人態娟娟而可掬華不露而已章情有鍾而更蓄士窮巷之淒清女空閨之幽獨恥雜植之繽紛賤羣穠之朴簌寧後時而見珍豈爭妍以自鬻掩芙蕖於江澤躒桂華於修陸芬菲舊列於騷經味貌復標於仙籙覽百卉之雜糅孰可齊乎此菊若乃虛亭爽塏間館重深降霜庭之藹藹升簷月之沈沈號孤鴻於漢表吟蟋蟀於堂隂慨羣芳之零落慘萬木之蕭森罷歌鐘於北里靜絲竹於南鄰何寒英之蒨粲塊獨立乎秋林璨明粧之映日宛靚質之驚人佩綺組之灼爍翥鸞鶴之繽紛主人於斯時也感年歲之將暮羡芳華之自新襲寒香以飾性覽孤植以怡心倚東籬而清嘯步三徑而長吟或酌兕觥或橫玉琴醉流霞而矯首鼓清商而整襟招碩人於槃澗謝俗駕於塵芬擢柔條之荏苒餐落英之苦辛興飄飄而彌逺思耿耿而難禁弔湘纍於澤畔呼陶令於江潯諒千古而同駕匪斯世之所忱爾乃故業空存幽人長往流冉冉之餘香戢泠泠之絶響鶴步砌而裴回猿嘯庭而惝恍竹團欒而自修桂蘢蓯而日長䕃蘭苕於虛堂挂松蘿於舊幌蓋華林落而成墟金谷銷而為莽嗟富貴之如雲豈浮沈之可彊胡一卉之芬芳與一楹之軒敞澤踰世而彌深德歷年而逾朗企楚澤而流嘆望江臯而結想托赤管以宣衷孰豫言之有爽劍泉賦壽黃封君有序吳門黃君道登以萬厯甲戌舉南宫髙第大人劍泉先生六十春秋母錢夫人年與之齊蓋道登欲豫有言也嗟夫先生夫人之壽道登所自致豫言亦奚足哉嘗聞吳之良工名曰干將與其妻莫邪不愛髮爪為王造劍劍成因以名焉今吾道登華藻頴脫雄鋩曜世即太阿龍泉不足儷矣而先生之居適在鑄劍之所輒因以自號倘亦有良冶之志否耶夫莫邪干將吳之鄙人也而聲浹於後世其所鑄者然也先生夫人栖光巖藪之中匿迹衡茅之下而有休問于世則不以道登哉此其為親增榮長算也無有涯矣作劍泉賦其辭曰昔者吳后之承基也佩神器以開疆固欲鍛齊代而為鍔指晉鄭而埀鋩淬長洲之泱漭鼓溟海之汪洋召神工於域內懿夫莫邪與干將何靈𠂻之巧妙歘陶鑄乎隂陽其始作也赤堇開耶溪涸六氣飛灰三光扇爍蛟龍捧爐飛亷鼓槖太乙感其精誠天帝通其制作百神拭目而下觀玉女窺窗而眙􅌓厯百鍊以成文覩三尺之錯落爾其為狀也沈沈爚爚似芙蓉出水冒江壖炯炯熒熒似列星成行羅逺天漫漫兮秋塘之溢煌煌兮朝旭之懸鐔陸離而電燁鍔閃爍而霞鮮切白玉而泥解刜金鍾而騞然鵠雁回翔於漢渚虬螭俯首於重淵走𤣥犀於宿莽泣罔兩於林烟器因人而擅美人以器而永傳於是純鈎藏鍔魚腸祕彩風胡嬌舌而沮喪歐冶盱衡而摧悔蔑分景於周年陋含光於殷載晉射斗而氣升漢剖蛇而厯改斯蓋振古之雕奇寄休稱而如在者也爾乃鶴飛吳市鹿去蘇臺鑄劍之城尚在躍龍之水空回則有𤣥首逸人齊眉淑相仰龎公之淳修企梁生之髙亮韜景曜於泉阿掩重輝於海上既卜地而幽棲遂假名而標尚甘雌伏於長林想雄飛於哲匠豈不以神用而無方者通人之令圖命物而不宰者上士之𢎞模遂假龍淵之契思𢎞燕翼之謨鼓道德以為槖建詩禮以為爐鍛鍊以發其藻磨礱以厲其隅帶連城之文玉佩明月之流珠價賤千金之駿名傾萬戶之都於是紫氣射天白光略地鳴玉匣而充庭躍金爐而瑞世張華識之於乾文薛燭標之於利器駭化龍以髙驤藉割雞而自試固將决浮雲而上征倚長天而旁晰矣豈非上善之濬源而神光之永利者哉重曰鑄劍者金為世珍兮鑄人者德德通神兮彼美伉儷儀古人兮泉之洋洋以葆真兮厥名不泯壽無垠兮雙壽堂賦為劉畏所侍御作有序廬陵有劉明齊先生者博雅慕古之儒也冡嗣侍御君臺奉其訓成以行業顯而先生伉儷偕壽同荷褒封諸好侍御者皆為文壽焉侍御出按遼左以其帙觀于生乃作賦曰蓋觀夫三楚之南陬也亶風氣之所交帶文江之旁濞䕃廬嶽之岧嶤英俊紛其奇挺冠裳燁以盈朝何山澤之逸士修然托於林臯爾其早握遺編晚棲雲壑比氣冲虛遊神恬漠恨洙泗之不傳想巢由之可作悟朝舜之虛華慕冥鴻之寥廓奏流水而淒清據槁梧而寂寞始揮麈而登壇竟鑿壞而遁爵乃有華閨淑媛女史名流遐綜古訓夙禀芳猷采緑蘋於江浦和瑤瑟於河洲躡雞鳴之舊範踵鹿挽之遺休逐龎公而髙舉侣梁生而逺遊浦淡淡而生珠山嶔巖而剖玉流光蜿蟺於靈蛇縟彩晶熒於結緑方馳藝苑之聲遂籍金閨之録掞麗藻而驚人播髙風而絶俗希攬轡於往圖倣埋輪於前籙理何隱而不彰德無幽而不矚爾乃承恩帝苑渙寵天宫褒荀公之舊德訪孟母之休風錫鳯翥鸞回之錦降金泥玉檢之封冠切雲之岌岌佩明月之泠泠於是鵠髮同班鶴姿並耀飯芝术以延年掬烟霞而寄傲驂兩鳯於瑶臺馭雙龍於華嶠玩萱菊之幽芳契松筠之晚操則有東海羡門躡青霓佩明月總姑射之羣仙降瑤宫而下紫闕亦有西山金母飄翠蓋駕雲車梯丹丘而航弱水折閬苑之瑶華鳴玉管之啁啾兮班陸離而下之授以仙臺之籙右以長春之辭歌曰碧海兮茫茫三神山兮日正長螭驂兮虬馭仙之人兮虎豹裳騎日月兮嬉遊千秋歲兮長翺翔又歌曰日旭兮扶桑雙玉樹兮琳琅桂生兮在戶蘭青青兮滿堂折若木兮翳日千秋嵗兮長芬芳亂曰邈哉伊人聞至道兮含醇抱一游物表兮磊磊者𦙍天下寶兮受天之祜以難老兮穀城山館集卷二十
