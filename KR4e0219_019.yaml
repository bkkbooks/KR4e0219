body:
  text: 穀城山館集卷十九明于慎行撰七言長律館課燈市八韻燕市風光傍帝臺上元燈火欲重開五城繡箔連雲起九陌笙歌動地來翡翠粧成花下翥芙蓉擎出日邊栽雕鞍馬上迷芳草錦瑟樓中醉落梅遙見銀花隨月合不教玉漏逐人催九天乍轉迎春仗三殿行傳上壽杯豹髓鸞膏渾費盡看調玉燭詠明哉送王對南太史奉使蜀藩册封十韻持節蘭臺著作郎緋衣朝下出明光千秋茅土傳新渥三晉雲山識舊鄉馬度宜春花似雨雞鳴函谷月如霜雄圖百二蟬聲裏棧閣三千鳥道傍負弩奔趨巴郡吏開函拜舞漢親王錦官城入空江斷玉壘霞連太白長載酒能過揚子宅浣花試訪杜陵莊朱門旭日當筵醉碧草輕煙滿路香一鶴只今天外去雙魚可遣歲前將離心不盡青驪逺渺渺平蕪對夕陽六言絶句夏日村居四十二首檻外千山過雨階前獨樹含風座對山光曉暮牀隨樹影西東地僻炎天不暑心空小閣常寬隱几山當睥睨鈎簾月上闌干乞竹多煩問訊栽花每費平章亦自開成三徑相過惜少求羊雲裏青山盡處花間流水來時行負鴟夷載酒吟揮麈尾成詩蝴蝶飛來栩栩蚍蜉戰罷蘧蘧枕上驚消宿酒掌中閃落殘書采得石花試煮掃將柏子間焚色共龍團鬬品煙隨鵲尾成文玄莬城頭鼓角白狼河北煙塵宵旰知勞聖主安危定有謀臣稚子分操几杖蒼頭並挽巾車樹底停杯聽鳥溪邊覓鼎烹魚乳燕盈盈掠水流鶯恰恰啼煙雨著緑楊枝上雲生白石磯邊撫枕沈吟焦鹿銜杯嘯傲螺螟已悟覺時是夢還知醉裏為醒天籟非關比竹園林片片春聲栁畔提壺勸酒花間布穀催耕倚杖雲中送鳥投竿水上觀魚述志何曽著賦絶交亦自無書雀入大水為蛤橘踰長淮化枳天地豈私我哉人生貴適志耳石几移當薜幌絲囊憑對花欄門外何方騎吹紅塵北走長安家住穀城山下行蹤半慕留侯初無黃石公授但從赤松子遊握筆峰霞縹眇彈琴澗水潺湲草閣終年不閉荆扉鎮日常關面面溪山繚繞村村花樹蒙籠人在淵明記裏家居摩詰圖中偶遇城中客列因知海上烽傳零落張騫使節沈浮楊僕樓船九陌朱輪華轂五陵駿馬輕裘眼底蜉蝣楚楚枕中蝴蝶悠悠啜茗風生瓦鉢焚香日上疏簾坐久渾無箇事函開一卷楞嚴世界都無廣狹人生各有盈虛鯤鵬兩海不足鷦鷃一枝有餘開卷百年萬里連篇落日中原一任騷壇定霸爭教學海窮源呼馬呼牛易應夢魚夢鳥難分人世百年過客勳名一片浮雲春盡新醅緑醑日髙旋煮雕胡不羡金韲玉膾休稱琬液瓊蘇水繞項王冡畔山圍管子臺前萬古英雄事業斜陽衰草寒煙海岸漁竿自把閭門雀網空張浪迹真成汗漫間心不見炎涼春日雕梁燕雀秋風髙冡麒麟賢聖誰能自免身名何物為親齷齪漢庭作吏盤跚魯國為儒羞殺杜陵男子笑倒髙陽酒徒有竹有山有水宜煙宜雨宜晴欲似浣花溪畔主人背郭堂成舉袖翩翩調鶴臨池策策呼魚回憶天街躍馬當年心事何如竹影能留月影松聲頗亂琴聲此際翛然似水應教多病身輕報歲常多野祭迎年亦有巫歌擊壤升平舊老欣隨社鼓婆娑古木千章水際香泉萬斛山阿樵客空巖鳥道田家半夜牛歌畏聽山猿報客愁看海鶴傳書可幸知交漸少音塵不到幽廬薰為含香自爇膏因吐焰常煎擁腫能逃大匠支離可盡天年碧竹青蘿院宇黃雞白酒盤飱有客聊除花徑無人自掩蓬門黃鳥聲中酒肆緑楊影裏漁蓑隔舍村翁泥飲隨身豎子徴歌蔓草生來勿翦間花落處休除只任常生常落年年點綴幽居秋夢渾如春夢春情化作秋情出世何須避世無名不用逃名量似飲河鼹鼠居同粘壁蝸牛閲世惟須滿腹謀身只合藏頭水面時喧雁鶩山坳逺下牛羊細雨疏槐落日披襟小坐繩牀見客端愁結襪開門最怯梳頭贏得北窗偃卧湘簾翠簟如秋五言絶句題巴西甘大夫年譜小像十首蜀都方著賦漢闕正求才借問題橋去何當擁傳回馬上碧衣郎春風錦帶長上林花萬樹無處不飛香被冷明光夜蘭香畫省秋清時間法吏吟倚白雲樓軺軒秦塞逺戟府漢江開萬里橋邊路鄉書幾度來帷幄談兵地風煙隴樹秋不因羌管月誰道近涼州尺籍徴兵下銅魚使者章臨淄十萬戶一半戍漁陽朝正開左個玉帛古元侯千騎東方至朱衣在上頭挂冠三觀頂長揖海雲孤羞殺秦人樹猶稱五大夫一艇煙波裏垂鈎傍月親風塵回首地多少未歸人輟耕隴頭夕山雲稍欲沒散髮嘯平林飯牛待涼月憶逺集句春草年年緑煙波處處愁所嗟人異雁猶隔洞庭秋思歸集句雲暗雙龍闕花明綺陌春悠悠洛陽夢莫作未歸人穀城山館集卷十九
